<body style="background-color:rgb(233, 223, 217)">
<style>
:root
{
  --slot-w:35px;
  --slot-gap:1px;
  --slot-pad-y:6px;
  --slot-min-h:30px;
  --anchor-bottom:-4px;
  --anchor-bottom-empty:-2px;
  --glyph-alpha:0.2;
  --touch-hit:24px;
}

.appbox
{
  font-family: "Arial";
  font-size:12px;
  margin:1px 1px 1px 1px;
  padding:6px;
  border-radius:5px;
  border-style:none;
  background:rgba(255,255,255,0.8);
  float:left;
  text-align:center;
}

#device_slots
{
  display:flex;
  gap:var(--slot-gap);
  align-items:flex-start;
}

.slotbox
{
  width:var(--slot-w);
  padding:var(--slot-pad-y) 0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.slot-label { font-weight:normal; margin:0 }
.sloticons  { position:relative; width:100%; min-height:var(--slot-min-h); }

.cogbtn,
.slot-add,
.drag-handle
{
  position:relative;
  display:block;
  margin:0 auto !important;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.cogbtn { z-index:3; cursor:pointer }

.slot-anchor
{
  position:absolute;
  left:0;
  right:0;
  bottom:var(--anchor-bottom);
  text-align:center;
}

.slot-anchor.empty { bottom:var(--anchor-bottom-empty) }

.dots,
.drag-handle .fa,
.slot-add .fa
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:var(--glyph-alpha);
  margin:0;
  padding:0;
  z-index:1;
}

.peripheral-name { display:block; min-height:24px; font-size:11px; word-break:break-word; }
.drag-handle { width:var(--touch-hit); height:30px; cursor:grab; user-select:none; }
.drag-handle:active { cursor:grabbing; }
.drag-handle .fa:first-child { bottom:5px;}
.drag-handle .fa:last-child { bottom:0; }

.slot-add
{
  border:0;
  background:rgba(255,255,255,0);
  cursor:pointer;
  font-size:14px;
  width:var(--touch-hit);
  height:18px;
  bottom:4px;
}

.slot.armed { outline:1px dashed rgba(0,0,0,0.25); outline-offset:1px; }
.slot-anchor.drop-ok { outline:1px dashed rgba(0,0,0,0.25); outline-offset:1px; }
.slot, .slot * { -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
.drag-handle { touch-action:none; }

.drag-ghost
{
  position:fixed;
  left:0;
  top:0;
  width:32px;
  height:34px;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  overflow:visible;
}

.drag-ghost .ghost-cog
{
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  min-width:var(--touch-hit);
  height:18px;
  line-height:18px;
  margin:0 !important;
  pointer-events:none;
  z-index:3;
}

.drag-ghost .ghost-cog i { position:static; transform:none; opacity:0.85; }
.drag-ghost .ghost-handle i:first-child { bottom:5px }
.drag-ghost .ghost-handle i:last-child { bottom:0 }

.drag-ghost .ghost-handle
{
  position:absolute;
  left:50%;
  bottom:0;
  width:var(--touch-hit);
  height:12px;
  transform:translateX(-50%);
}

.drag-ghost .ghost-handle i
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:0.55;
  margin:0;
  padding:0;
}

@media (pointer:coarse)
{
  :root { --slot-w:40px; --touch-hit:32px; }
  .cogbtn, .slot-add, .drag-handle { min-width:var(--touch-hit); }
}

</style>

<script>
function EMUI()
{
  this.ctx = {};

  this.onSlotClick = function(ctx,ev) { /* overridable: do somthing after click */ alert("onSlotClick - placeholder") }
  this.onSlotAdd   = function(ctx,ev) { /* overridable: do somthing after add */   alert("onSlotAdd - placeholder") }
  this.onSlotMove  = function(ctx,ev) { /* overridable: do somthing after move */  alert("onSlotMove - placeholder")  }

  function cloneSlotCfg(cfg)
  {
    return (cfg || []).map(function(slot)
    {
      return {
        slotId: slot.slotId,
        icon: slot.icon,
        lock: !!slot.lock,
        peripheral: slot.peripheral
          ? { id: slot.peripheral.id, name: slot.peripheral.name }
          : null
      };
    });
  }

  function getCtx(emui, hostId)
  {
    if (!emui.ctx[hostId])
    {
      emui.ctx[hostId] = {
        hostId: hostId,
        host: null,
        slotCfg: [],
        dragFromSlotId: null,
        pointerDrag: null
      };
    }
    return emui.ctx[hostId];
  }

  function getSlotById(slotCfg, slotId)
  {
    return slotCfg.find(function(slot) { return slot.slotId === slotId; });
  }


  this.slotMove = function slotMove(ctx, ev, fromSlotId, toSlotId)
  {
    if (!ctx || !fromSlotId || !toSlotId || fromSlotId === toSlotId) return;

    var from = getSlotById(ctx.slotCfg, fromSlotId);
    var to   = getSlotById(ctx.slotCfg, toSlotId);
    if (!from || !to || from.lock || !from.peripheral || to.peripheral) return;

    to.peripheral = from.peripheral;
    to.icon = from.icon;

    from.peripheral = null;
    delete from.icon;

    this.slotsRender(ctx.hostId);
    console.log("Move peripheral from->to", ctx.hostId, fromSlotId, toSlotId);
    this.onSlotMove(ctx, ev, fromSlotId, toSlotId);
  };

  this.slotsRender = function slotsRender(elid, cfg)
  {
    if (!elid) return;

    var ctx = getCtx(this, elid);

    if (cfg) ctx.slotCfg = cloneSlotCfg(cfg);
    ctx.host = document.getElementById(elid);
    if (!ctx.host) return;
    function renderGhost(slot)
    {
      var iconClass = (slot && slot.icon) ? slot.icon : "fa fa-circle";

      return `
        <button class="appbut ghost-cog" type="button" tabindex="-1" aria-hidden="true">
          <i class="${iconClass}"></i>
        </button>
        <span class="ghost-handle" aria-hidden="true">
          <i class="fa fa-ellipsis-h"></i>
          <i class="fa fa-ellipsis-h"></i>
        </span>
      `;
    }

    function renderAnchor(slot)
    {
      var anchorId = "d_slot_" + ctx.hostId + "_" + slot.slotId.replace(/[^a-zA-Z0-9_-]/g, "_");
 
      if (slot.peripheral)
      {
        return `
          <div class="slot-anchor occupied ${slot.lock ? "locked" : "movable"}"
               id="${anchorId}"
               data-slot-id="${slot.slotId}"
               data-host-id="${ctx.hostId}">
            <div class="peripheral-card">
              ${slot.lock ? "" : `
                <span class="drag-handle" title="Move ${slot.peripheral.name}">
                  <i class="fa fa-ellipsis-h dots dots1"></i>
                  <i class="fa fa-ellipsis-h dots"></i>
                </span>
              `}
            </div>
          </div>
        `;
      }

      return `
        <div class="slot-anchor empty"
             id="${anchorId}"
             data-slot-id="${slot.slotId}"
             data-host-id="${ctx.hostId}">
          <button class="slot-add" type="button" title="Add peripheral to ${slot.slotId}">
            <i class="fa fa-plus dots dots1"></i>
          </button>
        </div>
      `;
    }

    function renderSlot(slot)
    {
      return `
        <div class="appbox slotbox slot"
             data-slot-id="${slot.slotId}"
             data-host-id="${ctx.hostId}">
          <div class="slot-label">${slot.slotId}</div>
          <div class="sloticons">
            ${slot.peripheral
              ? `<button id="${slot.peripheral.name}" class="appbut cogbtn" type="button"><i class="${slot.icon || ""}"></i></button>`
              : ""}
            ${renderAnchor(slot)}
          </div>
        </div>
      `;
    }

    function buildDragGhost(slot)
    {
      var ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.innerHTML = renderGhost(slot);
      document.body.appendChild(ghost);
      return ghost;
    }

    function positionDragGhost(x, y)
    {
      if (!ctx.pointerDrag || !ctx.pointerDrag.ghostEl) return;
      ctx.pointerDrag.ghostEl.style.left = x + "px";
      ctx.pointerDrag.ghostEl.style.top  = y + "px";
    }

    function updatePointerHotTarget(x, y)
    {
      if (!ctx.pointerDrag) return;

      var el = document.elementFromPoint(x, y);
      var nextHot = el ? el.closest('[data-host-id="' + ctx.hostId + '"].slot-anchor.empty') : null;

      if (ctx.pointerDrag.hotTarget === nextHot) return;

      if (ctx.pointerDrag.hotTarget)
        ctx.pointerDrag.hotTarget.classList.remove("drop-ok");

      ctx.pointerDrag.hotTarget = nextHot;

      if (ctx.pointerDrag.hotTarget)
        ctx.pointerDrag.hotTarget.classList.add("drop-ok");     
    }

    function cleanupPointerDrag()
    {
      if (!ctx.pointerDrag) return;

      var handleEl = ctx.pointerDrag.handleEl;
      var pointerId = ctx.pointerDrag.pointerId;

      if (ctx.pointerDrag.hotTarget)
        ctx.pointerDrag.hotTarget.classList.remove("drop-ok");

      if (ctx.pointerDrag.ghostEl)
        ctx.pointerDrag.ghostEl.remove();  

      if (handleEl)
      {
        try
        {
          if (handleEl.hasPointerCapture(pointerId))
            handleEl.releasePointerCapture(pointerId);
        }
        catch (e) {}

        handleEl.removeEventListener("pointermove", onPointerDragMove);
        handleEl.removeEventListener("pointerup", onPointerDragEnd);
        handleEl.removeEventListener("pointercancel", onPointerDragCancel);
      }

      document.body.classList.remove("dragging");
      ctx.host.querySelectorAll(".slot.drag-source").forEach(function(el)
       {
         el.classList.remove("drag-source");
       });

       ctx.pointerDrag = null;
    }

    function onPointerDragStart(emui, host, ev)
    {
      if (ev.button != null && ev.button !== 0) return;

      ev.preventDefault();
      ev.stopPropagation();

      var slotEl = ev.currentTarget.closest(".slot");
      if (!slotEl) return;

      var fromSlotId = slotEl.dataset.slotId;
      var fromSlot = getSlotById(emui, fromSlotId);
      if (!fromSlot || !fromSlot.peripheral) return;

      ctx.pointerDrag = {
        emui: emui,
        host: host,
        pointerId: ev.pointerId,
        fromSlotId: fromSlotId,
        handleEl: ev.currentTarget,
        hotTarget: null,
        ghostEl: buildDragGhost(fromSlot)
      };

      document.body.classList.add("dragging");
      slotEl.classList.add("drag-source");

      ev.currentTarget.setPointerCapture(ev.pointerId);
      ev.currentTarget.addEventListener("pointermove", onPointerDragMove);
      ev.currentTarget.addEventListener("pointerup", onPointerDragEnd);
      ev.currentTarget.addEventListener("pointercancel", onPointerDragCancel);

      positionDragGhost(ev.clientX, ev.clientY);
      updatePointerHotTarget(ev.clientX, ev.clientY);
    }

    function onPointerDragMove(ev)
    {
      if (!ctx.pointerDrag || ev.pointerId !== ctx.pointerDrag.pointerId) return;

      ev.preventDefault();
      positionDragGhost(ev.clientX, ev.clientY);
      updatePointerHotTarget(ev.clientX, ev.clientY);
    }

    function onPointerDragEnd(ev)
    {
      if (!ctx.pointerDrag || ev.pointerId !== ctx.pointerDrag.pointerId) return;

      ev.preventDefault();

      var fromSlotId = ctx.pointerDrag.fromSlotId;
      var toSlotId = ctx.pointerDrag.hotTarget
        ? ctx.pointerDrag.hotTarget.dataset.slotId
         : null;

      cleanupPointerDrag();

      if (toSlotId) emui.slotMove(ctx, ev, fromSlotId, toSlotId);
    }

    function onPointerDragCancel(ev)
    {
      if (!ctx.pointerDrag || ev.pointerId !== ctx.pointerDrag.pointerId) return;
      cleanupPointerDrag();
    }

    function onClick(emui, ctx, ev)
    {
      emui.onSlotClick(ctx, ev);
    }

    function onHostClick(emui, ctx, ev)
    {
      var addBtn = ev.target.closest(".slot-add");
      if (addBtn && ctx.host.contains(addBtn))
      {
        emui.onSlotAdd(ctx, ev);
      }
    }

    function wireEvents(emui, ctx)
    {
      ctx.host.querySelectorAll(".drag-handle").forEach(function(el)
        {
          onPointerDragStart(emui, ctx, ev);
        });

      ctx.host.querySelectorAll(".appbut").forEach(function(el)
        {
          onClick(emui, ctx, ev);
        });

      if (!ctx.clickBound)
      {
        ctx.host.addEventListener("click", function(ev)
        {
          onHostClick(emui, ctx, ev);
        });
        ctx.clickBound = true;
      }

    }

    ctx.host.innerHTML = ctx.slotCfg.map(renderSlot).join("");
    wireEvents(this, ctx);
  };
}

var oEMUI = new EMUI();


// slot custom event handling

oEMUI.onSlotClick = function(ctx, ev)
{
  var parent = ev.currentTarget.closest(".slot");
  var slotID = parent ? parent.dataset.slotId : "";
  var hostId = ctx.hostId;

  alert("Configure " + hostId + " peripheral " + ev.currentTarget.id + " in slot " + slotID);
};

oEMUI.onSlotAdd = function(ctx, ev)
{
  var hostId = this.host && this.host.id;
  var anchor = ev.target.closest(".slot-anchor.empty");
  if (!anchor || !ctx.host.contains(anchor)) return;
  var slotId = anchor.dataset.slotId;
  alert("Plug " + ctx.hostId + " new peripheral in slot " + slotId);

  console.log(JSON.stringify(ctx.slotCfg));
};

oEMUI.onSlotMove = function(ctx, ev, fromSlotId, toSlotId)
{
  console.log(JSON.stringify(ctx.slotCfg));
  alert("Move " + ctx.hostId + " peripheral slot " + fromSlotId + "->" + toSlotId);
};

</script>
