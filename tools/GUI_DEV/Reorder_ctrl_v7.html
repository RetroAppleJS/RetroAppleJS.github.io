<body style="background-color:rgb(233, 223, 217)">
<style>
:root
{
  --slot-w:35px;
  --slot-gap:1px;
  --slot-pad-y:6px;
  --slot-min-h:30px;
  --anchor-bottom:-4px;
  --anchor-bottom-empty:-2px;
  --glyph-alpha:0.2;
  --touch-hit:24px;
}

.appbox
{
  font-family: "Arial";
  font-size:12px;
  margin:1px 1px 1px 1px;
  padding:6px;
  border-radius:5px;
  border-style:none;
  background:rgba(255,255,255,0.8);
  float:left;
  text-align:center;
}

#device_slots
{
  display:flex;
  gap:var(--slot-gap);
  align-items:flex-start;
}

.slotbox
{
  width:var(--slot-w);
  padding:var(--slot-pad-y) 0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.slot-label { font-weight:normal; margin:0 }
.sloticons  { position:relative; width:100%; min-height:var(--slot-min-h); }

.cogbtn,
.slot-add,
.drag-handle
{
  position:relative;
  display:block;
  margin:0 auto !important;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.cogbtn { z-index:3; cursor:pointer }

.slot-anchor
{
  position:absolute;
  left:0;
  right:0;
  bottom:var(--anchor-bottom);
  text-align:center;
}

.slot-anchor.empty { bottom:var(--anchor-bottom-empty) }

.dots,
.drag-handle .fa,
.slot-add .fa
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:var(--glyph-alpha);
  margin:0;
  padding:0;
  z-index:1;
}

.peripheral-name { display:block; min-height:24px; font-size:11px; word-break:break-word; }
.drag-handle { width:var(--touch-hit); height:30px; cursor:grab; user-select:none; }
.drag-handle:active { cursor:grabbing; }
.drag-handle .fa:first-child { bottom:5px;}
.drag-handle .fa:last-child { bottom:0; }

.slot-add
{
  border:0;
  background:rgba(255,255,255,0);
  cursor:pointer;
  font-size:14px;
  width:var(--touch-hit);
  height:18px;
  bottom:4px;
}

.slot.armed { outline:1px dashed rgba(0,0,0,0.25); outline-offset:1px; }
.slot-anchor.drop-ok { outline:1px dashed rgba(0,0,0,0.25); outline-offset:1px; }
.slot, .slot * { -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
.drag-handle { touch-action:none; }

.drag-ghost
{
  position:fixed;
  left:0;
  top:0;
  width:32px;
  height:34px;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  overflow:visible;
}

.drag-ghost .ghost-cog
{
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  min-width:var(--touch-hit);
  height:18px;
  line-height:18px;
  margin:0 !important;
  pointer-events:none;
  z-index:3;
}

.drag-ghost .ghost-cog i { position:static; transform:none; opacity:0.85; }
.drag-ghost .ghost-handle i:first-child { bottom:5px }
.drag-ghost .ghost-handle i:last-child { bottom:0 }

.drag-ghost .ghost-handle
{
  position:absolute;
  left:50%;
  bottom:0;
  width:var(--touch-hit);
  height:12px;
  transform:translateX(-50%);
}

.drag-ghost .ghost-handle i
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:0.55;
  margin:0;
  padding:0;
}

@media (pointer:coarse)
{
  :root { --slot-w:40px; --touch-hit:32px; }
  .cogbtn, .slot-add, .drag-handle { min-width:var(--touch-hit); }
}

</style>

<div class=toolbox id="device_slots1"></div>
<div class=toolbox id="device_slots2"></div>

<script>
function EMUI()
{
  this.ctx = {};

  function getCtx(emui, hostId)
  {
    if (!emui.ctx[hostId])
    {
      emui.ctx[hostId] = {
        hostId: hostId,
        host: null,
        slotCfg: [],
        dragFromSlotId: null,
        pointerDrag: null
      };
    }
    return emui.ctx[hostId];
  }

  this.onSlotClick = function(ctx, ev) {};
  this.onSlotAdd   = function(ctx, ev) {};
  this.onSlotMove  = function(ctx, ev, fromSlotId, toSlotId) {};

  this.slotMove = function slotMove(ctx, ev, fromSlotId, toSlotId)
  {
    function getSlotById(slotCfg, slotId)
    {
      return slotCfg.find(function(slot) { return slot.slotId === slotId; });
    }

    if (!fromSlotId || !toSlotId || fromSlotId === toSlotId) return;

    var from = getSlotById(ctx.slotCfg, fromSlotId);
    var to   = getSlotById(ctx.slotCfg, toSlotId);

    if (!from || !to || from.lock || !from.peripheral || to.peripheral) return;

    to.peripheral = from.peripheral;
    to.icon = from.icon;

    from.peripheral = null;
    delete from.icon;

    ctx.dragFromSlotId = null;

    this.slotsRender(ctx.hostId);
    this.onSlotMove(ctx, ev, fromSlotId, toSlotId);
  };

  this.slotsRender = function slotsRender(elid, cfg)
  {
    var ctx = getCtx(this, elid);
    if (cfg) ctx.slotCfg = cfg;
    ctx.host = document.getElementById(elid);
    if (!ctx.host) return;

    function getSlotById(slotCfg, slotId)
    {
      return slotCfg.find(function(slot) { return slot.slotId === slotId; });
    }

    function renderAnchor(slot)
    {
      var anchorId = "d_slot_" + ctx.hostId + "_" + slot.slotId.replace(/[^a-zA-Z0-9_-]/g, "_");

      if (slot.peripheral)
      {
        return `
          <div class="slot-anchor occupied ${slot.lock ? "locked" : "movable"}"
               id="${anchorId}"
               data-slot-id="${slot.slotId}"
               data-host-id="${ctx.hostId}">
            <div class="peripheral-card">
              ${slot.lock ? "" : `
                <span class="drag-handle" title="Move ${slot.peripheral.name}">
                  <i class="fa fa-ellipsis-h dots dots1"></i>
                  <i class="fa fa-ellipsis-h dots"></i>
                </span>
              `}
            </div>
          </div>
        `;
      }

      return `
        <div class="slot-anchor empty"
             id="${anchorId}"
             data-slot-id="${slot.slotId}"
             data-host-id="${ctx.hostId}">
          <button class="slot-add" type="button" title="Add peripheral to ${slot.slotId}">
            <i class="fa fa-plus dots dots1"></i>
          </button>
        </div>
      `;
    }

    function renderSlot(slot)
    {
      return `
        <div class="appbox slotbox slot"
             data-slot-id="${slot.slotId}"
             data-host-id="${ctx.hostId}">
          <div class="slot-label">${slot.slotId}</div>
          <div class="sloticons">
            ${slot.peripheral
              ? `<button class="appbut cogbtn" type="button"><i class="${slot.icon || ""}"></i></button>`
              : ""}
            ${renderAnchor(slot)}
          </div>
        </div>
      `;
    }

    function onClick(emui, ctx, ev)
    {
      emui.onSlotClick(ctx, ev);
    }

    function onAdd(emui, ctx, ev)
    {
      emui.onSlotAdd(ctx, ev);
    }

    function onPointerDragStart(emui, ctx, ev)
    {
      if (ev.button != null && ev.button !== 0) return;

      ev.preventDefault();
      ev.stopPropagation();

      var slotEl = ev.currentTarget.closest(".slot");
      if (!slotEl) return;

      var fromSlotId = slotEl.dataset.slotId;
      var fromSlot = getSlotById(ctx.slotCfg, fromSlotId);
      if (!fromSlot || !fromSlot.peripheral) return;

      ctx.pointerDrag = {
        emui: emui,
        ctx: ctx,
        pointerId: ev.pointerId,
        fromSlotId: fromSlotId,
        handleEl: ev.currentTarget,
        hotTarget: null
      };
    }

    function wireEvents(emui, ctx)
    {
      ctx.host.querySelectorAll(".drag-handle").forEach(function(el)
      {
        el.addEventListener("pointerdown", function(ev)
        {
          onPointerDragStart(emui, ctx, ev);
        });
      });

      ctx.host.querySelectorAll(".appbut").forEach(function(el)
      {
        el.addEventListener("click", function(ev)
        {
          onClick(emui, ctx, ev);
        });
      });

      ctx.host.querySelectorAll(".slot-add").forEach(function(el)
      {
        el.addEventListener("click", function(ev)
        {
          onAdd(emui, ctx, ev);
        });
      });
    }

    ctx.host.innerHTML = ctx.slotCfg.map(renderSlot).join("");
    wireEvents(this, ctx);
  };
}

var oEMUI = new EMUI();


// slot custom event handling
oEMUI.onSlotClick = function(ctx, ev)
{
  var parent =  ev.currentTarget.parentElement.parentElement;
  var slotID =  parent.firstElementChild.innerText;

  alert("Configure "+ctx.hostId+" peripheral " + ev.currentTarget.id + " in slot "+slotID);
};


oEMUI.onSlotAdd = function(ctx, ev)
{
  var anchor = ev.target.closest(".slot-anchor.empty");
  if (!anchor || !ctx.host.contains(anchor)) return;
  alert("add in " + ctx.hostId + " slot " + anchor.dataset.slotId);
};

oEMUI.onSlotMove = function(ctx, ev, fromSlotId, toSlotId)
{
  alert("move in " + ctx.hostId + ": " + fromSlotId + " -> " + toSlotId);
};

// slot data
var slotCfg1 = [
  { slotId: "board", icon: "fa fa-cube", lock:true, peripheral: { id: "mainboard", name: "BOARD" } },
  { slotId: "PR#0",  icon: "fa fa-microchip",       peripheral: { id: "ramcard",   name: "MS16K" } },
  { slotId: "PR#1" },
  { slotId: "PR#2" },
  { slotId: "PR#3",  icon: "fa fa-tv",              peripheral: { id: "col80card", name: "VIDEX" } },
  { slotId: "PR#4" },
  { slotId: "PR#5" },
  { slotId: "PR#6",  icon: "fa fa-save",            peripheral: { id: "disk2",     name: "DISKII" } },
  { slotId: "PR#7" }
];
oEMUI.slotsRender("device_slots1",slotCfg1);


var slotCfg2 = [
  { slotId: "board", icon: "fa fa-cube", lock:true, peripheral: { id: "mainboard", name: "BOARD" } },
  { slotId: "PR#0",  icon: "fa fa-microchip",       peripheral: { id: "ramcard",   name: "MS16K" } },
  { slotId: "PR#1" },
  { slotId: "PR#2" },
  { slotId: "PR#3",  icon: "fa fa-tv",              peripheral: { id: "col80card", name: "VIDEX" } },
  { slotId: "PR#4" },
  { slotId: "PR#5" },
  { slotId: "PR#6",  icon: "fa fa-save",            peripheral: { id: "disk2",     name: "DISKII" } },
  { slotId: "PR#7" }
];
oEMUI.slotsRender("device_slots2",slotCfg2);


</script>
