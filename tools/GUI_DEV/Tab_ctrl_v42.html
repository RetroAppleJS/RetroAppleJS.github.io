<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

#tab_div ul,
.tab-menu {
  --tab-count: 1;
  position: relative;
  height: 30px;
  display: grid;
  grid-template-columns: repeat(var(--tab-count), 1fr);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.65);
  box-shadow: 0 12.5px 10px rgba(0, 0, 0, 0.08), 0 100px 80px rgba(0, 0, 0, 0.03);
  overflow: hidden;
}

#tab_div ul a,
.tab-menu a {
  list-style: none;
  display: grid;
  place-items: center;
  color: #000;
  z-index: 10;
  cursor: pointer;
  text-decoration: none;
}

#tab_div ul .tab_div_end,
.tab-menu .tab_div_end {
  position: absolute;
  left: 0;
  top: 0;
  width: calc(100% / var(--tab-count));
  height: 100%;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 12.5px 10px rgba(0, 0, 0, 0.015), 0 100px 80px rgba(0, 0, 0, 0.03);
}

#box {
  background:#76B9CE;
  border-radius:10px;
}

#box tr td {
  flex-wrap:wrap;
}

.tabs > div { display:none; }
.tabs > div.active { display:block; }

</style>
<link rel="stylesheet" href="../../res/COM_fontawesome/all.css">
</head>
<body style="font-family:'Arial'">

  <table id=box style=width:450px>
    <tr>
      <td valign=top>

        <!-- tab menu  -->
        <div id=tab_div>
          <ul class="tab-ul el--1">
            <!-- links -->
            <a href="#tab0">Emulator</a>
            <a href="#tab1">Assembler</a>
            <a href="#tab2" id="tab_a">Tracer</a>
            <a href="#tab3">Reference</a>
            <div class="tab_div_end el--1"></div>
          </ul>
        </div>


        <!-- tab content -->
        <div class="tabs">
          <div id="tab0" style="height:150px">

            <!-- tab sub-menu  -->
            <div id=tab_div>
                <ul class="tab-ul el--3">
                    <!-- links -->
                    <a href="#tab0-0">APPLE</a>
                    <a href="#tab0-1" id="tab_a">DEVICES</a>
                    <div class="tab_div_end el--3"></div>
                </ul>
            </div>
            <div class="tabs">
                <div id="tab0-0" style="height:250px">EMULATOR</div>
                <div id="tab0-1" style="height:250px">Devices</div>
            </div>

          </div>
          <div id="tab1" style="height:200px">Tab one content with a <a href="#tab0">link to tab zero</a></div>
          <div id="tab2" style="height:250px"> 

            <!-- tab sub-menu  -->
            <div id=tab_div>
                <ul class="tab-ul el--2">
                    <!-- links -->
                    <a href="#tab2-0">CPU</a>
                    <a href="#tab2-1" id="tab_a">Disk</a>
                    <div class="tab_div_end el--2"></div>
                </ul>
            </div>
            <div class="tabs">
                <div id="tab2-0" style="height:250px">CPU content</div>
                <div id="tab2-1" style="height:250px">Disk content</div>
            </div>

          </div>
          <div id="tab3" style="height:1000px"></div>
        </div>
      </td>
  </tr>
</table>

<script id="rendered-js">

////////////////////////////
// TINY GSAP-LIKE TWEEN   //
////////////////////////////

function TAB_TWEEN()
{
    this.jobs = new WeakMap();

    this.ease = function(t)
    {
        /*
         * Small approximation of GSAP's default power1.out easing:
         * fast at the beginning, smooth near the end.
         */
        return 1 - Math.pow(1 - t,2);
    };

    this.to = function(el,duration,vars)
    {
        if(!el) return;

        duration = Math.max(0,Number(duration) || 0);
        vars = vars || {};

        var previous = this.jobs.get(el);
        if(previous) cancelAnimationFrame(previous);

        var start = performance.now();
        var from = {};
        var to = {};

        for(var prop in vars)
        {
            if(prop == "duration") continue;
            from[prop] = parseFloat(getComputedStyle(el)[prop]) || 0;
            to[prop] = parseFloat(vars[prop]) || 0;
        }

        var self = this;

        function step(now)
        {
            var t = duration <= 0 ? 1 : Math.min(1,(now - start) / (duration * 1000));
            var e = self.ease(t);

            for(var prop in to)
                el.style[prop] = (from[prop] + (to[prop] - from[prop]) * e) + "px";

            if(t < 1) self.jobs.set(el,requestAnimationFrame(step));
            else self.jobs.delete(el);
        }

        step(start);
    };
}

//////////////////////
// TAB ANIMATOR     //
//////////////////////

function ANIMTAB(arg)
{
    arg = arg || {};

    this.menuID       = arg.menuID       || "#tab_div .tab-ul";
    this.contentCL    = arg.contentCL    || ".tabs";
    this.defID        = arg.defID        || "tab_a";
    this.animDuration = arg.animDuration == null ? 0.2 : arg.animDuration;
    this.tabHASH      = arg.tabHASH      || "#tab";

    this.groups       = [];
    this.animator     = arg.animator || new TAB_TWEEN();
    this.readhash     = arg.readhash || function(event) {
        if(event && typeof event.node == "string") return event.node;
        return location.hash.slice(1);
    };

    ////////////////////////////
    // TAB DISCOVERY          //
    ////////////////////////////

    this.init = function()
    {
        var menus = document.querySelectorAll(this.menuID);
        this.groups = [];

        for(var i = 0; i < menus.length; i++)
        {
            var group = this.createGroup(menus[i],i);
            if(group) this.groups.push(group);
        }

        this.bindClicks();
        this.switchTab();
    };

    this.createGroup = function(menuEl,index)
    {
        var links = [];

        for(var i = 0; i < menuEl.childNodes.length; i++)
            if(menuEl.childNodes[i].tagName == "A" && menuEl.childNodes[i].href !== undefined)
                links.push(menuEl.childNodes[i]);

        if(!links.length) return null;

        var focusEl = menuEl.querySelector(".tab_div_end") || menuEl.querySelector(".focus-el");
        var contentEl = this.findContentForMenu(menuEl);

        if(!focusEl || !contentEl) return null;

        menuEl.style.setProperty("--tab-count",String(links.length));

        var defaultLink = null;
        for(var d = 0; d < links.length; d++)
            if(links[d].id == this.defID)
                defaultLink = links[d];

        if(!defaultLink) defaultLink = links[0];

        return {
            index: index,
            menuEl: menuEl,
            focusEl: focusEl,
            contentEl: contentEl,
            links: links,
            defaultLink: defaultLink
        };
    };

    this.findContentForMenu = function(menuEl)
    {
        /*
         * In v41 each tab menu wrapper is immediately followed by its content
         * container, possibly after <br> nodes for the top-level menu.
         */
        var wrapper = menuEl.parentElement;
        var node = wrapper ? wrapper.nextElementSibling : null;

        while(node)
        {
            if(node.classList && node.classList.contains("tabs"))
                return node;
            node = node.nextElementSibling;
        }

        /*
         * Fallback for future layouts: search for the first direct .tabs child
         * in the nearest non-menu parent.
         */
        var parent = wrapper ? wrapper.parentElement : null;
        while(parent)
        {
            for(var i = 0; i < parent.children.length; i++)
                if(parent.children[i].classList && parent.children[i].classList.contains("tabs"))
                    return parent.children[i];

            parent = parent.parentElement;
        }

        return null;
    };

    this.bindClicks = function()
    {
        var self = this;

        for(var i = 0; i < this.groups.length; i++)
        {
            for(var j = 0; j < this.groups[i].links.length; j++)
            {
                this.groups[i].links[j].onclick = function()
                {
                    /*
                     * The browser updates location.hash after this click.
                     * setTimeout also handles the case where the hash is already
                     * selected, because hashchange will not fire then.
                     */
                    window.setTimeout(function(){ self.switchTab(); },0);
                };
            }
        }
    };

    ////////////////////////////
    // TAB EVENT HANDLER      //
    ////////////////////////////

    this.switchTab = function(event)
    {
        if(!this.groups.length) this.initGroupsOnly();

        var target = this.cleanTabId(this.readhash(event));

        for(var i = 0; i < this.groups.length; i++)
        {
            var group = this.groups[i];
            var link = this.findTargetLink(group,target);

            if(link)
            {
                this.switchTabHeader(group,link);
                this.switchTabContent(group,link.hash.split("#")[1]);
            }
        }

        return true;
    };

    this.initGroupsOnly = function()
    {
        var menus = document.querySelectorAll(this.menuID);
        this.groups = [];

        for(var i = 0; i < menus.length; i++)
        {
            var group = this.createGroup(menus[i],i);
            if(group) this.groups.push(group);
        }

        this.bindClicks();
    };

    this.cleanTabId = function(id)
    {
        id = String(id || "");
        id = id.replace(/^#/,"");
        if(id.indexOf("_") > 0) id = id.split("_")[0];
        return id;
    };

    this.linkTarget = function(link)
    {
        return link.hash ? link.hash.split("#")[1] : "";
    };

    this.findTargetLink = function(group,target)
    {
        /*
         * Exact match handles direct child tabs such as #tab2-1.
         */
        if(target)
        {
            for(var i = 0; i < group.links.length; i++)
                if(this.linkTarget(group.links[i]) == target)
                    return group.links[i];

            /*
             * Prefix match handles parent tabs when the hash points deeper:
             * #tab2-1 activates #tab2 in the top-level group.
             */
            for(var j = 0; j < group.links.length; j++)
            {
                var linkId = this.linkTarget(group.links[j]);
                if(target.indexOf(linkId + "-") == 0)
                    return group.links[j];
            }
        }

        return group.defaultLink;
    };

    //////////////////////////////
    // TAB HEADER SELECTOR      //
    //////////////////////////////

    this.switchTabHeader = function(group,link)
    {
        var menuRect = group.menuEl.getBoundingClientRect();
        var linkRect = link.getBoundingClientRect();

        this.animator.to(group.focusEl,this.animDuration,{
            left:  linkRect.left - menuRect.left,
            width: linkRect.width
        });
    };

    //////////////////////////////
    // TAB CONTENT SELECTOR     //
    //////////////////////////////

    this.switchTabContent = function(group,sel_id)
    {
        var node = group.contentEl.childNodes;

        for(var i = 0; i < node.length; i++)
        {
            if(!node[i].id || !node[i].classList) continue;
            if(node[i].id == sel_id) node[i].classList.add("active");
            else                     node[i].classList.remove("active");
        }      
    };
}

var oTAB = new ANIMTAB({"menuID":"#tab_div .tab-ul","contentCL":".tabs"});

window.addEventListener("load",function(){ oTAB.init(); },false);
window.addEventListener("hashchange",function(){ oTAB.switchTab(event); },false);

</script>
</body>
</html>
