<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Editor Project Loader - r184 v17</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #202020;
    }

    canvas { display: block; }

    #toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.74);
      color: #fff;
      font-size: 13px;
      user-select: none;
    }

    #toolbar input[type="file"] { color: #fff; }
    #toolbar input[type="range"] { width: 120px; }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      background: #ff9940;
      color: #fff;
    }

    button:hover { opacity: 0.85; }
    button.secondary { background: #4d7cff; }
    button.neutral { background: #666; }
    button.active { background: #18a558; }

    label {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    #status {
      opacity: 0.9;
      white-space: nowrap;
    }

    #output {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      box-sizing: border-box;
      max-width: min(820px, calc(100vw - 24px));
      max-height: 42vh;
      margin: 0;
      padding: 10px;
      overflow: auto;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.78);
      color: #d7ffd7;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      display: none;
    }
  .lblbox 
  {
    border: 1px solid white;
    padding: 5px;
    border-radius: 5px;
  }
  </style>
</head>

<body>
  <div id="toolbar">
    <label title="Base color / material.map image." class="lblbox">
      scene <input type="file" id="fileInput" accept=".json,application/json" title="Load Three.js editor JSON" />

      <button id="frameButton" class="secondary" type="button">FRAME OBJECT</button>
      <button id="jsonCameraButton" class="neutral" type="button">JSON CAMERA</button>
      <button id="dumpMaterialButton" type="button">DUMP SCREEN MATERIAL</button>

        </label>
  
            <label title="Emissive / material.emissiveMap image." class="lblbox">emissive <input type="file" id="emissiveInput" accept="image/*" />
    <button id="applyEmissiveButton" type="button">APPLY EMISSIVE</button></label>


    <label title="Base color / material.map image." class="lblbox">base color <input type="file" id="baseColorInput" accept="image/*" />
    <button id="applyBaseColorButton" type="button">APPLY BASE</button></label>
    <label title="Shared roughness/metalness image; applied to material.roughnessMap and material.metalnessMap using the same texture object." class="lblbox">rough/metal <input type="file" id="roughMetalInput" accept="image/*" />
    <button id="applyRoughMetalButton" type="button">APPLY ROUGH/METAL</button></label>



          <label><input type="checkbox" id="helpersToggle" checked /> 3D grid</label>
      <label title="Lower FOV reduces perspective warping; the camera distance is adjusted to keep the object framed.">
        perspective
        <input id="fovSlider" type="range" min="5" max="90" step="1" value="50" />
        <span id="fovValue">50°</span>
      </label>
      <label title="Controls the emissive intensity of the projected/screen material.">
        luminosity
        <input id="luminositySlider" type="range" min="0" max="20" step="0.01" value="7.74" />
        <span id="luminosityValue">7.74</span>
      </label>
      <button id="moveLightButton" class="neutral" type="button" aria-pressed="false">MOVE LIGHT: OFF</button>
      <span id="lightCoords" title="Cartesian coordinates of the scene point light">light: —</span>

      <span id="status">Load a Three.js editor JSON project, then upload/apply base, rough/metal, and emissive textures for the screen material.</span>
 

  </div>

  <pre id="output"></pre>

  <!--
    Three.js r184 dependency bridge, without import maps.

    three.module.js is an ES module and cannot be loaded as:
      <script type="text/javascript" src=".../three.module.js"></script>

    The application below remains a normal text/javascript script. This small
    module bridge loads the r184 modules and exposes only the globals used by
    the loader: window.THREE, window.OrbitControls and window.TransformControls.

    esm.sh is used here because the official r184 add-ons import from the bare
    specifier "three". Without an import map, unpkg/jsdelivr browser imports of
    those add-ons cannot resolve that bare specifier by themselves.
  -->
  <script type="module">
    import * as THREE from "https://esm.sh/three@0.184.0";
    import { OrbitControls } from "https://esm.sh/three@0.184.0/addons/controls/OrbitControls.js";
    import { TransformControls } from "https://esm.sh/three@0.184.0/addons/controls/TransformControls.js";

    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.TransformControls = TransformControls;
    window.dispatchEvent(new Event("THREEJS_R184_READY"));
  </script>

    function initRenderer() {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);
    }

    function resizeRenderer() {
      if (!renderer) return;
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function viewportAspect() {
      // Keep the historical horizontal compensation used by the old test tool.
      return (window.innerWidth * 1.1) / Math.max(1, window.innerHeight);

      if (!file) return;

      try {
        lastFilename = file.name;
        setStatus("Reading " + file.name + "...");
        const text = await file.text();
        const jsonProject = JSON.parse(text);
        await loadProject(jsonProject);

        const patchNote = patchedTextureCount > 0 ?
          " Patched " + patchedTextureCount + " broken texture slot(s)." : "";

        setStatus(
          "Loaded " + file.name + ". Drag to orbit, wheel to zoom, right-drag to pan." + patchNote
        );
      } catch (err) {
        console.error(err);
        setStatus("Could not load project. See console.");
        writeOutput(String(err && err.stack ? err.stack : err));
      }
    }

    async function loadProject(jsonProject) {
      if (!jsonProject || !jsonProject.scene) {
        throw new Error("Expected a Three.js editor project JSON with a .scene property.");
      }

      disposeCurrentScene();
      patchedTextureCount = 0;

      applyProjectSettings(jsonProject.project || {});

      const safeSceneJson = cloneJson(jsonProject.scene);
      const missingImageCount = sanitizeEditorImageUrls(safeSceneJson, EMPTY_IMAGE_DATA_URL);
      if (missingImageCount > 0) {
        console.warn("Replaced", missingImageCount, "empty editor image URL(s) before ObjectLoader.parse().");
      }

      const loader = new THREE.ObjectLoader();
      scene = loader.parse(safeSceneJson);

      const emptyTexture = await makeTextureFromUrl(EMPTY_IMAGE_DATA_URL, "empty placeholder texture");
      patchedTextureCount += patchBrokenMaterialTextures(scene, emptyTexture);
      stripControlledTextureSlotsFromTarget();

      if (!scene.background) {
        scene.background = new THREE.Color(0xf0f0f0);
      }

      lastProjectCamera = jsonProject.camera || null;
      camera = buildCameraFromProject(lastProjectCamera);
      camera.aspect = viewportAspect();
      camera.updateProjectionMatrix();

      lastSceneBox = computeSceneBox(scene);
      installOrbitControls();
      addHelpers();

      // Make OrbitControls orbit around the loaded object's bounding-box center.
      retargetControlsToLoadedObject();
      syncLuminosityControlFromTarget();
      updateApplyButtonStates();
      refreshLightMoveMode();
      updateLightCoordinates();

      // Render only after broken texture slots have been replaced.
      renderer.render(scene, camera);
    }

    function cloneJson(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function sanitizeEditorImageUrls(sceneJson, replacementUrl) {
      if (!sceneJson || !Array.isArray(sceneJson.images)) return 0;

      let count = 0;
      for (const img of sceneJson.images) {
        if (!img) continue;
        if (typeof img.url !== "string" || img.url.trim() === "") {
          img.url = replacementUrl || EMPTY_IMAGE_DATA_URL;
          count++;
        }
      }
      return count;
    }


    function isUsableImageDataUrl(url) {
      return typeof url === "string" &&
             url.indexOf("data:image/") === 0 &&
             url.indexOf("...") < 0 &&
             url.length > 32;
    }

    function getDefaultImageForSlot(slot) {
      if (!default_image_maps) return "";

      if (slot === "roughMetal") {
        if (isUsableImageDataUrl(default_image_maps.roughnessMap)) return default_image_maps.roughnessMap;
        if (isUsableImageDataUrl(default_image_maps.metalnessMap)) return default_image_maps.metalnessMap;
        return "";
      }

      return isUsableImageDataUrl(default_image_maps[slot]) ? default_image_maps[slot] : "";
    }

    async function getSelectedOrDefaultImageUrl(inputEl, slot, humanLabel) {
      const file = inputEl && inputEl.files && inputEl.files[0];
      if (file) {
        return { url: await fileToDataUrl(file), label: file.name, source: "uploaded" };
      }

      const fallback = getDefaultImageForSlot(slot);
      if (fallback) {
        return { url: fallback, label: "default " + humanLabel + " image", source: "default" };
      }

      return null;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Could not read texture file."));
        reader.readAsDataURL(file);
      });
    }

    function makeTextureFromUrl(url, name, slot) {
      return new Promise((resolve, reject) => {
        if (!url || typeof url !== "string") {
          reject(new Error("Texture URL is empty."));
          return;
        }

        const image = new Image();
        image.onload = () => {
          const tex = new THREE.Texture(image);
          tex.name = name || (TEXTURE_SLOT_PROFILES[slot] && TEXTURE_SLOT_PROFILES[slot].textureName) || "uploaded texture";
          applyTextureSlotProfile(tex, slot);
          tex.needsUpdate = true;
          resolve(tex);
        };
        image.onerror = () => reject(new Error("Could not decode texture image."));
        image.src = url;
      });
    }

    async function applySelectedSlotTexture(slot) {
      const profile = TEXTURE_SLOT_PROFILES[slot];
      const inputEl = slotInputs[slot];

      if (!profile) {
        setStatus("Unknown material texture slot: " + slot);
        return;
      }

      if (!scene) {
        setStatus("Load a JSON object before applying a texture.");
        return;
      }

      if (isSlotApplied(slot)) {
        const count = removeTextureSlotFromTarget(slot);
        updateApplyButtonStates();
        setStatus(count > 0 ?
          "Removed material." + slot + " from " + count + " material(s)." :
          "No material." + slot + " was present on the target material.");
        return;
      }

      try {
        const selected = await getSelectedOrDefaultImageUrl(inputEl, slot, profile.label);
        if (!selected) {
          setStatus("Choose a " + profile.label + " texture image first, or fill default_image_maps." + slot + ".");
          return;
        }

        setStatus("Loading " + selected.source + " " + profile.label + " texture " + selected.label + "...");
        const texture = await makeTextureFromUrl(selected.url, selected.label, slot);
        const count = applyTextureToTargetSlot(texture, selected.label, slot);
        updateApplyButtonStates();
        setStatus(count > 0 ?
          "Applied " + selected.label + " to material." + slot + " on " + count + " material(s). Click again to remove it." :
          "No mesh/material target was found for the texture.");
      } catch (err) {
        console.error(err);
        setStatus("Could not apply " + profile.label + " texture. See console.");
      }
    }

    async function applyRoughMetalTexture() {
      if (!scene) {
        setStatus("Load a JSON object before applying roughness/metalness.");
        return;
      }

      if (isRoughMetalApplied()) {
        const count = removeRoughMetalFromTarget();
        updateApplyButtonStates();
        setStatus(count > 0 ?
          "Removed material.roughnessMap and material.metalnessMap from " + count + " material(s)." :
          "No roughness/metalness maps were present on the target material.");
        return;
      }

      try {
        const selected = await getSelectedOrDefaultImageUrl(roughMetalInput, "roughMetal", "roughness/metalness");
        if (!selected) {
          setStatus("Choose one roughness/metalness image first, or fill default_image_maps.roughnessMap.");
          return;
        }

        setStatus("Loading " + selected.source + " roughness/metalness texture " + selected.label + "...");
        const texture = await makeTextureFromUrl(selected.url, selected.label, "roughnessMap");
        const count = applySharedRoughMetalTexture(texture, selected.label);
        updateApplyButtonStates();
        setStatus(count > 0 ?
          "Applied one shared " + selected.label + " texture to material.roughnessMap and material.metalnessMap on " + count + " material(s). Click again to remove both." :
          "No mesh/material target was found for the roughness/metalness texture.");
      } catch (err) {
        console.error(err);
        setStatus("Could not apply roughness/metalness texture. See console.");
      }
    }

    function applySharedRoughMetalTexture(texture, label) {
      const target = findTextureTargetObject();
      if (!target) return 0;

      const materials = Array.isArray(target.material) ? target.material : [target.material];
      let count = 0;

      for (const mat of materials) {
        if (!mat) continue;

        const tex = cloneTextureForSlot(texture, "roughnessMap");
        tex.name = "monitor_screen_mat_RoughnessMetalness";

        // Important: the same texture object is assigned to both slots, so there
        // is one runtime image reference, not duplicate image/base64 data.
        mat.roughnessMap = tex;
        mat.metalnessMap = tex;

        applyScreenMaterialProfile(mat);
        mat.needsUpdate = true;
        count++;
      }

      if (renderer && scene && camera) renderer.render(scene, camera);
      console.log("Applied shared roughness/metalness texture", label, "on", target.name || target.uuid);
      return count;
    }

    function applyTextureToTargetSlot(texture, label, slot) {
      const target = findTextureTargetObject();
      if (!target) return 0;

      const materials = Array.isArray(target.material) ? target.material : [target.material];
      let count = 0;

      for (const mat of materials) {
        if (!mat) continue;

        const tex = cloneTextureForSlot(texture, slot);
        mat[slot] = tex;

        applyScreenMaterialProfile(mat);
        mat.needsUpdate = true;
        count++;
      }

      if (renderer && scene && camera) renderer.render(scene, camera);
      console.log("Applied", slot, "texture", label, "on", target.name || target.uuid);
      return count;
    }

    function isSlotApplied(slot) {
      const target = findTextureTargetObject();
      if (!target || !target.material) return false;
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      return materials.some(mat => !!(mat && mat[slot] && mat[slot].isTexture));
    }

    function isRoughMetalApplied() {
      const target = findTextureTargetObject();
      if (!target || !target.material) return false;
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      return materials.some(mat => !!(mat && mat.roughnessMap && mat.roughnessMap.isTexture && mat.metalnessMap && mat.metalnessMap.isTexture));
    }

    function removeTextureSlotFromTarget(slot) {
      const target = findTextureTargetObject();
      if (!target || !target.material) return 0;
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      let count = 0;
      for (const mat of materials) {
        if (!mat || !(mat[slot] && mat[slot].isTexture)) continue;
        mat[slot] = null;
        mat.needsUpdate = true;
        count++;
      }
      if (renderer && scene && camera) renderer.render(scene, camera);
      return count;
    }

    function removeRoughMetalFromTarget() {
      const target = findTextureTargetObject();
      if (!target || !target.material) return 0;
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      let count = 0;
      for (const mat of materials) {
        if (!mat) continue;
        const hadRough = !!(mat.roughnessMap && mat.roughnessMap.isTexture);
        const hadMetal = !!(mat.metalnessMap && mat.metalnessMap.isTexture);
        if (!hadRough && !hadMetal) continue;
        mat.roughnessMap = null;
        mat.metalnessMap = null;
        mat.needsUpdate = true;
        count++;
      }
      if (renderer && scene && camera) renderer.render(scene, camera);
      return count;
    }

    function stripControlledTextureSlotsFromTarget() {
      const target = findTextureTargetObject();
      if (!target || !target.material) return 0;
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      const slots = ["map", "roughnessMap", "metalnessMap", "emissiveMap"];
      let count = 0;
      for (const mat of materials) {
        if (!mat) continue;
        for (const slot of slots) {
          if (mat[slot]) {
            mat[slot] = null;
            count++;
          }
        }
        mat.side = THREE.DoubleSide;
        mat.needsUpdate = true;
      }
      updateApplyButtonStates();
      return count;
    }

    function updateApplyButtonStates() {
      const state = {
        map: isSlotApplied("map"),
        emissiveMap: isSlotApplied("emissiveMap"),
        roughMetal: isRoughMetalApplied()
      };

      setApplyButtonState(slotButtons.map, state.map, "APPLY BASE", "REMOVE BASE");
      setApplyButtonState(slotButtons.emissiveMap, state.emissiveMap, "APPLY EMISSIVE", "REMOVE EMISSIVE");
      setApplyButtonState(applyRoughMetalButton, state.roughMetal, "APPLY ROUGH/METAL", "REMOVE ROUGH/METAL");
    }

    function setApplyButtonState(button, isApplied, applyLabel, removeLabel) {
      if (!button) return;
      button.textContent = isApplied ? removeLabel : applyLabel;
      button.classList.toggle("active", !!isApplied);
      button.setAttribute("aria-pressed", isApplied ? "true" : "false");
    }

    function findTextureTargetObject() {
      if (!scene) return null;

      // Prefer the editor/Apple II screen mesh. If absent, fall back to the first mesh
      // with a material so the tool can project textures on arbitrary loaded objects.
      const screen = findObjectByNamePath(["Apple II", "monitor_base", "screen"]) ||
                     findObjectByNameContains(scene, "screen");
      if (screen && screen.isMesh && screen.material) return screen;

      let firstMesh = null;
      scene.traverse(obj => {
        if (!firstMesh && obj.isMesh && obj.material) firstMesh = obj;
      });
      return firstMesh;
    }

    function cloneTextureForSlot(sourceTexture, slot) {
      const tex = sourceTexture.clone();
      tex.image = sourceTexture.image;
      tex.name = sourceTexture.name || (TEXTURE_SLOT_PROFILES[slot] && TEXTURE_SLOT_PROFILES[slot].textureName) || "uploaded texture";

      // UUIDs/images are naturally regenerated by Three at runtime.
      applyTextureSlotProfile(tex, slot);
      tex.needsUpdate = true;
      return tex;
    }

    function resetTextureTransform(texture, slot) {
      applyTextureSlotProfile(texture, slot || "emissiveMap");
    }

    function applyTextureSlotProfile(texture, slot) {
      const profile = TEXTURE_SLOT_PROFILES[slot] || TEXTURE_SLOT_PROFILES.emissiveMap;

      texture.name = texture.name || profile.textureName;
      texture.mapping = THREE.UVMapping;
      texture.channel = 0;
      texture.wrapS = profile.wrapS;
      texture.wrapT = profile.wrapT;
      texture.repeat.set(1, 1);
      texture.offset.set(0, 0);
      texture.center.set(0, 0);
      texture.rotation = 0;
      texture.format = THREE.RGBAFormat;
      texture.internalFormat = null;
      texture.type = THREE.UnsignedByteType;
      texture.colorSpace = profile.colorSpace;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.anisotropy = 1;
      texture.flipY = !!profile.flipY;
      texture.generateMipmaps = true;
      texture.premultiplyAlpha = false;
      texture.unpackAlignment = 4;
      texture.matrixAutoUpdate = true;
      texture.needsUpdate = true;
    }

    function applyEditorEmissiveTextureProfile(texture) {
      // Compatibility alias for older helper calls.
      applyTextureSlotProfile(texture, "emissiveMap");
    }

    function refreshCurrentTextureTransform() {
      if (!scene || !renderer || !camera) return;

      const target = findTextureTargetObject();
      if (!target || !target.material) return;

      const materials = Array.isArray(target.material) ? target.material : [target.material];
      const seen = new Set();
      let textureCount = 0;
      let materialCount = 0;

      for (const mat of materials) {
        if (!mat) continue;

        mat.side = THREE.DoubleSide;
        applyLuminosityToMaterial(mat);
        mat.needsUpdate = true;
        materialCount++;

        for (const slot of Object.keys(TEXTURE_SLOT_PROFILES)) {
          const tex = mat[slot];
          if (!tex || !tex.isTexture || seen.has(tex.uuid)) continue;
          seen.add(tex.uuid);
          resetTextureTransform(tex, slot);
          normalizeLoadedTexture(tex, slot);
          tex.needsUpdate = true;
          textureCount++;
        }
      }

      renderer.render(scene, camera);
      setStatus(
        "Applied normalized per-slot texture profiles to " + textureCount + " texture(s), " +
        materialCount + " screen material(s)."
      );
    }

    function getLuminosityValue() {
      const v = Number(luminositySlider.value);
      return Number.isFinite(v) ? Math.max(0, v) : 1;
    }

    function applyScreenMaterialProfile(mat) {
      if (!mat) return false;

      // Matches the intended monitor_screen_mat scalar profile. Texture-map slots
      // are intentionally not created here; APPLY buttons add/remove those slots.
      if (mat.color) mat.color.set(0xffffff);
      if (mat.emissive !== undefined) mat.emissive = new THREE.Color(45930);
      if (mat.roughness !== undefined) mat.roughness = 1;
      if (mat.metalness !== undefined) mat.metalness = 0;
      if (mat.envMapIntensity !== undefined) mat.envMapIntensity = 1;

      mat.side = THREE.DoubleSide;
      applyLuminosityToMaterial(mat);
      mat.needsUpdate = true;
      return true;
    }

    function applyLuminosityToMaterial(mat) {
      if (!mat || mat.emissive === undefined) return false;
      mat.emissiveIntensity = getLuminosityValue();
      mat.needsUpdate = true;
      return true;
    }

    function applyLuminositySlider(showStatus) {
      if (!luminositySlider || !luminosityValue) return;
      const value = getLuminosityValue();
      luminosityValue.textContent = value.toFixed(2);

      if (!scene) {
        if (showStatus) setStatus("Load a scene before changing material luminosity.");
        return;
      }

      const target = findTextureTargetObject();
      if (!target || !target.material) {
        if (showStatus) setStatus("No emissive target material found.");
        return;
      }

      const materials = Array.isArray(target.material) ? target.material : [target.material];
      let count = 0;
      for (const mat of materials) {
        if (applyLuminosityToMaterial(mat)) count++;
      }

      if (renderer && scene && camera) renderer.render(scene, camera);
      if (showStatus) setStatus("Luminosity/emissive intensity set to " + value.toFixed(2) + " on " + count + " material(s).");
    }

    function syncLuminosityControlFromTarget() {
      const target = findTextureTargetObject();
      let value = Number(luminositySlider.value);

      if (target && target.material) {
        const materials = Array.isArray(target.material) ? target.material : [target.material];
        const emissiveMat = materials.find(mat => mat && mat.emissive !== undefined && Number.isFinite(Number(mat.emissiveIntensity)));
        if (emissiveMat) value = Number(emissiveMat.emissiveIntensity);
      }

      value = Math.max(Number(luminositySlider.min || 0), Math.min(Number(luminositySlider.max || 20), value));
      luminositySlider.value = String(value);
      luminosityValue.textContent = value.toFixed(2);
    }

    function dumpTargetMaterialSummary(target, label) {
      const materials = Array.isArray(target.material) ? target.material : [target.material];
      writeOutput(JSON.stringify({
        appliedTexture: label || "texture",
        target: {
          name: target.name,
          uuid: target.uuid,
          type: target.type
        },
        appliedTransformMode: "normalized",
        materials: materials.map(summarizeMaterial)
      }, null, 2));
    }

    function applyProjectSettings(project) {
      renderer.shadowMap.enabled = Boolean(project.shadows);

      renderer.shadowMap.type =
        project.shadowType === 3 ? THREE.VSMShadowMap :
        project.shadowType === 2 ? THREE.PCFSoftShadowMap :
                                   THREE.PCFShadowMap;

      renderer.toneMapping =
        project.toneMapping === 1 ? THREE.ReinhardToneMapping :
        project.toneMapping === 2 ? THREE.CineonToneMapping :
        project.toneMapping === 3 ? THREE.ACESFilmicToneMapping :
                                    THREE.LinearToneMapping;

      renderer.toneMappingExposure =
        Number.isFinite(Number(project.toneMappingExposure)) ?
          Number(project.toneMappingExposure) : 1;
    }

    function buildCameraFromProject(cameraJson) {
      const c = cameraJson && cameraJson.object;
      let cam;

      if (c && c.type === "PerspectiveCamera") {
        cam = new THREE.PerspectiveCamera(
          c.fov || 50,
          viewportAspect(),
          c.near || 0.01,
          c.far || 1000
        );

        cam.name = c.name || "Camera";
        cam.zoom = c.zoom || 1;
        cam.focus = c.focus || 10;
        cam.filmGauge = c.filmGauge || 35;
        cam.filmOffset = c.filmOffset || 0;

        if (Array.isArray(c.matrix) && c.matrix.length === 16) {
          const m4 = new THREE.Matrix4().fromArray(c.matrix);
          cam.matrix.copy(m4);
          cam.matrix.decompose(cam.position, cam.quaternion, cam.scale);
        } else if (Array.isArray(c.position)) {
          cam.position.fromArray(c.position);
        } else {
          cam.position.set(0, 0, 8);
        }

        if (Array.isArray(c.up)) cam.up.fromArray(c.up);
        if (c.layers !== undefined) cam.layers.mask = c.layers;
      } else {
        cam = new THREE.PerspectiveCamera(50, viewportAspect(), 0.01, 1000);
        cam.position.set(0, 0, 8);
      }

      cam.updateProjectionMatrix();
      cam.updateMatrixWorld(true);
      return cam;
    }

    function restoreProjectCamera() {
      if (!lastProjectCamera) {
        setStatus("No project camera is available.");
        return;
      }

      camera = buildCameraFromProject(lastProjectCamera);
      camera.aspect = viewportAspect();
      camera.updateProjectionMatrix();
      syncFovControlFromCamera();

      installOrbitControls();
      retargetControlsToLoadedObject();
      refreshLightMoveMode();

      setStatus("Restored project camera" + (lastFilename ? " for " + lastFilename : "") + ".");
    }

    function installOrbitControls() {
      if (!camera || !renderer) return;

      if (controls) {
        controls.dispose();
        controls = null;
      }

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.screenSpacePanning = true;
      controls.autoRotate = false;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.enableRotate = true;
      controls.listenToKeyEvents(window);
      controls.addEventListener("change", () => updateLightCoordinates());
      updateLightCoordinates();
    }

    function toggleLightMoveMode() {
      lightMoveEnabled = !lightMoveEnabled;
      refreshLightMoveMode();
    }

    function refreshLightMoveMode() {
      if (!moveLightButton) return;

      moveLightButton.classList.toggle("active", lightMoveEnabled);
      moveLightButton.textContent = lightMoveEnabled ? "MOVE LIGHT: ON" : "MOVE LIGHT: OFF";
      moveLightButton.setAttribute("aria-pressed", lightMoveEnabled ? "true" : "false");

      if (!lightMoveEnabled) {
        disableLightMoveMode();
        return;
      }

      if (!scene || !camera || !renderer) {
        setStatus("Load a scene before enabling light movement.");
        lightMoveEnabled = false;
        refreshLightMoveMode();
        return;
      }

      enableLightMoveMode();
    }

    function findPointLight(root) {
      if (!root) return null;
      let found = null;
      root.traverse(obj => {
        if (!found && obj.isPointLight) found = obj;
      });
      return found;
    }

    function ensurePointLight() {
      let light = findPointLight(scene);
      if (light) return light;

      const center = lastSceneBox ? lastSceneBox.getCenter(new THREE.Vector3()) : new THREE.Vector3(0, 0, 0);
      const size = lastSceneBox ? lastSceneBox.getSize(new THREE.Vector3()) : new THREE.Vector3(2, 2, 2);
      const span = Math.max(size.x, size.y, size.z, 1);

      light = new THREE.PointLight(0xffffff, 0, 0, 3);
      light.name = "PointLight";
      //light.position.copy(center).add(new THREE.Vector3(span * 0.35, span * 0.55, span * 0.65));
      light.position.copy(center).add(new THREE.Vector3(0, 0, span * 1));
      scene.add(light);
      updateLightCoordinates(light);
      return light;
    }

    function enableLightMoveMode() {
      activePointLight = ensurePointLight();

      if (controls) {
        // In light-move mode, dragging the canvas must not continue to orbit the camera.
        controls.enabled = false;
      }

      if (!transformControls) {
        transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.setMode("translate");
        transformControls.setSize(0.8);
        transformControls.name = "__THREEJS_loader_light_transform";
        transformControls.addEventListener("dragging-changed", event => {
          if (controls) controls.enabled = !lightMoveEnabled && !event.value;
        });
        transformControls.addEventListener("objectChange", () => {
          updateLightHelper();
          updateLightCoordinates(activePointLight);
        });
        transformControls.addEventListener("change", () => {
          if (renderer && scene && camera) renderer.render(scene, camera);
        });

        transformHelper = typeof transformControls.getHelper === "function" ?
          transformControls.getHelper() : transformControls;
      } else {
        transformControls.camera = camera;
        transformHelper = typeof transformControls.getHelper === "function" ?
          transformControls.getHelper() : transformControls;
      }

      if (transformHelper && transformHelper.parent !== scene) {
        scene.add(transformHelper);
      }

      transformControls.attach(activePointLight);
      installLightDragHandlers();
      showLightHelper(activePointLight);
      updateLightCoordinates(activePointLight);
      setStatus("Move light mode is on. Drag the gizmo, or drag anywhere on the canvas, to move the point light. Camera orbit is disabled while this mode is on.");
    }

    function disableLightMoveMode() {
      removeLightDragHandlers();
      lightDragActive = false;
      lightDragPointerId = null;

      if (transformControls) transformControls.detach();
      if (transformHelper && transformHelper.parent) transformHelper.parent.remove(transformHelper);
      if (controls) controls.enabled = true;
      if (lightHelper && lightHelper.parent) lightHelper.parent.remove(lightHelper);
      lightHelper = null;
      activePointLight = null;
      updateLightCoordinates();
    }

    function installLightDragHandlers() {
      if (!renderer || !renderer.domElement) return;
      const el = renderer.domElement;
      removeLightDragHandlers();
      el.addEventListener("pointerdown", onLightPointerDown, true);
      el.addEventListener("pointermove", onLightPointerMove, true);
      el.addEventListener("pointerup", onLightPointerUp, true);
      el.addEventListener("pointercancel", onLightPointerUp, true);
    }

    function removeLightDragHandlers() {
      if (!renderer || !renderer.domElement) return;
      const el = renderer.domElement;
      el.removeEventListener("pointerdown", onLightPointerDown, true);
      el.removeEventListener("pointermove", onLightPointerMove, true);
      el.removeEventListener("pointerup", onLightPointerUp, true);
      el.removeEventListener("pointercancel", onLightPointerUp, true);
    }

    function onLightPointerDown(event) {
      if (!lightMoveEnabled || !activePointLight || !camera) return;
      if (event.button !== undefined && event.button !== 0) return;

      event.preventDefault();
      event.stopPropagation();

      lightDragActive = true;
      lightDragPointerId = event.pointerId;

      try { renderer.domElement.setPointerCapture(event.pointerId); } catch(e) {}

      const normal = new THREE.Vector3();
      camera.getWorldDirection(normal);
      lightDragPlane.setFromNormalAndCoplanarPoint(normal, activePointLight.position);

      const hit = pointerPlaneIntersection(event);
      if (hit) lightDragOffset.copy(activePointLight.position).sub(hit);
      else lightDragOffset.set(0, 0, 0);
    }

    function onLightPointerMove(event) {
      if (!lightMoveEnabled || !lightDragActive || !activePointLight) return;
      if (lightDragPointerId !== null && event.pointerId !== lightDragPointerId) return;

      event.preventDefault();
      event.stopPropagation();

      const hit = pointerPlaneIntersection(event);
      if (!hit) return;

      activePointLight.position.copy(hit).add(lightDragOffset);
      activePointLight.updateMatrixWorld(true);
      updateLightHelper();
      updateLightCoordinates(activePointLight);
      if (transformControls) transformControls.updateMatrixWorld(true);
      if (renderer && scene && camera) renderer.render(scene, camera);
    }

    function onLightPointerUp(event) {
      if (!lightDragActive) return;
      if (lightDragPointerId !== null && event.pointerId !== lightDragPointerId) return;

      event.preventDefault();
      event.stopPropagation();

      try { renderer.domElement.releasePointerCapture(event.pointerId); } catch(e) {}
      lightDragActive = false;
      lightDragPointerId = null;
    }

    function pointerPlaneIntersection(event) {
      if (!renderer || !camera) return null;

      const rect = renderer.domElement.getBoundingClientRect();
      lightDragNdc.x = ((event.clientX - rect.left) / Math.max(1, rect.width)) * 2 - 1;
      lightDragNdc.y = -(((event.clientY - rect.top) / Math.max(1, rect.height)) * 2 - 1);

      lightDragRaycaster.setFromCamera(lightDragNdc, camera);
      const hit = lightDragRaycaster.ray.intersectPlane(lightDragPlane, lightDragPoint);
      return hit ? lightDragPoint.clone() : null;
    }

    function updateLightHelper() {
      if (lightHelper) lightHelper.update();
    }

    function hasReadablePosition(obj) {
      return !!obj && !!obj.position &&
        Number.isFinite(obj.position.x) &&
        Number.isFinite(obj.position.y) &&
        Number.isFinite(obj.position.z);
    }

    function updateLightCoordinates(light) {
      if (!lightCoordsEl) return;

      // OrbitControls/TransformControls change listeners pass an event object.
      // Do not treat that event as a light; use the active/found PointLight instead.
      const candidate = hasReadablePosition(light) ? light : null;
      const l = candidate ||
        (hasReadablePosition(activePointLight) ? activePointLight : null) ||
        findPointLight(scene);

      if (!hasReadablePosition(l)) {
        lightCoordsEl.textContent = "light: —";
        return;
      }

      lightCoordsEl.textContent = "light: x=" + l.position.x.toFixed(3) +
        " y=" + l.position.y.toFixed(3) +
        " z=" + l.position.z.toFixed(3);
    }

    function showLightHelper(light) {
      if (!scene || !light) return;

      if (lightHelper && lightHelper.parent) lightHelper.parent.remove(lightHelper);
      lightHelper = new THREE.PointLightHelper(light, 0.12);
      lightHelper.name = "__THREEJS_loader_point_light_helper";
      scene.add(lightHelper);
      lightHelper.update();
    }

    function computeSceneBox(root) {
      if (!root) return null;

      root.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(root);
      if (box.isEmpty()) return null;

      const size = box.getSize(new THREE.Vector3());
      if (!Number.isFinite(size.length()) || size.lengthSq() === 0) return null;

      return box;
    }

    function retargetControlsToLoadedObject() {
      if (!controls) return;

      const target = new THREE.Vector3();
      if (lastSceneBox) lastSceneBox.getCenter(target);
      else target.set(0, 0, 0);

      controls.target.copy(target);
      controls.update();
      controls.saveState();

      console.log(
        "Orbit target =",
        target.x.toFixed(3),
        target.y.toFixed(3),
        target.z.toFixed(3)
      );
    }


    function syncFovControlFromCamera() {
      if (!camera || !camera.isPerspectiveCamera || !fovSlider || !fovValue) return;
      const fov = Math.max(Number(fovSlider.min), Math.min(Number(fovSlider.max), Math.round(camera.fov || 50)));
      fovSlider.value = String(fov);
      fovValue.textContent = fov + "°";
    }

    function setCameraFov(nextFov, preserveFraming) {
      if (!camera || !camera.isPerspectiveCamera) {
        setStatus("Perspective control requires a PerspectiveCamera.");
        return;
      }

      nextFov = Number(nextFov);
      if (!Number.isFinite(nextFov)) return;

      const minFov = Number(fovSlider.min || 5);
      const maxFov = Number(fovSlider.max || 90);
      nextFov = Math.max(minFov, Math.min(maxFov, nextFov));

      const oldFov = camera.fov || 50;
      const target = controls ? controls.target.clone() :
        (lastSceneBox ? lastSceneBox.getCenter(new THREE.Vector3()) : new THREE.Vector3(0, 0, 0));

      if (preserveFraming && Math.abs(nextFov - oldFov) > 1e-6) {
        const viewDir = new THREE.Vector3().subVectors(camera.position, target);
        const oldDistance = viewDir.length();

        if (oldDistance > 1e-6) {
          const oldFovRad = THREE.MathUtils.degToRad(oldFov);
          const newFovRad = THREE.MathUtils.degToRad(nextFov);
          const visibleHeightAtTarget = 2 * oldDistance * Math.tan(oldFovRad * 0.5);
          const newDistance = visibleHeightAtTarget / (2 * Math.tan(newFovRad * 0.5));

          viewDir.normalize();
          camera.position.copy(target).add(viewDir.multiplyScalar(newDistance));
          camera.near = Math.max(newDistance / 1000, 0.001);
          camera.far = Math.max(newDistance * 1000, 1000);
        }
      }

      camera.fov = nextFov;
      camera.aspect = viewportAspect();
      camera.updateProjectionMatrix();
      camera.lookAt(target);
      camera.updateMatrixWorld(true);

      if (controls) {
        controls.target.copy(target);
        controls.update();
      }

      syncFovControlFromCamera();
      setStatus("Perspective/FOV set to " + Math.round(nextFov) + "°. Lower values reduce perspective warping.");
    }

    function frameLoadedObject(saveAsReset) {
      if (!camera || !controls || !lastSceneBox) {
        setStatus("No loaded object to frame.");
        return;
      }

      const center = lastSceneBox.getCenter(new THREE.Vector3());
      const size = lastSceneBox.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 0.001);

      const fovRad = THREE.MathUtils.degToRad(camera.fov || 50);
      let distance = (maxDim * 0.5) / Math.tan(fovRad * 0.5);
      distance *= 1.35;

      const direction = new THREE.Vector3().subVectors(camera.position, controls.target);
      if (direction.lengthSq() < 1e-8) direction.set(0, 0, 1);
      direction.normalize();

      controls.target.copy(center);
      camera.position.copy(center).add(direction.multiplyScalar(distance));

      camera.near = Math.max(distance / 1000, 0.001);
      camera.far = Math.max(distance * 1000, 1000);
      camera.aspect = viewportAspect();
      camera.updateProjectionMatrix();
      camera.lookAt(center);
      camera.updateMatrixWorld(true);

      controls.minDistance = Math.max(distance / 100, 0.001);
      controls.maxDistance = Math.max(distance * 100, 10);
      controls.update();

      if (saveAsReset) controls.saveState();
      syncFovControlFromCamera();

      setStatus("Framed loaded object" + (lastFilename ? " from " + lastFilename : "") + ".");
    }

    function patchBrokenMaterialTextures(root, replacementTexture) {
      if (!root) return 0;

      const textureSlots = [
        "map", "emissiveMap", "alphaMap", "aoMap", "bumpMap", "normalMap",
        "roughnessMap", "metalnessMap", "envMap", "lightMap", "displacementMap"
      ];

      let count = 0;

      root.traverse(obj => {
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of materials) {
          if (!mat) continue;

          for (const slot of textureSlots) {
            const tex = mat[slot];
            if (!tex || !tex.isTexture) continue;

            if (isTextureImageBroken(tex)) {
              const replacement = replacementTexture ?
                cloneTextureForSlot(replacementTexture, slot) :
                makePlaceholderCanvasTexture(tex, obj.name || mat.name || slot, slot);
              mat[slot] = replacement;

              mat.needsUpdate = true;
              count++;
            } else {
              normalizeLoadedTexture(tex, slot);
            }
          }
        }
      });

      return count;
    }

    function isTextureImageBroken(texture) {
      const image = texture && texture.image;
      if (!image) return true;

      // HTMLImageElement may exist before its data is decoded. If it is not ready
      // before the first render, replace it with a canvas texture to prevent
      // texSubImage2D/glTexStorage2D zero-dimension errors.
      const width = image.width || image.naturalWidth || image.videoWidth || 0;
      const height = image.height || image.naturalHeight || image.videoHeight || 0;
      return width < 1 || height < 1;
    }

    function normalizeLoadedTexture(texture, slot) {
      applyTextureSlotProfile(texture, slot || "emissiveMap");
    }

    function makePlaceholderCanvasTexture(sourceTexture, label, slot) {
      const canvas = document.createElement("canvas");
      canvas.width = 560;
      canvas.height = 384;

      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // A low-cost diagnostic pattern that makes the screen mesh visible.
      ctx.fillStyle = "#102010";
      for (let y = 0; y < canvas.height; y += 32) {
        for (let x = (y / 32) % 2 ? 32 : 0; x < canvas.width; x += 64) {
          ctx.fillRect(x, y, 32, 32);
        }
      }

      ctx.strokeStyle = "#00ff66";
      ctx.lineWidth = 8;
      ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);

      ctx.fillStyle = "#00ff66";
      ctx.font = "bold 28px ui-monospace, Menlo, Consolas, monospace";
      ctx.textAlign = "center";
      ctx.fillText("MISSING TEXTURE", canvas.width / 2, canvas.height / 2 - 12);

      ctx.font = "18px ui-monospace, Menlo, Consolas, monospace";
      ctx.fillText(String(label || "texture"), canvas.width / 2, canvas.height / 2 + 24);

      const tex = new THREE.CanvasTexture(canvas);
      tex.name = sourceTexture && sourceTexture.name ? sourceTexture.name : "__loader_missing_texture";
      resetTextureTransform(tex);
      normalizeLoadedTexture(tex, slot);
      tex.needsUpdate = true;
      return tex;
    }

    function addHelpers() {
      if (!scene) return;

      helpers = new THREE.Group();
      helpers.name = "__THREEJS_loader_helpers";
      helpers.add(new THREE.GridHelper(200, 20));
      helpers.add(new THREE.AxesHelper(60));
      scene.add(helpers);

      syncHelpersVisibility();
    }

    function syncHelpersVisibility() {
      if (helpers) helpers.visible = helpersToggle.checked;
    }

    function dumpScreenMaterial() {
      if (!scene) {
        writeOutput("No scene loaded.");
        return;
      }

      const screen =
        findObjectByNamePath(["Apple II", "monitor_base", "screen"]) ||
        findObjectByNameContains(scene, "screen");

      if (!screen) {
        writeOutput("No object with a name containing 'screen' was found.");
        return;
      }

      const material = Array.isArray(screen.material) ? screen.material[0] : screen.material;
      console.log("Screen object:", screen);
      console.log("Screen material:", material);

      writeOutput(JSON.stringify({
        object: {
          name: screen.name,
          uuid: screen.uuid,
          type: screen.type
        },
        material: summarizeMaterial(material),
        patchedTextureCount
      }, null, 2));
    }

    function findObjectByNamePath(path) {
      if (!scene || !Array.isArray(path)) return null;

      let cursor = scene;
      for (const namePart of path) {
        cursor = cursor.children.find(child =>
          child.name && child.name.indexOf(namePart) >= 0
        );
        if (!cursor) return null;
      }
      return cursor;
    }

    function findObjectByNameContains(root, namePart) {
      let found = null;
      root.traverse(obj => {
        if (found) return;
        if (obj.name && obj.name.toLowerCase().indexOf(namePart.toLowerCase()) >= 0) {
          found = obj;
        }
      });
      return found;
    }

    function summarizeMaterial(material) {
      if (!material) return null;

      const summary = {
        name: material.name || "",
        type: material.type || "",
        color: material.color ? "#" + material.color.getHexString() : null,
        emissive: material.emissive ? "#" + material.emissive.getHexString() : null,
        emissiveIntensity: material.emissiveIntensity,
        roughness: material.roughness,
        metalness: material.metalness,
        opacity: material.opacity,
        transparent: material.transparent,
        needsUpdate: material.needsUpdate === true
      };

      // Only include material texture properties after the corresponding APPLY
      // toggle has actually attached a texture. This keeps the dumped structure
      // aligned with the runtime material state.
      if (material.map && material.map.isTexture) summary.map = summarizeTexture(material.map);
      if (material.roughnessMap && material.roughnessMap.isTexture) summary.roughnessMap = summarizeTexture(material.roughnessMap);
      if (material.metalnessMap && material.metalnessMap.isTexture) summary.metalnessMap = summarizeTexture(material.metalnessMap);
      if (material.emissiveMap && material.emissiveMap.isTexture) summary.emissiveMap = summarizeTexture(material.emissiveMap);

      return summary;
    }

    function summarizeTexture(texture) {
      if (!texture) return null;

      const image = texture.image;
      return {
        name: texture.name || "",
        uuid: texture.uuid,
        isCanvasTexture: texture.isCanvasTexture === true,
        colorSpace: texture.colorSpace,
        flipY: texture.flipY,
        wrapS: texture.wrapS,
        wrapT: texture.wrapT,
        repeat: texture.repeat ? texture.repeat.toArray() : null,
        offset: texture.offset ? texture.offset.toArray() : null,
        minFilter: texture.minFilter,
        magFilter: texture.magFilter,
        generateMipmaps: texture.generateMipmaps,
        image: image ? {
          width: image.width || image.naturalWidth || null,
          height: image.height || image.naturalHeight || null,
          src: image.src ? String(image.src).slice(0, 160) : null
        } : null
      };
    }

    function disposeCurrentScene() {
      disableLightMoveMode();

      if (transformControls) {
        if (transformControls.parent) transformControls.parent.remove(transformControls);
        if (typeof transformControls.dispose === "function") transformControls.dispose();
        transformControls = null;
      }

      if (controls) {
        controls.dispose();
        controls = null;
      }

      if (!scene) return;

      scene.traverse(obj => {
        if (obj.geometry && typeof obj.geometry.dispose === "function") {
          obj.geometry.dispose();
        }

        const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const material of materials) {
          if (!material) continue;

          const disposedTextures = new Set();
          for (const key of Object.keys(material)) {
            const value = material[key];
            if (value && value.isTexture && typeof value.dispose === "function" && !disposedTextures.has(value)) {
              disposedTextures.add(value);
              value.dispose();
            }
          }

          if (typeof material.dispose === "function") {
            material.dispose();
          }
        }
      });

      if (renderer) renderer.renderLists.dispose();

      scene = null;
      camera = null;
      helpers = null;
      lastSceneBox = null;
      outputEl.style.display = "none";
    }

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      updateLightCoordinates();
      if (renderer && scene && camera) renderer.render(scene, camera);
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function writeOutput(text) {
      outputEl.textContent = text;
      outputEl.style.display = "block";
    }
  })();
    }

    function showThreeJSLoadError(event) {
      const error = event && event.detail ? event.detail : window.THREEJS_R184_ERROR;
      const status = document.getElementById("status");
      if (status) status.textContent = "Could not load Three.js r184 dependencies. See console.";
      console.error("Could not load Three.js r184 dependencies.", error);
    }

    if (window.THREE && window.OrbitControls && window.TransformControls) {
      bootLoader();
    } else {
      window.addEventListener("THREEJS_R184_READY", bootLoader, { once: true });
      window.addEventListener("THREEJS_R184_FAILED", showThreeJSLoadError, { once: true });
    }
  })();
  </script>
</body>
</html>
