<body style="background-color:rgb(233, 223, 217)">
<style>
:root
{
  --slot-w:35px;
  --slot-gap:1px;
  --slot-pad-y:6px;
  --slot-min-h:30px;
  --anchor-bottom:-4px;
  --anchor-bottom-empty:-2px;
  --glyph-alpha:0.2;
  --touch-hit:24px;
}

.appbox
{
  font-family: "Arial";
  font-size:13px;
  margin:1px;
  padding:6px;
  border-radius:5px;
  border-style:none;
  background:rgba(255,255,255,0.8);
  text-align:center;
  z-index:1;
  box-sizing:border-box;
}

#device_slots
{
  display:flex;
  gap:var(--slot-gap);
  align-items:flex-start;
}

.slotbox
{
  width:var(--slot-w);
  padding:var(--slot-pad-y) 0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
}

.slot-label
{
  font-weight:normal;
  margin:0;
}

.sloticons
{
  position:relative;
  width:100%;
  min-height:var(--slot-min-h);
}

.cogbtn,
.slot-add,
.drag-handle
{
  position:relative;
  display:block;
  margin:0 auto !important;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.cogbtn
{
  z-index:3;
  cursor:pointer;
}


.slot-anchor
{
  position:absolute;
  left:0;
  right:0;
  bottom:var(--anchor-bottom);
  text-align:center;
}

.slot-anchor.empty
{
  bottom:var(--anchor-bottom-empty);
}

.dots,
.drag-handle .fa,
.slot-add .fa
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:var(--glyph-alpha);
  margin:0;
  padding:0;
  z-index:1;
}

.peripheral-name
{
  display:block;
  min-height:24px;
  font-size:11px;
  word-break:break-word;
}

.drag-handle
{
  width:var(--touch-hit);
  height:18px;
  cursor:grab;
  user-select:none; 
}

.drag-handle:active
{
  cursor:grabbing;
}

.drag-handle .fa:first-child
{
 bottom:5px;
}

.drag-handle .fa:last-child
{
  bottom:0;
}

.slot-add
{
  border:0;
  border-radius:999px;
  background:rgba(255,255,255,0.95);
  cursor:pointer;
  font-size:14px;
  width:var(--touch-hit);
  height:18px;
}

.slot-add .fa
{
  bottom:-1px;
}

.slot-add:hover
{
  background:rgba(255,255,255,1);
}


.slot.armed
{
  outline:1px dashed rgba(0,0,0,0.25);
  outline-offset:1px;
}

.slot-anchor.drop-ok
{
  outline:1px dashed rgba(0,0,0,0.25);
  outline-offset:1px;
}

.slot,
.slot *
{
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.drag-handle
{
  touch-action:none;
}

body.dragging
{
  cursor:grabbing;
}

.drag-ghost
{
  position:fixed;
  left:0;
  top:0;
  width:var(--touch-hit);
  height:18px;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}

.drag-ghost .fa
{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  line-height:1;
  opacity:0.55;
  margin:0;
  padding:0;
}

.drag-ghost .fa:first-child
{
  bottom:5px;
}

.drag-ghost .fa:last-child
{
  bottom:0;
}


@media (pointer:coarse)
{
  :root
  {
    --slot-w:40px;
    --touch-hit:32px;
  }

  .cogbtn,
  .slot-add,
  .drag-handle
  {
    min-width:var(--touch-hit);
  }
}


</style>

<div class=toolbox id="device_slots">

</div>


<script>
const slots = [
  { slotId: "board", label: "board", locked: true,  peripheral: { id: "mainboard", name: "BOARD" } },
  { slotId: "0",     label: "#0",    locked: false, peripheral: { id: "ramcard", name: "MS16K" } },
  { slotId: "1",     label: "#1",    locked: false, peripheral: null },
  { slotId: "2",     label: "#2",    locked: false, peripheral: null },
  { slotId: "3",     label: "#3",    locked: false, peripheral: { id: "col80card", name: "VIDEX" } },
  { slotId: "4",     label: "#4",    locked: false, peripheral: null },
  { slotId: "5",     label: "#5",    locked: false, peripheral: null },
  { slotId: "6",     label: "#6",    locked: false, peripheral: { id: "disk2", name: "DISKII" } },
  { slotId: "7",     label: "#7",    locked: false, peripheral: null }
];

let dragFromSlotId = null;

function renderSlots()
{
  const host = document.getElementById("device_slots");
  host.innerHTML = slots.map(renderSlot).join("");
  wireEvents();
}

let pointerDrag = null;

function renderSlot(slot)
{
  return `
    <div class="appbox slotbox slot" data-slot-id="${slot.slotId}">
      <div class="slot-label">${slot.label}</div>

      <div class="sloticons">
      ${ slot.peripheral ? `<button class="appbut cogbtn" type="button"><i class="fa fa-cog"></i></button>`:"" }
      ${renderAnchor(slot)}
      </div>

    </div>
  `;
}

function renderAnchor(slot)
{
  const anchorId = "d_slot" + slot.slotId;

  if (slot.peripheral)
  {
    return `
      <div
        class="slot-anchor occupied ${slot.locked ? "locked" : "movable"}"
        id="${anchorId}"
        data-slot-id="${slot.slotId}">
        <div class="peripheral-card">
          <!--span class="peripheral-name">${slot.peripheral.name}</span-->

          ${
            slot.locked ?
              "":`<span class="drag-handle" draggable="true" title="Move ${slot.peripheral.name}">
                  <i class="fa fa-ellipsis-h dots dots1"></i>
                  <i class="fa fa-ellipsis-h dots"></i>
                </span>`
          }
        </div>
      </div>
    `;
  }

  return `
    <div
      class="slot-anchor empty"
      id="${anchorId}"
      data-slot-id="${slot.slotId}">
      <button class="slot-add" type="button" title="Add peripheral to ${slot.label}">
        <i class="fa fa-plus dots dots1"></i>
      </button>
    </div>
  `;
}

function wireEvents()
{
  document.querySelectorAll(".drag-handle").forEach(el =>
  {
    el.addEventListener("dragstart", onDragStart);
    el.addEventListener("dragend", onDragEnd);
    el.addEventListener("pointerdown", onPointerDragStart);
  });

  document.querySelectorAll(".slot-anchor.empty").forEach(el =>
  {
    el.addEventListener("dragover", onDragOver);
    el.addEventListener("dragenter", onDragEnter);
    el.addEventListener("dragleave", onDragLeave);
    el.addEventListener("drop", onDrop);
  });

  document.querySelectorAll(".slot-add").forEach(el =>
  {
    el.addEventListener("click", onAddClick);
  });
}

function onDragStart(ev)
{
  const slotEl = ev.currentTarget.closest(".slot");
  dragFromSlotId = slotEl.dataset.slotId;

  ev.dataTransfer.effectAllowed = "move";
  ev.dataTransfer.setData("text/plain", dragFromSlotId);

  slotEl.classList.add("drag-source");
}

function onDragEnd()
{
  dragFromSlotId = null;
  clearDropHints();
  document.querySelectorAll(".slot.drag-source").forEach(el => el.classList.remove("drag-source"));
}

function onPointerDragStart(ev)
{
  if (ev.pointerType === "mouse") return;   // keep desktop HTML DnD
  if (ev.button != null && ev.button !== 0) return;
 

  ev.preventDefault();
  ev.stopPropagation();

  const slotEl = ev.currentTarget.closest(".slot");

  if (!slotEl) return;

  pointerDrag = {
    pointerId: ev.pointerId,
    fromSlotId: slotEl.dataset.slotId,
    handleEl: ev.currentTarget,
    hotTarget: null,
    ghostEl: buildDragGhost()
  };

  document.body.classList.add("dragging");
  slotEl.classList.add("drag-source");

  ev.currentTarget.setPointerCapture(ev.pointerId);
  ev.currentTarget.addEventListener("pointermove", onPointerDragMove);
  ev.currentTarget.addEventListener("pointerup", onPointerDragEnd);
  ev.currentTarget.addEventListener("pointercancel", onPointerDragCancel);

  positionDragGhost(ev.clientX, ev.clientY);
  updatePointerHotTarget(ev.clientX, ev.clientY);
}

function onPointerDragMove(ev)
{
  if (!pointerDrag || ev.pointerId !== pointerDrag.pointerId) return;
 
  ev.preventDefault();


  positionDragGhost(ev.clientX, ev.clientY);
  updatePointerHotTarget(ev.clientX, ev.clientY);
}

function onPointerDragEnd(ev)
{
  if (!pointerDrag || ev.pointerId !== pointerDrag.pointerId) return;

  ev.preventDefault();

  const fromSlotId = pointerDrag.fromSlotId;
  const toSlotId = pointerDrag.hotTarget ? pointerDrag.hotTarget.dataset.slotId : null;

  cleanupPointerDrag();

  if (toSlotId)
    movePeripheral(fromSlotId, toSlotId);
}

function onPointerDragCancel(ev)
{
  if (!pointerDrag || ev.pointerId !== pointerDrag.pointerId) return;
  cleanupPointerDrag();
}

function buildDragGhost()
{
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.innerHTML = `
    <i class="fa fa-ellipsis-h"></i>
    <i class="fa fa-ellipsis-h"></i>
  `;
  document.body.appendChild(ghost);
  return ghost;
}

function positionDragGhost(x, y)
{
  if (!pointerDrag || !pointerDrag.ghostEl) return;
  pointerDrag.ghostEl.style.left = x + "px";
  pointerDrag.ghostEl.style.top  = y + "px";
}

function updatePointerHotTarget(x, y)
{
  if (!pointerDrag) return;

  const el = document.elementFromPoint(x, y);
  const nextHot = el ? el.closest(".slot-anchor.empty") : null;

  if (pointerDrag.hotTarget === nextHot) return;

  if (pointerDrag.hotTarget)
    pointerDrag.hotTarget.classList.remove("drop-ok");

  pointerDrag.hotTarget = nextHot;

  if (pointerDrag.hotTarget)
    pointerDrag.hotTarget.classList.add("drop-ok");
}

function cleanupPointerDrag()
{
  if (!pointerDrag) return;

  const handleEl = pointerDrag.handleEl;
  const pointerId = pointerDrag.pointerId;

  if (pointerDrag.hotTarget)
    pointerDrag.hotTarget.classList.remove("drop-ok");

  if (pointerDrag.ghostEl)
    pointerDrag.ghostEl.remove();

  if (handleEl)
  {
    try
    {
      if (handleEl.hasPointerCapture(pointerId))
        handleEl.releasePointerCapture(pointerId);
    }
    catch (e) {}

    handleEl.removeEventListener("pointermove", onPointerDragMove);
    handleEl.removeEventListener("pointerup", onPointerDragEnd);
    handleEl.removeEventListener("pointercancel", onPointerDragCancel);
  }

  document.body.classList.remove("dragging");
  document.querySelectorAll(".slot.drag-source").forEach(el => el.classList.remove("drag-source"));
 
  pointerDrag = null;
}

function onDragOver(ev)
{
  if (!dragFromSlotId) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = "move";
}

function onDragEnter(ev)
{
  if (!dragFromSlotId) return;
  ev.currentTarget.classList.add("drop-ok");
}

function onDragLeave(ev)
{
  ev.currentTarget.classList.remove("drop-ok");
}

function onDrop(ev)
{
  ev.preventDefault();

  const toSlotId = ev.currentTarget.dataset.slotId;
  const fromSlotId = dragFromSlotId || ev.dataTransfer.getData("text/plain");

  clearDropHints();
  movePeripheral(fromSlotId, toSlotId);
}

function movePeripheral(fromSlotId, toSlotId)
{
  if (!fromSlotId || !toSlotId || fromSlotId === toSlotId) return;

  const from = slots.find(s => s.slotId === fromSlotId);
  const to   = slots.find(s => s.slotId === toSlotId);

  if (!from) return;
  if (!to) return;
  if (from.locked) return;
  if (!from.peripheral) return;
  if (to.peripheral) return;   // only drop on empty slots for now

  to.peripheral = from.peripheral;
  from.peripheral = null;
  dragFromSlotId = null;

  renderSlots();

  // Persist here if needed:
  // saveSlotAssignment(slots);
  // emulator.reassignPeripheral(fromSlotId, toSlotId);
}

function clearDropHints()
{
  document.querySelectorAll(".slot-anchor.drop-ok").forEach(el =>
  {
    el.classList.remove("drop-ok");
  });
}

function onAddClick(ev)
{
  const slotId = ev.currentTarget.closest(".slot-anchor").dataset.slotId;
  console.log("Add peripheral in slot", slotId);
  // openPeripheralPicker(slotId);
}

renderSlots();
</script>

</body>
