// ScreenGPU_HGR_NTSC_stepE_v4.html
//
// Minimal Apple II HGR → waveform → RGB GPU.js test harness.
// Based on the compact Step A/B harness.
//
// Stage C:
//   - initialize GPU.js inside Apple2Video
//   - add a non-graphical pipelined waveform kernel
//   - seed PAGE1/PAGE2 with simple HGR test patterns
//
// Stage D:
//   - add a graphical render kernel
//   - redraw by running waveKernel(mem,cfg) followed by renderKernel(wave,cfg)
//
// This is still a deliberately simplified model:
//   - waveKernel emits placeholder Y/I'/Q' sinusoid components
//   - renderKernel applies a tiny horizontal decode window and YIQ-ish RGB conversion
//   - bit 7 acts as a 90° phase offset for demonstration
//
-->
<html style="background-color:#B0B0B0">
<head>
  <title>APPLE II HGR NTSC WAVEFORM TEST - STEP E v4</title>
  <meta charset="utf-8">
  <style>
    html { height:100%; font-family: Arial, sans-serif; }
    body { background-color:#808080; height:100%; margin:0; padding:0; }
    #topmenu { padding:8px; background:#606060; color:#fff; }
    #topmenu label { margin-right:12px; }
    #status { margin-left:12px; font-size:12px; color:#e8e8e8; }
    #main { padding:10px; }
    canvas.appvid { image-rendering:pixelated; background:#000; display:block; margin:0 0 12px 0; }
    #applescreen { width:560px; height:384px; border:1px solid #202020; }
    #signalgraph { width:1120px; height:256px; border:1px solid #202020; background:#000; }
    #graphLineLabel { display:inline-block; min-width:2.5em; text-align:right; }
  </style>
</head>
<body>
  <div id="topmenu">
    <label>
      HGR page
      <select id="pageSwitch">
        <option value="1" selected>PAGE1 ($2000)</option>
        <option value="2">PAGE2 ($4000)</option>
      </select>
    </label>
    <button id="sampleHgr" type="button">Sample HGR data</button>
    <button id="testPattern" type="button">Cycle test pattern</button>
    <label>
      Graph line
      <input id="graphLine" type="range" min="0" max="191" value="96">
      <span id="graphLineLabel">96</span>
    </label>
    <span id="status">Step E: linear HGR → waveform GPU harness.</span>
  </div>

  <div id="main">
    <canvas class="appvid" id="applescreen" width="560" height="384"></canvas>
    <canvas class="appvid" id="signalgraph" width="1120" height="256"></canvas>
  </div>

  <script type="text/javascript" src="../res/gpu-browser.min.js"></script>
  <script type="text/javascript" src="ScreenGPU_example_DATA.js"></script>

  <script>
var apple2plus;

const HGR_W = 280;
const HGR_H = 192;
const HGR_BYTES_PER_LINE = 40;
const HGR_PAGE1 = 0x2000;
const HGR_PAGE2 = 0x4000;
const HGR_OS = 4;
const WAVE_W = HGR_W * HGR_OS;             // 1120 waveform samples per line
const WAVE_CHANNELS = 3;                   // 0=Y, 1=I', 2=Q'
const WAVE_H = HGR_H * WAVE_CHANNELS;          // stacked 2D texture: Y plane, I' plane, Q' plane
const CAMERA_FPS = 10;

let testPatternN = 0;
let graphLine = 96;

window.addEventListener("load", EMU_init);

function EMU_init()
{
  const vidContext = document.getElementById("applescreen");

  apple2plus = new Apple2Plus(vidContext);
  apple2plus.restart();

  const video = apple2plus.vidObj();
  video.initGPU(vidContext);

  const pageSwitch = document.getElementById("pageSwitch");
  pageSwitch.addEventListener("change", function() { video.setPage2(this.value === "2"); });

  const graphLineEl = document.getElementById("graphLine");
  const graphLineLabel = document.getElementById("graphLineLabel");
  graphLineEl.addEventListener("input", function()
  {
    graphLine = this.value | 0;
    graphLineLabel.textContent = String(graphLine);
    video.drawSignalGraph();
  });

  document.getElementById("sampleHgr").addEventListener("click", function()
  {
    loadSampleHgrData();
    video.markDirty();
    setStatus("Reloaded sample HGR data into PAGE1/PAGE2.");
  });

  document.getElementById("testPattern").addEventListener("click", function()
  {
    testPatternN = (testPatternN + 1) % 4;
    seedHgrTestPattern(apple2plus.hwObj().write, HGR_PAGE1, testPatternN);
    video.setPage2(false);
    video.markDirty();
    setStatus("Loaded PAGE1 test pattern " + testPatternN + ". Use “Sample HGR data” to return to the captured examples.");
  });

  loadSampleHgrData();
  video.markDirty();
  drawLoop();

  setStatus("Step E v4 ready: sample HGR data is loaded by default; graph canvas shows one selected scanline.");
}


var Apple2Video = function(ctx)
{
  this.dim = [ctx.width, ctx.height];
  this.gpu = null;
  this.waveKernel = null;
  this.renderKernel = null;
  this.cfg = new Uint8Array(8);
  this.hgrLinear = new Uint8Array(HGR_H * HGR_BYTES_PER_LINE);
  this.graphCanvas = document.getElementById("signalgraph");
  this.graphCtx = this.graphCanvas ? this.graphCanvas.getContext("2d") : null;

  let page2_mode = false;
  let frame_redraw = true;
  let hgr_linear_dirty = true;

  this.reset = function() { page2_mode = false; frame_redraw = true; hgr_linear_dirty = true; };
  this.write = function(addr, d8) { if (addr >= 0x2000 && addr < 0x6000) { frame_redraw = true; hgr_linear_dirty = true; } };
  this.setPage2 = function(flag) { if (page2_mode !== flag) { page2_mode = flag; frame_redraw = true; hgr_linear_dirty = true; } };
  this.pageSoftSwitch = function() { return page2_mode ? 0x20 : 0x10; };
  this.markDirty = function() { frame_redraw = true; };
  this.redrawIfNeeded = function() { if (frame_redraw) this.redraw(); };


  this.ensureLinearHgr = function()
  {
    const mem = apple2plus.hwObj().safe_flashdump();
    if (hgr_linear_dirty)
    {
      linearizeHgrPage(mem, this.hgrLinear, this.pageSoftSwitch());
      hgr_linear_dirty = false;
    }
  };

  this.computeGraphSignal = function(line)
  {
    this.ensureLinearHgr();

    const y = line < 0 ? 0 : (line > 191 ? 191 : line);
    const bits = new Uint8Array(HGR_W);
    const bit7span = new Uint8Array(HGR_W);
    const waveY = new Float32Array(WAVE_W);
    const waveI = new Float32Array(WAVE_W);
    const waveQ = new Float32Array(WAVE_W);

    const rowBase = y * HGR_BYTES_PER_LINE;

    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
    {
      const b = this.hgrLinear[rowBase + xb];
      const ctrl = (b >> 7) & 1;
      const x0 = xb * 7;
      for (let bit = 0; bit < 7; bit++)
      {
        bits[x0 + bit] = (b >> bit) & 1;
        bit7span[x0 + bit] = ctrl;
      }
    }

    for (let sx = 0; sx < WAVE_W; sx++)
    {
      const xp0 = sx >> 2;
      const xByte0 = (xp0 / 7) | 0;
      const b0 = this.hgrLinear[rowBase + xByte0];
      const delay = (b0 >> 7) & 1;

      let dsx = sx - delay;
      if (dsx < 0) dsx = 0;
      if (dsx > (WAVE_W - 1)) dsx = WAVE_W - 1;

      const dxp = dsx >> 2;
      const xByte = (dxp / 7) | 0;
      const bit = dxp - xByte * 7;
      const b = this.hgrLinear[rowBase + xByte];
      const on = (b >> bit) & 1;
      const video = on ? 1.0 : 0.0;

      const phase = sx & 3;
      let c = 0.0, s = 0.0;
      if (phase === 0) { c = 1.0; s = 0.0; }
      else if (phase === 1) { c = 0.0; s = 1.0; }
      else if (phase === 2) { c = -1.0; s = 0.0; }
      else { c = 0.0; s = -1.0; }

      waveY[sx] = video;
      waveI[sx] = video * c;
      waveQ[sx] = video * s;
    }

    return { line: y, bits, bit7span, waveY, waveI, waveQ };
  };

  this.drawSignalGraph = function()
  {
    if (!this.graphCtx) return;

    const ctx2 = this.graphCtx;
    const W = this.graphCanvas.width;
    const H = this.graphCanvas.height;
    const data = this.computeGraphSignal(graphLine);

    ctx2.clearRect(0, 0, W, H);
    ctx2.fillStyle = "#000";
    ctx2.fillRect(0, 0, W, H);

    // Reference lines.
    ctx2.strokeStyle = "#202020";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    ctx2.moveTo(0, 128.5); ctx2.lineTo(W, 128.5);
    ctx2.moveTo(0, 32.5); ctx2.lineTo(W, 32.5);
    ctx2.moveTo(0, 56.5); ctx2.lineTo(W, 56.5);
    ctx2.stroke();

    // Labels.
    ctx2.fillStyle = "#909090";
    ctx2.font = "12px Arial";
    ctx2.fillText("line " + data.line, 8, 14);
    ctx2.fillText("visible bits", 8, 28);
    ctx2.fillText("bit7 span", 8, 52);
    ctx2.fillStyle = "#ffffff";
    ctx2.fillText("Y", 8, H - 34);
    ctx2.fillStyle = "#ffae00";
    ctx2.fillText("I′", 28, H - 34);
    ctx2.fillStyle = "#c080ff";
    ctx2.fillText("Q′", 48, H - 34);

    // Raw visible-bit square wave (light gray), expanded 4× to match waveform width.
    const bitTop = 10;
    const bitAmp = 18;
    ctx2.strokeStyle = "#b0b0b0";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    let prevY = bitTop + (1 - data.bits[0]) * bitAmp;
    ctx2.moveTo(0, prevY);
    for (let xp = 0; xp < HGR_W; xp++)
    {
      const level = bitTop + (1 - data.bits[xp]) * bitAmp;
      const x0 = xp * 4;
      if (xp > 0 && level !== prevY)
      {
        ctx2.lineTo(x0, prevY);
        ctx2.lineTo(x0, level);
      }
      ctx2.lineTo(x0 + 4, level);
      prevY = level;
    }
    ctx2.stroke();

    // Bit-7 control line repeated across each 7-bit byte span (dark gray).
    const b7Top = 36;
    const b7Amp = 16;
    ctx2.strokeStyle = "#505050";
    ctx2.beginPath();
    prevY = b7Top + (1 - data.bit7span[0]) * b7Amp;
    ctx2.moveTo(0, prevY);
    for (let xp = 0; xp < HGR_W; xp++)
    {
      const level = b7Top + (1 - data.bit7span[xp]) * b7Amp;
      const x0 = xp * 4;
      if (xp > 0 && level !== prevY)
      {
        ctx2.lineTo(x0, prevY);
        ctx2.lineTo(x0, level);
      }
      ctx2.lineTo(x0 + 4, level);
      prevY = level;
    }
    ctx2.stroke();

    // Y curve in white, mapped to full 0..255 vertical range.
    ctx2.strokeStyle = "#ffffff";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    let y0 = (H - 1) - data.waveY[0] * (H - 1);
    ctx2.moveTo(0, y0);
    for (let sx = 1; sx < WAVE_W; sx++)
    {
      const py = (H - 1) - data.waveY[sx] * (H - 1);
      ctx2.lineTo(sx, py);
    }
    ctx2.stroke();

    // I′ and Q′ as dotted traces, color chosen by sign:
    //   I′ > 0 orange, I′ < 0 blue
    //   Q′ > 0 purple, Q′ < 0 green
    for (let sx = 0; sx < WAVE_W; sx += 2)
    {
      const iv = data.waveI[sx];
      const iqy = 128 - iv * 120;
      ctx2.fillStyle = iv >= 0 ? "#ff9800" : "#3fa0ff";
      ctx2.fillRect(sx, iqy, 2, 2);

      const qv = data.waveQ[sx];
      const qqy = 128 - qv * 120;
      ctx2.fillStyle = qv >= 0 ? "#c060ff" : "#60d060";
      ctx2.fillRect(sx, qqy, 2, 2);
    }
  };

  this.initGPU = function(canvas)
  {
    this.gpu = createGPUInstance({ canvas: canvas, mode: "gpu" });

    // Kernel 1: compact linear HGR -> oversampled Y/I'/Q' waveform.
    //
    // Input layout:
    //   hgr[y * 40 + xByte] = one Apple II HGR byte, already linearized by the CPU.
    //
    // Output layout uses a stacked 2D texture:
    //   x = 0..1119 oversampled 14M-ish horizontal sample
    //   y = 0..191      Y plane
    //   y = 192..383    I' plane
    //   y = 384..575    Q' plane
    //
    // The hot kernel no longer performs Apple II screen-address decoding.
    // Bit 7 is modeled as a one-sample 14M delay.
    // Chroma phase is based on the absolute 14M sample position.
    this.waveKernel = this.gpu.createKernel(function(hgr, cfg)
    {
      const sx = this.thread.x;
      const wy = this.thread.y;
      const ch = (wy / 192) | 0;
      const y = wy - ch * 192;

      // Determine the byte active at the undelayed time.
      const xp0 = sx >> 2;                  // 0..279 HGR pixel position
      const xByte0 = (xp0 / 7) | 0;         // 0..39
      const b0 = hgr[y * 40 + xByte0];

      // Model the Apple II high bit as a one-14M-sample delay for this byte group.
      // This is a practical approximation; boundary refinement can come later if needed.
      const delay = (b0 >> 7) & 1;
      let dsx = sx - delay;
      if (dsx < 0) dsx = 0;
      if (dsx > 1119) dsx = 1119;

      const dxp = dsx >> 2;
      const xByte = (dxp / 7) | 0;
      const bit = dxp - xByte * 7;
      const b = hgr[y * 40 + xByte];

      const on = (b >> bit) & 1;
      const video = on > 0 ? 1.0 : 0.0;

      // Absolute 14M phase: one NTSC color carrier cycle spans 4 samples.
      // Because the bitstream itself is delayed, the chroma shift appears naturally.
      const phase = sx & 3;

      let c = 0.0;
      let s = 0.0;
      if (phase === 0) { c = 1.0; s = 0.0; }
      else if (phase === 1) { c = 0.0; s = 1.0; }
      else if (phase === 2) { c = -1.0; s = 0.0; }
      else { c = 0.0; s = -1.0; }

      if (ch === 0) return video;       // Y / composite amplitude
      if (ch === 1) return video * c;   // I' contribution
      return video * s;                 // Q' contribution
    }, {
      output: [WAVE_W, WAVE_H],
      pipeline: true,
      immutable: true
    });

    // Kernel 2: waveform -> RGB directly on the HTML canvas.
    //
    // Canvas is 560×384:
    //   horizontal: 2 canvas pixels per HGR pixel, or 2 waveform samples per canvas pixel
    //   vertical:   2 canvas lines per HGR line
    this.renderKernel = this.gpu.createKernel(function(wave, cfg)
    {
      const x = this.thread.x;
      const y = this.thread.y;

      const srcY = 191 - (y >> 1);     // preserve the previous Apple II-style vertical orientation
      const sx = x << 1;               // 560 canvas pixels -> 1120 waveform samples

      // Separate luma and chroma filters.
      // Performance trade-off:
      //   old proof-of-concept: 5 taps × 3 planes = 15 reads/pixel
      //   this version:         3 Y taps + 4 I taps + 4 Q taps = 11 reads/pixel
      // The 4 chroma taps span one full carrier cycle, which cancels false chroma
      // on solid white/black areas better than the old equal 5-tap window.
      let pxm1 = sx - 1; if (pxm1 < 0) pxm1 = 0;
      let pxp1 = sx + 1; if (pxp1 > 1119) pxp1 = 1119;

      let yy = wave[srcY][pxm1] * 0.25 + wave[srcY][sx] * 0.50 + wave[srcY][pxp1] * 0.25;

      let ii = 0.0;
      let qq = 0.0;

      for (let k = -2; k <= 1; k++)
      {
        let px = sx + k;
        if (px < 0) px = 0;
        if (px > 1119) px = 1119;

        ii += wave[192 + srcY][px];
        qq += wave[384 + srcY][px];
      }

      ii = ii * 0.25 * 0.70;
      qq = qq * 0.25 * 0.70;

      // YIQ-ish conversion. This is not yet calibrated NTSC Apple II color;
      // it is a visible proof of the Y/I'/Q' data model.
      let r = yy + 0.956 * ii + 0.621 * qq;
      let g = yy - 0.272 * ii - 0.647 * qq;
      let b = yy - 1.106 * ii + 1.703 * qq;

      if (r < 0.0) r = 0.0; if (r > 1.0) r = 1.0;
      if (g < 0.0) g = 0.0; if (g > 1.0) g = 1.0;
      if (b < 0.0) b = 0.0; if (b > 1.0) b = 1.0;

      this.color(r, g, b, 1.0);
    }, {
      output: [ctx.width, ctx.height],
      graphical: true
    });
  };

  this.redraw = function()
  {
    if (!this.waveKernel || !this.renderKernel) return;
    this.cfg[0] = this.pageSoftSwitch();

    this.ensureLinearHgr();

    const wave = this.waveKernel(this.hgrLinear, this.cfg);
    this.renderKernel(wave, this.cfg);
    this.drawSignalGraph();

    frame_redraw = false;
  };
};


function drawLoop() { apple2plus.vidObj().redrawIfNeeded(); window.requestAnimationFrame(drawLoop); }
function setStatus(msg) { const el = document.getElementById("status"); if (el) el.textContent = msg; }
function createGPUInstance(options) { try { return new window.GPU.GPU(options || {}); } catch (e) { return new GPU(options || {}); }}

function clearHgrPage(writeByte, pageBase) { for (let i = 0; i < 0x2000; i++) writeByte(pageBase + i, 0x00); }
function hgrAddress(pageBase, xByte, y) { return pageBase + ((y << 10) & 0x1C00) + ((y << 4) & 0x0380) + ((y >> 3) & 0x0018) + ((y >> 1) & 0x0060) + xByte; }

function loadSampleHgrData()
{
  clearHgrPage(apple2plus.hwObj().write, HGR_PAGE1);
  clearHgrPage(apple2plus.hwObj().write, HGR_PAGE2);

  if (typeof gfx_stream !== "undefined")
    fill_ram(gfx_stream, apple2plus.hwObj().write);

  if (typeof gfx_stream2 !== "undefined")
    fill_ram(gfx_stream2, apple2plus.hwObj().write, 0x2000);
}

function fill_ram(byte_capture, writeByte, offset)
{
  offset = offset || 0;
  if (!byte_capture) return 0;

  let writes = 0;
  const line_arr = byte_capture.split("\n");

  for (let i = 0; i < line_arr.length; i++)
  {
    const line = line_arr[i].trim();
    if (line.length === 0 || line[0] === "#") continue;

    const parts = line.split(":");
    if (parts.length < 2) continue;

    const adr = parseInt(parts[0], 16);
    if (Number.isNaN(adr)) continue;

    const hexarr = parts[1].trim().split(/\s+/);
    for (let j = 0; j < hexarr.length; j++)
    {
      const byte = parseInt(hexarr[j], 16);
      if (!Number.isNaN(byte))
      {
        writeByte((offset + adr + j) & 0xFFFF, byte & 0xFF);
        writes++;
      }
    }
  }

  return writes;
}

function linearizeHgrPage(mem, out, pageSoftSwitch)
{
  const PAGE = (pageSoftSwitch & 48) << 9;

  for (let y = 0; y < HGR_H; y++)
  {
    const adr_ofs = ((y << 4) & 0x380) | ((y >> 3) & 0x18) | ((y >> 1) & 0x60);
    const rowBase = PAGE + ((y << 10) & 0x1C00) + adr_ofs;
    const dstBase = y * HGR_BYTES_PER_LINE;

    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
      out[dstBase + xb] = mem[rowBase + xb];
  }
}


function seedHgrTestPattern(writeByte, pageBase, pattern)
{
  clearHgrPage(writeByte, pageBase);

  for (let y = 0; y < HGR_H; y++)
  {
    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
    {
      let v = 0;

      if (pattern === 0)
      {
        // Alternating 7-bit patterns, bit7 changes every 24 lines.
        v = ((xb + ((y / 16) | 0)) & 1) ? 0x55 : 0x2A;
        if (((y / 24) | 0) & 1) v |= 0x80;
      }
      else if (pattern === 1)
      {
        // Vertical color bars with bit7 toggled halfway across.
        const band = ((xb / 5) | 0) & 7;
        v = (band & 1) ? 0x55 : 0x2A;
        if (band & 2) v |= 0x80;
      }
      else if (pattern === 2)
      {
        // Coarse checkerboard: useful for seeing luma/chroma averaging.
        v = ((((xb >> 1) + (y >> 4)) & 1) ? 0x7F : 0x00);
        if ((xb >> 2) & 1) v |= 0x80;
      }
      else
      {
        // Diagonal stripes.
        v = (((xb + (y >> 3)) & 1) ? 0x49 : 0x24);
        if (((xb + (y >> 4)) & 2) !== 0) v |= 0x80;
      }

      writeByte(hgrAddress(pageBase, xb, y), v);
    }
  }
}


function handleInputImageData(imageData, meta)
{
  // Camera/image input is intentionally converted with a simple threshold for now.
  // This path exists only to exercise the HGR → waveform → RGB renderer.
  packLumaImageDataToHgr(imageData, apple2plus.hwObj().write, HGR_PAGE1);
  apple2plus.vidObj().setPage2(false);
  apple2plus.vidObj().markDirty();

  const source = meta && meta.source ? meta.source : "input";
  const frameInfo = meta && meta.frameCount ? (" frame " + meta.frameCount) : "";
  if (source !== "camera" || ((meta.frameCount % CAMERA_FPS) === 1))
    setStatus("Packed " + source + frameInfo + " into PAGE1 with simple luminance threshold; rendering through linear HGR → waveKernel → renderKernel.");
}

function packLumaImageDataToHgr(imageData, writeByte, pageBase)
{
  clearHgrPage(writeByte, pageBase);
  const rgba = imageData.data;

  for (let y = 0; y < HGR_H; y++)
  {
    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
    {
      let v = 0;
      const x0 = xb * 7;

      for (let bit = 0; bit < 7; bit++)
      {
        const x = x0 + bit;
        const p = (y * HGR_W + x) * 4;
        const lum = ((rgba[p] * 77) + (rgba[p + 1] * 150) + (rgba[p + 2] * 29)) >> 8;
        if (lum > 127) v |= 1 << bit;
      }

      // Demonstration only: alternate bit7 by byte column so the placeholder phase shift is visible.
      if (((xb >> 2) & 1) !== 0) v |= 0x80;
      writeByte(hgrAddress(pageBase, xb, y), v);
    }
  }
}


function Apple2Plus(context)
{
  const video = new Apple2Video(context);
  const ram = new Uint8Array(0x10000);
  const hw = {
    write: function(addr, d8) { ram[addr & 0xFFFF] = d8 & 0xFF; video.write(addr, d8); },
    safe_flashdump: function() { return ram; },
    restart: function() { ram.fill(0); },
    reset: function() {}
  };

  this.hwObj = function() { return hw; };
  this.vidObj = function() { return video; };
  this.restart = function() { hw.restart(); video.reset(); };
}
  </script>
</body>
