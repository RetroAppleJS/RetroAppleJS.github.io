{

    var softswitch_mode = oCOM.URL.uri["ss0"] === undefined ? 0b10010101 :
     Number(oCOM.URL.uri["ss0"])

    +Number(oCOM.URL.uri["ss3"]);

    var vidContext      = document.getElementById('applescreen');

    // FILL RAM WITH EXAMPLE TEXT & GRAPHICS (MADE FROM MEMORY CAPTURES)
    fill_ram(gfx_stream,apple2plus);

    fill_ram(lores_stream,apple2plus);
    fill_ram(lores_stream2,apple2plus,0x400);


    // clear text RAM
    for(var i=0x400;i<0xC00;i++) set_ram(0x00,i,apple2plus);

    function placeText(byte,x,y,a2p)
    {
      var badr = x<40 ? 0x400 : 0x800 - 40;
      var adr = badr + x + ((y & 7) << 7) + ((y >> 3) << 5) + ((y >> 3) << 3);
      a2p.hwObj().write(adr, byte);
    }

    for(var x=0;x<80;x++) placeText(x,x,0,apple2plus);
    for(var x=0;x<80;x++) placeText(x+80,x,1,apple2plus);

    

    //GFX_HIRES/LORES << GFX_PAGE1/2  << GFX_PAGE1/2 << GFX_MIX_ON/OFF << GFX_ON/OFF  (1/0)

       { canvas:  vidContext, mode: 'gpu'}
      ,{ kernel: video.kProcess_v6, output: [vidContext.width,vidContext.height], graphical: true }
      ,{"CHROME_MODE":[chrome_mode,"cfg[","]<<2"]
      ,"DIM_H":[vidContext.height>>1]
      ,"GFX_FLG":[softswitch_mode]
      ,"FLG2":[gfx_card_mode]
      ,"PALETTE":[INTCols]
    })
    
    // EXPORT KERNEL TO JSON
    // https://github.com/gpujs/gpu.js/?tab=readme-ov-file#using-json
    
    //video.kernel(apple2plus.hwObj().safe_flashdump(),CHAR_ROM,video.serial8);
    //var json = video.kernel.toJSON();

     console.log("isGPUSupported = "+GPU.isGPUSupported);
     console.log("isKernelMapSupported = "+GPU.isKernelMapSupported);
     console.log("isOffscreenCanvasSupported = "+GPU.isOffscreenCanvasSupported);

     console.log("isCanvasSupported = "+GPU.isCanvasSupported);

    appleIntervalHandle = window.setInterval(apple2plus.cycle,_o.EMU_IntervalTime_ms,_o.CPU_ClockTicks);
}

function fill_ram(byte_capture,a2p,offset)
{
  if(offset===undefined) var offset = 0;
  var line_arr = byte_capture.split("\n");
  for(var i=0;i<line_arr.length;i++)
  {
    var adr = parseInt(line_arr[i].split(":")[0],16);
    if(line_arr[i].length>0)
    {
      var hexarr = line_arr[i].split(":")[1].slice(1).split(" ");
      for(var j=0;j<hexarr.length;j++)
        set_ram(parseInt(hexarr[j],16),offset+adr+j,a2p);
    }
  }
}

function set_ram(byte,adr,a2p)
{
  a2p.hwObj().write(adr, byte);
}

//   █████  ██████  ██████  ██      ███████     ██ ██       
//  ██   ██ ██   ██ ██   ██ ██      ██          ██ ██      ██

function Apple2Plus(context)
{
  var video = new Apple2Video(context);
  var hw    = new Apple2Hw(video);

  this.hwObj = function() { return hw }
  this.vidObj = function() { return video }
  this.monitor = function(type) { return video.setMonitor(type) }
  this.reset = function() { hw.reset() }

  this.restart = function()
  {
    hw.restart();
    this.reset();
  }

  this.cycle = function(n)
  {
      while (n-- > 0)
      {
          hw.cycle();
          video.cycle();
      }
  }
}

//   █████  ██████  ██████  ██      ███████     ██ ██     ██    ██ ██ ██████  ███████  ██████  
//  ██   ██ ██   ██ ██   ██ ██      ██          ██ ██     ██    ██ ██ ██   ██ ██      ██    ██ 
//  ███████ ██████  ██████  ██      █████       ██ ██     ██    ██ ██ ██   ██ █████   ██    ██ 
//  ██   ██ ██      ██      ██      ██          ██ ██      ██  ██  ██ ██   ██ ██      ██    ██ 
//  ██   ██ ██      ██      ███████ ███████     ██ ██       ████   ██ ██████  ███████  ██████  

var Apple2Video = function(ctx)
{
  this.dim = [ctx.width,ctx.height];
  
  var gfx_mode;
  var mix_mode;
  var page2_mode;
  var hires_mode;
  var chrome_mode;
  var flash_on = false;
  var double_mode = false;
  var flash_count = 0;
  var frame_count = 0;
  var frame_redraw = true;

  this.vidram = null; // apple2hw.js sets this to give me reference to ram

  // BYTE ARRAY SERIALISATION
  this.serial8 = new Uint8Array();
  this.config8_map = {};
  this.config8_idx = {};
  this.ser8_ref = function(name,arr) { this.setlen(name,null); this.serial8 = new Uint8Array([...this.serial8,...arr]) }
  this.ser8_val = function(name,val,modifier) { this.setlen(name,modifier); this.serial8 = new Uint8Array([...this.serial8,...[val&255]]) } 
  this.ser8_map = function() { return "const "+JSON.stringify(this.config8_map).replace(/"|\{|\}/g,"").replace(/:/g,"=")+";" }
  this.idx8 = function(name) { return this.config8_idx[name] }
  this.setlen = function(name,modifier)
  {
    if(modifier===undefined) var modifier = ["cfg[","]"];
    else if(modifier==null)  var modifier = ["",""];
    if(this.config8_map[name]===undefined)
    {
      this.config8_map[name] = modifier[0] + this.serial8.length + modifier[1];
      this.config8_idx[name] = this.serial8.length;
    }
  }

  this.cycle = function()
  {
    if (++flash_count > 250000)
    {
      flash_on = ! flash_on;
      flash_count = 0;
      this.reflash();

    }
    if (++frame_count > 100000)
    {
      if(frame_redraw==true)
      {
        frame_count = 0;
        this.redraw();

      }
    }
  }

  this.write     = function(addr, d8) { frame_redraw = true }
  this.setGfx    = function(flag) { if (gfx_mode != flag)    { gfx_mode = flag; frame_redraw = true } }
  this.setMix    = function(flag) { if (mix_mode != flag)    { mix_mode = flag; frame_redraw = true } }
  this.setPage2  = function(flag) { if (page2_mode != flag)  { page2_mode = flag; frame_redraw = true } }
  this.setHires  = function(flag) { if (hires_mode != flag)  { hires_mode = flag; frame_redraw = true } }
  this.setDouble = function(flag) { if (double_mode != flag) { double_mode = flag; frame_redraw = true } }
  this.setFont   = function(name) { this.font_name = name }

  this.setMonitor = function(mode)
  {
    chrome_mode = mode & 3;
    frame_redraw = true;
    return  { "color": _CFG_CHROMA[chrome_mode].COL_num?_CFG_CHROMA[chrome_mode].COL_num:"#000000"
              ,"name": _CFG_CHROMA[chrome_mode].COL_name}
  }

  this.register_mode = function()
  {
    this.modes = {"gfx":gfx_mode,"mix":mix_mode,"page2":page2_mode,"hires":hires_mode,"chrome":chrome_mode};
    var ret = (gfx_mode?1:2) + (mix_mode?8:4) + (page2_mode?32:16) + (hires_mode?128:64);
    return ret;
  }

  this.reset = function()
  {
    gfx_mode    = false;
    mix_mode    = false;
    page2_mode  = false;
    hires_mode  = false;
    flash_on    = true;
    double_mode = false;
    flash_count = 0;
    frame_count = 0;
    chrome_mode = 0;
    //this.setFont("APPLE:II+");
    this.register_mode();
  }

  // CUSTOM ADAPTATIONS FOR GPU.JS
  this.redraw = function()
  {
    this.serial8[ this.idx8("CHROME_MODE") ]  = chrome_mode;
    this.serial8[ this.idx8("GFX_FLG") ]      = this.register_mode();
    this.serial8[ this.idx8("FLG2") ]         = (flash_on?1:0) | (double_mode?2:0);

    // RUN THE KERNEL !
    window.requestAnimationFrame( function()
    { 
      apple2plus.vidObj().kernel(
      apple2plus.hwObj().safe_flashdump()           // MEMORY DATA
      ,CHAR_ROM[apple2plus.vidObj().font_name].data // CHARACTER ROM DATA
      ,apple2plus.vidObj().serial8)                 // CONFIG DATA
    } );
    frame_redraw=false;  // OPEN ISSUE (ANDROID related) https://github.com/gpujs/gpu.js/issues/521
  }

  this.reflash = function() { frame_redraw = true; this.redraw() }

  this.initGPU = function(GPUarg,KERNELarg,config)
  { 
    // CONFIGURE DATA SERIALISATION
    for(var i in config)
    {
      if(config[i][0].constructor === Uint8Array) this.ser8_ref(i,config[i][0])
      else this.ser8_val(i,config[i][0],config[i][1]===undefined?undefined:[config[i][1],config[i][2]])
    }

    // INSTATIATE GPU CLASS & ATTACH TO WINDOW OBJECT
    try { var gpu = new window.GPU.GPU(GPUarg) } catch (e) { var gpu = new GPU(GPUarg) }

    // TRANSPILE KERNEL SCRIPT
    this.kernel = gpu.createKernel(KERNELarg.kernel,KERNELarg)
  }

  this.kernel = function() { alert.warn("initialise first with initGPU()") }

  // KERNEL v6
  this.kProcess_v6 =  function(mem,rom,cfg)
  { 
    const CHROME_MODE=cfg[0]<<2,DIM_H=cfg[1],GFX_FLG=cfg[2],FLG2=cfg[3],PALETTE=4;
    const xp = (this.thread.x>>1);
    const yp = DIM_H-(this.thread.y>>1)-1;
    const adr_ofs = yp<<4 & 0x380 | yp>>3 & 0x18 | yp>>1 & 0x60;

    const PAGE  = (GFX_FLG & 48) << 9;
    const MIX   = ((1^(yp+0x60>>8) & GFX_FLG>>3) | GFX_FLG>>2) & 1;
    const HIRES = (GFX_FLG & GFX_FLG>>7 & MIX) & 1;
    const LORES = (GFX_FLG & GFX_FLG>>6 & MIX) & 1;
    const DOUBL = FLG2>>1 & 1;

    var cp = PALETTE + CHROME_MODE;

    if(DOUBL==1)
    {
      const x7    = this.thread.x+1+(this.thread.x+1+(this.thread.x+1>>3)>>3)>>3;
      const m7    = this.thread.x-(x7<<3)+x7;
      const PG    = (0x4000-(0x3E0>>(x7>>3)&1)|0x2000)&0x3EC0;              // calculate mem offset  PG = (x7<40 ? 0x2000 : (0x4000 - 0x140))
      const adr   = (PG>>3) + adr_ofs + x7;                                 // locate hardware address
      const d8    = mem[adr];                                               // read byte from memory
      const offs  = ((d8 & 0x3F) ^ 0x20) << 3;                              // character offset (not inversed or flashing)
      const cbyte = rom[ offs + (yp&7) ];                                   // read byte from character ROM
      const infl = (d8>>7 & 1) ^1;                                               // inv modifier (when high bit is set)
      FLG2 = 0;   // optionally: depending on GFX card register, 0=all normal 1=all inverted
      const rgb   = (cbyte>>m7&1) ^ (0b001>>infl&1) ^ (0b010>>infl&FLG2&1);
      cp += (rgb<<8) - (rgb<<4);                                            // color pointer
    }
    else if(HIRES==1)
    {
      const x7   = xp+1+(xp+1+(xp+1>>3)>>3)>>3;                             // equivalent to Math.floor(x/7)
      const m7   = xp-(x7<<3)+x7;                                           // equivalent to xp%7
      const adr  = PAGE + (yp<<10 & 0x1C00) + adr_ofs + x7                  // locate hardware address
      const b171 = (0x7F & mem[adr+1])<<8  | (0x7F & mem[adr])<<1 | (mem[adr-1]>>6 & 1);   // aggregate left - center - right byte
      const b3   = b171>>m7&7, d1 = 0b100100>>b3&1, d2 = 0b11001000>>b3&1;  // 3-bits around (xp,yp) + decision logic
      const dl   = 1+((xp^b3)<<1&2|(xp^b3)&1^mem[adr]>>7)&(d1<<4)-d1        // main hi-res color decision logic (6 states 0-5 to multiply by 3)
      cp += (dl+(dl<<1) | (d2<<4)-d2)<<4;                                   // 3*dl | 15*d2 = color pointer (offset 16 positions per color)
    }
    else if(LORES==1)
    {
      const x7  = xp+1+(xp+1+(xp+1>>3)>>3)>>3;                              // equivalent to Math.floor(x/7)
      const adr = (PAGE>>3) + adr_ofs + x7;                                 // locate hardware address
      const d8  = mem[adr];                                                 // read byte from memory
      const y4  = (yp>>2&1)<<2;                                             // hi/lo nibble filter
      cp += (d8>>y4&15)<<4;                                                 // color pointer
    }
    else // TEXT
    {
      const x7    = xp+1+(xp+1+(xp+1>>3)>>3)>>3;                            // equivalent to Math.floor(x/7)
      const m7    = xp-(x7<<3)+x7;                                          // equivalent to xp%7
      const adr   = (PAGE>>3) + adr_ofs + x7;                               // locate hardware address
      const d8    = mem[adr];                                               // read byte from memory
      const offs  = ((d8 & 0x3F) ^ 0x20) << 3;                              // character offset (not inversed or flashing)
      const cbyte = rom[ offs + (yp&7) ];                                   // read byte from character ROM
      const infl  = d8>>6 & 3;                                              // inv/flash modifier
      const rgb   = (cbyte>>m7&1) ^ (0b001>>infl&1) ^ (0b010>>infl&FLG2);   // flash 1 or 0 with FLG2 modifier
      cp += (rgb<<8) - (rgb<<4);                                            // color pointer
    }

    this.color(cfg[cp]/256,cfg[cp+1]/256,cfg[cp+2]/256);
  }
}

//  ██████   █████  ████████  █████  
//  ██   ██ ██   ██    ██    ██   ██ 
//  ██   ██ ███████    ██    ███████ 
//  ██   ██ ██   ██    ██    ██   ██ 
//  ██████  ██   ██    ██    ██   ██ 

var SOFTSWITCHES = {0x57:"HIRES",0x56:"LORES",0x55:"PAGE2",0x54:"PAGE1",0x53:"MIX_ON",0x52:"MIX_OFF",0x51:"GFX_OFF",0x50:"GFX_ON"}
