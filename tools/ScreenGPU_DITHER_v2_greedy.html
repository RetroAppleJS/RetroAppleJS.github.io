//
// ScreenGPU_COLOR_HGR_greedy_v1.html
// Greedy Apple II HGR color encoder pipeline:
//   1. Load or capture a 280 x 192 source image.
//   2. Prefilter the target slightly in the horizontal direction.
//   3. Greedily choose Apple II HGR bytes whose artifact colors best match the source.
//   4. Render the HGR memory map through the existing GPU.js HGR kernel.
//
-->
<html style="background-color:#B0B0B0">
<head>
  <title>APPLE HIRES SCREEN BY GPU + GREEDY COLOR HGR ENCODER</title>
  <meta charset="utf-8">
  <style>
    html { height:100%; font-family: Arial, sans-serif; }
    body { background-color:#808080; height:100%; margin:0; padding:0; }
    #topmenu { padding:8px; background:#606060; color:#fff; }
    #topmenu label { margin-right:12px; }
    #status { margin-left:12px; font-size:12px; color:#e8e8e8; }
    #main { padding:10px; }
    canvas.appvid { image-rendering:pixelated; background:#000; margin-right:10px; }
    #cameraVideo { display:none; }
  </style>
</head>
<body>
  <div id="topmenu">
    <label>
      HGR page
      <select id="pageSwitch">
        <option value="1" selected>PAGE1 ($2000)</option>
        <option value="2">PAGE2 ($4000)</option>
      </select>
    </label>
    <label>
      Image file
      <input type="file" id="imageUpload" accept="image/*">
    </label>
    <button id="cameraToggle" type="button">Start camera 280×192 @ 10 fps</button>
    <span id="status">Select an image file or start the camera to encode into Apple II color HGR.</span>
  </div>

  <div id="main">
    <canvas class="appvid" id="applescreen" width="560" height="384"></canvas>
    <canvas class="appvid" id="photo" width="560" height="384"></canvas>
    <video id="cameraVideo" autoplay playsinline muted></video>
  </div>

  <script type="text/javascript" src="../res/gpu-browser.min.js"></script>
  <script>

const INTCols = new Uint8Array([
    0X00,0X00,0X00,0X0,0x00,0x00,0x00,0x0,0x00,0x00,0x00,0x0,0x00,0x00,0x00,0x0  // Black
    ,0X90,0X17,0X40,0X0,0x4D,0x4D,0x4D,0x0,0x30,0x4D,0x48,0x0,0x4C,0x46,0x31,0x0  // Magenta
    ,0X40,0X2C,0XA5,0X0,0x5B,0x5B,0x5B,0x0,0x39,0x5B,0x56,0x0,0x5A,0x52,0x39,0x0  // Dark Blue
    ,0XD0,0X43,0XE5,0X0,0xA8,0xA8,0xA8,0x0,0x69,0xA8,0x9E,0x0,0xA6,0x98,0x6A,0x0  // Purple
    ,0X00,0X69,0X40,0X0,0x38,0x38,0x38,0x0,0x23,0x38,0x35,0x0,0x38,0x33,0x24,0x0  // Dark Green
    ,0X80,0X80,0X80,0X0,0x80,0x80,0x80,0x0,0x50,0x80,0x78,0x0,0x7E,0x74,0x51,0x0  // Grey 1
    ,0X2F,0X95,0XE5,0X0,0x8E,0x8E,0x8E,0x0,0x59,0x8E,0x85,0x0,0x8C,0x80,0x59,0x0  // Medium Blue
    ,0XBF,0XAB,0XFF,0X0,0xCE,0xCE,0xCE,0x0,0x81,0xCE,0xC2,0x0,0xCB,0xBA,0x82,0x0  // Light Blue
    ,0X40,0X54,0X00,0X0,0x31,0x31,0x31,0x0,0x1F,0x31,0x2E,0x0,0x31,0x2D,0x1F,0x0  // Brown
    ,0XD0,0X6A,0X1A,0X0,0x71,0x71,0x71,0x0,0x47,0x71,0x6B,0x0,0x70,0x67,0x48,0x0  // Orange
    ,0X80,0X80,0X80,0X0,0x80,0x80,0x80,0x0,0x50,0x80,0x78,0x0,0x7E,0x74,0x51,0x0  // Grey 2
    ,0XFF,0X96,0XBF,0X0,0xC7,0xC7,0xC7,0x0,0x7D,0xC7,0xBB,0x0,0xC4,0xB4,0x7D,0x0  // Pink
    ,0X2F,0XBC,0X1A,0X0,0x57,0x57,0x57,0x0,0x37,0x57,0x52,0x0,0x56,0x4F,0x37,0x0  // Light Green
    ,0XBF,0XD3,0X5A,0X0,0xA4,0xA4,0xA4,0x0,0x67,0xA4,0x9A,0x0,0xA2,0x95,0x68,0x0  // Yellow  
    ,0X6F,0XE8,0XBF,0X0,0xB2,0xB2,0xB2,0x0,0x70,0xB2,0xA8,0x0,0xB0,0xA1,0x70,0x0  // Aquamarine
    ,0XFF,0XFF,0XFF,0X0,0xFF,0xFF,0xFF,0x0,0xA0,0xFF,0xF0,0x0,0xFC,0xE7,0xA1,0x0  // White
    ]);

    var apple2plus;
    var artifactPaletteRGB = null;
    var cameraStream = null;
    var cameraTimer = null;
    var cameraBusy = false;
    var cameraFrameCount = 0;
    var cameraSourceCanvas = null;
    var cameraSourceCtx = null;
    const CAMERA_FPS = 10;
    const HGR_W = 280;
    const HGR_H = 192;
    const HGR_PAGE1 = 0x2000;
    const HGR_PAGE2 = 0x4000;

    window.addEventListener('load', EMU_init);

    function EMU_init()
    {
      const vidContext = document.getElementById('applescreen');
      apple2plus = new Apple2Plus(vidContext);
      apple2plus.restart();

      const video = apple2plus.vidObj();
      const pageSwitch = document.getElementById('pageSwitch');
      const imageUpload = document.getElementById('imageUpload');
      const cameraToggle = document.getElementById('cameraToggle');

      video.initGPU(
        { canvas: vidContext, mode: 'gpu' },
        { kernel: video.kProcessHiRes, output: [vidContext.width, vidContext.height], graphical: true },
        {
          "CHROME_MODE": [0, "cfg[", "]<<2"],       // default color monitor
          "DIM_H":       [vidContext.height >> 1],
          "PAGE_SW":     [0x10],                    // PAGE1 soft-switch state; PAGE2 uses 0x20
          "PALETTE":     [INTCols]
        }
      );

      pageSwitch.addEventListener('change', function() { video.setPage2(this.value === '2'); });

      imageUpload.addEventListener('change', async function()
      {
        const file = this.files && this.files[0];
        if (!file) return;

        stopCamera(false);
        const objectUrl = URL.createObjectURL(file);
        try
        {
          await runColorHgrPipeline(objectUrl, getSelectedPageBase());
        }
        finally
        {
          setTimeout(function() { URL.revokeObjectURL(objectUrl); }, 1000);
        }
      });

      cameraToggle.addEventListener('click', function()
      {
        if (cameraStream) stopCamera(true);
        else startCamera();
      });

      function drawLoop()
      {
        video.redrawIfNeeded();
        window.requestAnimationFrame(drawLoop);
      }
      drawLoop();

      // With file:// pages, drawing a directly loaded relative image and then calling getImageData()
      // often taints the canvas. Using <input type="file"> avoids that by loading a user-selected File/Blob.
      setStatus('Select a local image file, or start the camera for live Apple II color HGR encoding.');
    }

    function setStatus(msg)
    {
      const el = document.getElementById('status');
      if (el) el.textContent = msg;
    }

    function getSelectedPageBase()
    {
      const pageSwitch = document.getElementById('pageSwitch');
      return pageSwitch && pageSwitch.value === '2' ? HGR_PAGE2 : HGR_PAGE1;
    }

    function createGPUInstance(options)
    {
      try { return new window.GPU.GPU(options || {}); }
      catch (e) { return new GPU(options || {}); }
    }

    async function runColorHgrPipeline(imageSrc, pageBase)
    {
      try
      {
        setStatus('stage 1/4: loading source image...');
        const imageData = await loadImageToCanvas('photo', imageSrc);
        processImageDataToHgr(imageData, pageBase, 'stage');
      }
      catch (e)
      {
        console.error(e);
        setStatus('dither pipeline failed; see console.');
      }
    }

    function processImageDataToHgr(imageData, pageBase, statusPrefix)
    {
      if (statusPrefix) setStatus(statusPrefix + ' 2/4: prefiltering source for Apple II artifact color...');
      const filteredRGBA = prefilterForArtifactColor(imageData);

      if (statusPrefix) setStatus(statusPrefix + ' 3/4: greedy Apple II color HGR encoding...');
      const writeRam = function(adr, byte) { apple2plus.hwObj().write(adr, byte); };
      clearHgrPage(writeRam, pageBase);
      encodeColorImageToHgrGreedy(filteredRGBA, writeRam, pageBase);

      apple2plus.vidObj().setPage2(pageBase === HGR_PAGE2);
      if (statusPrefix) setStatus(statusPrefix + ' 4/4: rendered color HGR page.');
    }

    function prefilterForArtifactColor(imageData)
    {
      const src = imageData.data ? imageData.data : imageData;
      const out = new Uint8ClampedArray(src.length);

      for (let y = 0; y < HGR_H; y++)
      {
        const rowBase = y * HGR_W * 4;
        for (let x = 0; x < HGR_W; x++)
        {
          const xm1 = x > 0 ? x - 1 : 0;
          const xp1 = x + 1 < HGR_W ? x + 1 : (HGR_W - 1);
          const p = rowBase + (x << 2);
          const pL = rowBase + (xm1 << 2);
          const pR = rowBase + (xp1 << 2);

          out[p]     = (src[pL]     + (src[p] << 1)     + src[pR]) >> 2;
          out[p + 1] = (src[pL + 1] + (src[p + 1] << 1) + src[pR + 1]) >> 2;
          out[p + 2] = (src[pL + 2] + (src[p + 2] << 1) + src[pR + 2]) >> 2;
          out[p + 3] = 255;
        }
      }

      return out;
    }

    function initArtifactPalette()
    {
      if (artifactPaletteRGB) return;

      artifactPaletteRGB = new Uint8Array(16 * 3);
      for (let i = 0; i < 16; i++)
      {
        const srcOfs = i << 4;
        const dstOfs = i * 3;
        artifactPaletteRGB[dstOfs]     = INTCols[srcOfs];
        artifactPaletteRGB[dstOfs + 1] = INTCols[srcOfs + 1];
        artifactPaletteRGB[dstOfs + 2] = INTCols[srcOfs + 2];
      }
    }

    function encodeColorImageToHgrGreedy(targetRGBA, writeByte, pageBase)
    {
      initArtifactPalette();

      const rowBytes = new Uint8Array(40);
      for (let y = 0; y < HGR_H; y++)
      {
        rowBytes.fill(0);

        for (let xByte = 0; xByte < 40; xByte++)
        {
          const x0 = xByte * 7;
          const scoreStart = xByte === 0 ? 0 : (x0 - 2);
          const scoreEnd = xByte === 39 ? Math.min(HGR_W - 1, x0 + 6) : (x0 + 4);

          let bestByte = 0;
          let bestErr = Number.POSITIVE_INFINITY;

          for (let candidate = 0; candidate < 256; candidate++)
          {
            rowBytes[xByte] = candidate;
            const err = scoreCandidateWindow(rowBytes, y, scoreStart, scoreEnd, targetRGBA);
            if (err < bestErr)
            {
              bestErr = err;
              bestByte = candidate;
            }
          }

          rowBytes[xByte] = bestByte;
        }

        for (let xByte = 0; xByte < 40; xByte++)
          writeByte(hgrAddress(pageBase, xByte, y), rowBytes[xByte]);
      }
    }

    function scoreCandidateWindow(rowBytes, y, xStart, xEnd, targetRGBA)
    {
      let err = 0;
      const rowBase = y * HGR_W * 4;

      for (let x = xStart; x <= xEnd; x++)
      {
        const palIdx = simulateRowPixelPaletteIndex(rowBytes, x);
        const palOfs = palIdx * 3;
        const p = rowBase + (x << 2);

        const dr = targetRGBA[p]     - artifactPaletteRGB[palOfs];
        const dg = targetRGBA[p + 1] - artifactPaletteRGB[palOfs + 1];
        const db = targetRGBA[p + 2] - artifactPaletteRGB[palOfs + 2];

        err += (dr * dr * 2) + (dg * dg * 4) + (db * db);
      }

      return err;
    }

    function simulateRowPixelPaletteIndex(rowBytes, xp)
    {
      const x7 = (xp / 7) | 0;
      const m7 = xp - (x7 * 7);
      const prev = x7 > 0 ? rowBytes[x7 - 1] : 0;
      const curr = rowBytes[x7];
      const next = x7 < 39 ? rowBytes[x7 + 1] : 0;

      const b171 = ((next & 0x7F) << 8) | ((curr & 0x7F) << 1) | ((prev >> 6) & 1);
      const b3 = (b171 >> m7) & 7;
      const d1 = (0b100100 >> b3) & 1;
      const d2 = (0b11001000 >> b3) & 1;
      const dl = (1 + ((((xp ^ b3) << 1) & 2) | ((xp ^ b3) & 1) ^ (curr >> 7))) & ((d1 << 4) - d1);
      return (dl + (dl << 1) | ((d2 << 4) - d2));
    }

    function loadImageToCanvas(canvasId, imageSrc)
    {
      return new Promise(function(resolve, reject)
      {
        const displayCanvas = document.getElementById(canvasId);
        if (!displayCanvas) { reject(new Error('Canvas not found: ' + canvasId)); return; }

        const displayCtx = displayCanvas.getContext('2d');
        const sourceCanvas = document.createElement('canvas');
        sourceCanvas.width = HGR_W;
        sourceCanvas.height = HGR_H;
        const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
        const img = new Image();
        try { img.crossOrigin = 'anonymous'; } catch (e) {}

        img.onload = function()
        {
          // Keep a visible 2x source preview in the photo canvas.
          displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
          displayCtx.imageSmoothingEnabled = false;
          displayCtx.drawImage(img, 0, 0, displayCanvas.width, displayCanvas.height);

          // Stage-1 source for the dither kernel: exact Apple II HGR resolution.
          sourceCtx.clearRect(0, 0, HGR_W, HGR_H);
          sourceCtx.imageSmoothingEnabled = false;
          sourceCtx.drawImage(img, 0, 0, HGR_W, HGR_H);
          resolve(sourceCtx.getImageData(0, 0, HGR_W, HGR_H));
        };

        img.onerror = function() { reject(new Error('Could not load image: ' + imageSrc)); };
        img.src = imageSrc;
      });
    }


    async function startCamera()
    {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
      {
        setStatus('Camera API is unavailable in this browser/context.');
        return;
      }

      try
      {
        setStatus('Requesting camera permission...');
        cameraStream = await openCameraStream280x192();

        const video = document.getElementById('cameraVideo');
        video.srcObject = cameraStream;
        await video.play();

        cameraFrameCount = 0;
        document.getElementById('cameraToggle').textContent = 'Stop camera';

        const track = cameraStream.getVideoTracks()[0];
        const settings = track && track.getSettings ? track.getSettings() : {};
        const captureLabel = settings.width && settings.height
          ? ('camera capture ' + settings.width + '×' + settings.height + ', resampled to ' + HGR_W + '×' + HGR_H)
          : ('camera frames resampled to ' + HGR_W + '×' + HGR_H);
        setStatus('Camera running at about ' + CAMERA_FPS + ' fps; ' + captureLabel + '.');

        captureCameraFrame();
        cameraTimer = window.setInterval(captureCameraFrame, Math.round(1000 / CAMERA_FPS));
      }
      catch (e)
      {
        console.error(e);
        stopCamera(false);
        setStatus('Could not start camera. Check browser permission and local-file camera policy.');
      }
    }

    async function openCameraStream280x192()
    {
      const exactConstraints = {
        video: {
          // First try to make the camera deliver the Apple II HGR input size natively.
          width:  { exact: HGR_W },
          height: { exact: HGR_H },
          frameRate: { ideal: CAMERA_FPS, max: CAMERA_FPS }
        },
        audio: false
      };

      const fallbackConstraints = {
        video: {
          // If the camera driver cannot do 280 x 192, ask for something close.
          // captureCameraFrame() always resamples the actual stream to 280 x 192.
          width:  { ideal: HGR_W },
          height: { ideal: HGR_H },
          aspectRatio: { ideal: HGR_W / HGR_H },
          frameRate: { ideal: CAMERA_FPS, max: CAMERA_FPS }
        },
        audio: false
      };

      try
      {
        return await navigator.mediaDevices.getUserMedia(exactConstraints);
      }
      catch (e)
      {
        console.warn('Exact 280 x 192 camera mode unavailable; falling back to ideal constraints.', e);
        return await navigator.mediaDevices.getUserMedia(fallbackConstraints);
      }
    }

    function stopCamera(showStatus)
    {
      if (cameraTimer)
      {
        window.clearInterval(cameraTimer);
        cameraTimer = null;
      }

      const video = document.getElementById('cameraVideo');
      if (video) video.pause();

      if (cameraStream)
      {
        cameraStream.getTracks().forEach(function(track) { track.stop(); });
        cameraStream = null;
      }

      cameraBusy = false;
      const button = document.getElementById('cameraToggle');
      if (button) button.textContent = 'Start camera 280×192 @ 10 fps';
      if (showStatus) setStatus('Camera stopped.');
    }

    function captureCameraFrame()
    {
      if (!cameraStream || cameraBusy) return;

      const video = document.getElementById('cameraVideo');
      const displayCanvas = document.getElementById('photo');
      if (!video || !displayCanvas || video.readyState < 2) return;

      cameraBusy = true;
      try
      {
        if (!cameraSourceCanvas)
        {
          cameraSourceCanvas = document.createElement('canvas');
          cameraSourceCanvas.width = HGR_W;
          cameraSourceCanvas.height = HGR_H;
          cameraSourceCtx = cameraSourceCanvas.getContext('2d', { willReadFrequently: true });
        }

        const displayCtx = displayCanvas.getContext('2d');
        displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
        displayCtx.imageSmoothingEnabled = false;
        displayCtx.drawImage(video, 0, 0, displayCanvas.width, displayCanvas.height);

        cameraSourceCtx.clearRect(0, 0, HGR_W, HGR_H);
        cameraSourceCtx.imageSmoothingEnabled = false;
        cameraSourceCtx.drawImage(video, 0, 0, HGR_W, HGR_H);

        const imageData = cameraSourceCtx.getImageData(0, 0, HGR_W, HGR_H);
        processImageDataToHgr(imageData, getSelectedPageBase(), 'camera');

        cameraFrameCount++;
        if ((cameraFrameCount % CAMERA_FPS) === 0)
          setStatus('Camera running: ' + cameraFrameCount + ' frames encoded to Apple II color HGR at ' + HGR_W + '×' + HGR_H + '.');
      }
      catch (e)
      {
        console.error(e);
        setStatus('Camera frame processing failed; see console.');
      }
      finally
      {
        cameraBusy = false;
      }
    }

    function clearHgrPage(writeByte, pageBase)
    {
      for (let i = 0; i < 0x2000; i++) writeByte(pageBase + i, 0x00);
    }

    function hgrAddress(pageBase, xByte, y)
    {
      return pageBase
        + ((y << 10) & 0x1C00)
        + ((y << 4) & 0x0380)
        + ((y >> 3) & 0x0018)
        + ((y >> 1) & 0x0060)
        + xByte;
    }

    function Apple2Plus(context)
    {
      const video = new Apple2Video(context);
      const ram = new Uint8Array(0x10000);

      const hw = {
        write: function(addr, d8) { ram[addr & 0xFFFF] = d8 & 0xFF; video.write(addr, d8); },
        safe_flashdump: function() { return ram; },
        restart: function() { ram.fill(0); },
        reset: function() {}
      };

      this.hwObj = function() { return hw; };
      this.vidObj = function() { return video; };
      this.restart = function() { hw.restart(); video.reset(); };
    }

    var Apple2Video = function(ctx)
    {
      this.dim = [ctx.width, ctx.height];

      let page2_mode = false;
      let chrome_mode = 0;
      let frame_redraw = true;

      // BYTE ARRAY SERIALISATION
      this.serial8 = new Uint8Array();
      this.config8_map = {};
      this.config8_idx = {};
      this.ser8_ref = function(name, arr) { this.setlen(name, null); this.serial8 = new Uint8Array([...this.serial8, ...arr]); };
      this.ser8_val = function(name, val, modifier) { this.setlen(name, modifier); this.serial8 = new Uint8Array([...this.serial8, val & 255]); };
      this.idx8 = function(name) { return this.config8_idx[name]; };

      this.setlen = function(name, modifier)
      {
        if (modifier === undefined) modifier = ["cfg[", "]"];
        else if (modifier == null) modifier = ["", ""];

        if (this.config8_map[name] === undefined)
        {
          this.config8_map[name] = modifier[0] + this.serial8.length + modifier[1];
          this.config8_idx[name] = this.serial8.length;
        }
      };

      this.reset = function() { page2_mode = false; chrome_mode = 0; frame_redraw = true; };
      this.write = function(addr, d8) { if (addr >= 0x2000 && addr < 0x6000) frame_redraw = true; };
      this.setPage2 = function(flag) { if (page2_mode !== flag) { page2_mode = flag; frame_redraw = true; } };
      this.pageSoftSwitch = function() { return page2_mode ? 0x20 : 0x10; };
      this.redrawIfNeeded = function() { if (frame_redraw) this.redraw(); };

      this.redraw = function()
      {
        if (!this.kernel) return;
        this.serial8[this.idx8("CHROME_MODE")] = chrome_mode;
        this.serial8[this.idx8("PAGE_SW")] = this.pageSoftSwitch();
        this.kernel(apple2plus.hwObj().safe_flashdump(), this.serial8);
        frame_redraw = false;
      };

      this.initGPU = function(GPUarg, KERNELarg, config)
      {
        // CONFIGURE DATA SERIALISATION
        for (const i in config)
        {
          if (config[i][0].constructor === Uint8Array) this.ser8_ref(i, config[i][0]);
          else this.ser8_val(i, config[i][0], config[i][1] === undefined ? undefined : [config[i][1], config[i][2]]);
        }

        // INSTANTIATE GPU CLASS
        const gpu = createGPUInstance(GPUarg);

        // TRANSPILE KERNEL SCRIPT
        this.kernel = gpu.createKernel(KERNELarg.kernel, KERNELarg);
      };

      this.kernel = null;

      // Reduced KERNEL v6: fixed HIRES rendering path only.
      this.kProcessHiRes = function(mem, cfg)
      {
        const CHROME_MODE = cfg[0] << 2;
        const DIM_H = cfg[1];
        const PAGE_SW = cfg[2];
        const PALETTE = 3;

        const xp = this.thread.x >> 1;
        const yp = DIM_H - (this.thread.y >> 1) - 1;
        const adr_ofs = (yp << 4) & 0x380 | (yp >> 3) & 0x18 | (yp >> 1) & 0x60;
        const PAGE = (PAGE_SW & 48) << 9;

        let cp = PALETTE + CHROME_MODE;

        const x7 = xp + 1 + (xp + 1 + ((xp + 1) >> 3) >> 3) >> 3;          // Math.floor(xp / 7)
        const m7 = xp - (x7 << 3) + x7;                                     // xp % 7
        const adr = PAGE + ((yp << 10) & 0x1C00) + adr_ofs + x7;            // locate HGR hardware address
        const b171 = ((0x7F & mem[adr + 1]) << 8) | ((0x7F & mem[adr]) << 1) | ((mem[adr - 1] >> 6) & 1);
        const b3 = (b171 >> m7) & 7;
        const d1 = (0b100100 >> b3) & 1;
        const d2 = (0b11001000 >> b3) & 1;
        const dl = (1 + ((((xp ^ b3) << 1) & 2) | ((xp ^ b3) & 1) ^ (mem[adr] >> 7))) & ((d1 << 4) - d1);

        cp += (dl + (dl << 1) | ((d2 << 4) - d2)) << 4;

        this.color(cfg[cp] / 256, cfg[cp + 1] / 256, cfg[cp + 2] / 256);
      };
    };

  </script>
</body>
</html>
