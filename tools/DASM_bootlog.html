<p>
    Input format: one fixed 5-byte record per executed CPU operation:
    <code>adrLo adrHi opcode op1 op2</code>. This is the same as
    <code>16 address bits + 24 operation bits</code>. The viewer uses
    <code>../res/ASM_core.js</code> for <code>DASM</code> and overrides symbols only on its own local instance.
</p>

    function fallbackHexByte(v) {
        v = (Number(v) || 0) & 0xff;
        return (v < 0x10 ? '0' : '') + v.toString(16).toUpperCase();
    }

    function fallbackHexWord(v) {
        v = (Number(v) || 0) & 0xffff;
        return ('000' + v.toString(16).toUpperCase()).slice(-4);
    }

    function getHexByte(v) {
        return (window.oCOM && oCOM.getHexByte) ? oCOM.getHexByte(v) : fallbackHexByte(v);
    }

    function getHexWord(v) {
        return (window.oCOM && oCOM.getHexWord) ? oCOM.getHexWord(v) : fallbackHexWord(v);
    }

    function cloneOpctab() {
        return opctab.map(function (row) { return [row[0], row[1]]; });
    }

    function applyUnofficialOpcodeNames(tbl) {
        tbl[0x04] = ['NOP','zpg']; // unofficial DOP/SKB
        tbl[0x07] = ['SLO','zpg']; // unofficial ASL then ORA
        tbl[0x80] = ['NOP','imm']; // unofficial DOP/SKB
        tbl[0x82] = ['NOP','imm'];
        tbl[0x89] = ['NOP','imm'];
        tbl[0xC2] = ['NOP','imm'];
        tbl[0xE2] = ['NOP','imm'];
        return tbl;
    }

    function bytesToBase64(bytes) {
        var s = '';
        for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
        return btoa(s);
    }

    function decodeBase64ToBytes(text) {
        var clean = String(text || '').replace(/\s+/g, '');
        if (!clean) throw new Error('Paste a base64 boot log first.');

        var bin;
        try {
            bin = atob(clean);
        } catch (e) {
            throw new Error('Invalid base64 input.');
        }

        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i) & 0xff;
        return bytes;
    }

    function parseBootRecords(bytes) {
        if (bytes.length % 5 !== 0) {
            throw new Error('Input byte length is ' + bytes.length + ', but BOOTlog records must be 5 bytes each.');
        }

        var rows = [];
        for (var i = 0, r = 0; i < bytes.length; i += 5, r++) {
            var adr = bytes[i] | (bytes[i + 1] << 8);
            var opcode = bytes[i + 2];
            var op1 = bytes[i + 3];
            var op2 = bytes[i + 4];
            var len = instrlen[opcode] || 1;
            var code = [opcode, op1, op2];

            rows.push({
                idx: r,
                adr: adr,
                opcode: opcode,
                op1: op1,
                op2: op2,
                len: len,
                code_arr: code
            });
        }
        return rows;
    }

    function parseAddr(s) {
        s = String(s || '').trim();
        if (/^\$[0-9a-f]+$/i.test(s)) return parseInt(s.substring(1), 16) & 0xffff;
        if (/^0x[0-9a-f]+$/i.test(s)) return parseInt(s.substring(2), 16) & 0xffff;
        if (/^[0-9a-f]{2,4}$/i.test(s)) return parseInt(s, 16) & 0xffff;
        return null;
    }

    function parseSymbols(text) {
        var map = {};

        function addSymbol(name, addrText, comment) {
            var addr = parseAddr(addrText);
            name = String(name || '').trim();

            if (addr === null || !name) return;

            // Allow assembler-style labels such as A5H or MASK, but reject
            // accidental operators/expressions in the symbol name field.
            if (!/^[A-Za-z_.$][A-Za-z0-9_.$]*$/.test(name)) return;

            map[addr] = { name:name, comment:String(comment || '').trim() };
        }

        String(text || '').split(/\r?\n/).forEach(function (line) {
            var raw = String(line || '');
            var semi = raw.indexOf(';');
            var comment = '';

            if (semi >= 0) {
                comment = raw.substring(semi + 1).trim();
                raw = raw.substring(0, semi);
            }

            raw = raw.trim();
            if (!raw) return;

            var parts = raw.split(/\s+/);

            // Preferred assembler-style form:
            //     LABEL   EQU   $ADDR    ; optional comment
            // Also accept .EQ and = as the directive token.
            if (parts.length >= 3 && /^(EQU|\.EQ|=)$/i.test(parts[1])) {
                addSymbol(parts[0], parts[2], comment);
                return;
            }

            // Compact forms:
            //     $ADDR=LABEL;comment
            //     LABEL=$ADDR;comment
            var eq = raw.indexOf('=');
            if (eq >= 0) {
                var left = raw.substring(0, eq).trim();
                var right = raw.substring(eq + 1).trim();
                var aLeft = parseAddr(left);
                var aRight = parseAddr(right);

                if (aLeft !== null && aRight === null) addSymbol(right, left, comment);
                else if (aRight !== null && aLeft === null) addSymbol(left, right, comment);
                return;
            }

            // Legacy two-column forms:
            //     $ADDR LABEL;comment
            //     0xADDR LABEL;comment
            //     LABEL $ADDR;comment
            if (parts.length >= 2) {
                var p0 = parseAddr(parts[0]);
                var p1 = parseAddr(parts[1]);

                if (p0 !== null && p1 === null) addSymbol(parts[1], parts[0], comment);
                else if (p1 !== null && p0 === null) addSymbol(parts[0], parts[1], comment);
            }
        });

        return map;
    }

    function makeDasm(symbolMap, useDefaultSymbols) {
        if (typeof window.DASM !== 'function') {
            throw new Error('DASM is not loaded. Check that ../res/ASM_core.js is reachable from this HTML file.');
        }

        var dasm = new DASM();

        dasm.getHexByte = getHexByte;
        dasm.getHexWord = getHexWord;
        dasm.ByteAt = function () { return 0; };

        dasm.sym_search = function (op, adm) {
            if (typeof op !== 'string' || op.charAt(0) !== '$') return op;

            var adr = parseInt(op.substring(1), 16);
            if (isNaN(adr)) return op;
            adr &= 0xffff;

            if (Object.prototype.hasOwnProperty.call(symbolMap, adr)) {
                this.last_symbol_comment = symbolMap[adr].comment || '';
                return symbolMap[adr].name;
            }

            if (useDefaultSymbols && this.mem_sym && this.mem_sym[adr] != null) {
                return this.mem_sym[adr][1];
            }

            return op;
        };

        return dasm;
    }

    function normalizeHtmlSpaces(s) {
        return String(s || '').replace(/&nbsp;/g, ' ').replace(/\s+$/g, '');
    }

    function renderBytes(row) {
        var parts = [getHexByte(row.opcode)];
        if (row.len > 1) parts.push(getHexByte(row.op1));
        if (row.len > 2) parts.push(getHexByte(row.op2));
        while (parts.length < 3) parts.push('  ');
        return parts.join(' ');
    }

    function disassembleRows(rows) {
        var symbolMap = parseSymbols(document.getElementById('symbols').value);
        var useDefaultSymbols = document.getElementById('useDefaultSymbols').checked;
        var patchUnofficial = document.getElementById('patchUnofficial').checked;
        var showIdx = document.getElementById('showIdx').checked;
        var localOpctab = patchUnofficial ? applyUnofficialOpcodeNames(cloneOpctab()) : cloneOpctab();
        var dasm = makeDasm(symbolMap, useDefaultSymbols);
        var lines = [];

        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];

            // Compatibility with older ASM_core.js versions whose rel branch formatter still reads global pc.
            window.pc = row.adr;

            dasm.last_symbol_comment = '';
            var ret = dasm.disassemble({
                code_arr: row.code_arr,
                pc: row.adr,
                opctab: localOpctab
            });

            var idx = showIdx ? (String(row.idx).padStart(4, '0') + '  ') : '';
            var addr = normalizeHtmlSpaces(ret.adr_lst || getHexWord(row.adr));
            var bytes = renderBytes(row).padEnd(8, ' ');
            var asm = normalizeHtmlSpaces(ret.mnemonic);
            if (dasm.last_symbol_comment) asm += '   ; ' + dasm.last_symbol_comment;
            lines.push(idx + addr + '  ' + bytes + '  ' + asm);
        }

        return lines.join('\n');
    }

    function run() {
        var output = document.getElementById('output');
        var status = document.getElementById('status');
        status.className = 'status';

        try {
            if (typeof window.oCOM === 'undefined') {
                status.className = 'status error';
                status.textContent = 'oCOM is not loaded. Check that ../res/COM_MAIN.js is reachable.';
                return;
            }
            if (typeof window.DASM !== 'function') {
                status.className = 'status error';
                status.textContent = 'DASM is not loaded. Check that ../res/ASM_core.js is reachable.';
                return;
            }

            var bytes = decodeBase64ToBytes(document.getElementById('input').value);
            var rows = parseBootRecords(bytes);
            output.textContent = disassembleRows(rows);
            status.className = 'status ok';
            status.textContent = 'Decoded ' + rows.length + ' operation records (' + bytes.length + ' bytes).';
        } catch (e) {
            status.className = 'status error';
            status.textContent = e.message;
        }
    }
