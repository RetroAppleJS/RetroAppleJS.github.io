<html style="background-color:#B0B0B0">
<head>
  <title>APPLE II HGR NTSC WAVEFORM TEST - STEP E v5</title>
  <meta charset="utf-8">
  <style>
    html { height:100%; font-family: Arial, sans-serif; }
    body { background-color:#808080; height:100%; margin:0; padding:0; }
    #topmenu { padding:8px; background:#606060; color:#fff; }
    #topmenu label { margin-right:12px; }
    #status { margin-left:12px; font-size:12px; color:#e8e8e8; }
    #main { padding:10px; }
    #displayRow { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; }
    #applescreen { image-rendering:pixelated; background:#000; width:560px; height:384px; border:1px solid #202020; display:block; }
    #huecircle { background:#d8d8d8; width:256px; height:256px; border:1px solid #202020; display:block; }
    #signalgraph { image-rendering:pixelated; background:#000; width:1120px; height:256px; border:1px solid #202020; display:block; cursor:crosshair; }
    .smallLabel { display:inline-block; min-width:2.4em; text-align:right; }
  </style>
</head>
<body>
  <div id="topmenu">
    <label>
      HGR page
      <select id="pageSwitch">
        <option value="1" selected>PAGE1 ($2000)</option>
        <option value="2">PAGE2 ($4000)</option>
      </select>
    </label>
    <button id="sampleHgr" type="button">Sample HGR data</button>
    <button id="testPattern" type="button">Cycle test pattern</button>
    <label>
      Graph line
      <input id="graphLine" type="range" min="0" max="191" value="96">
      <span id="graphLineLabel" class="smallLabel">96</span>
    </label>
    <span id="status">Step E v5: graph + hue-circle visualizer.</span>
  </div>

  <div id="main">
    <div id="displayRow">
      <canvas id="applescreen" width="560" height="384"></canvas>
      <canvas id="huecircle" width="256" height="256"></canvas>
    </div>
    <canvas id="signalgraph" width="1120" height="256"></canvas>
  </div>

  <script type="text/javascript" src="../res/gpu-browser.min.js"></script>
  <script type="text/javascript" src="ScreenGPU_example_DATA.js"></script>

  <script>
var apple2plus;

const HGR_W = 280;
const HGR_H = 192;
const HGR_BYTES_PER_LINE = 40;
const HGR_PAGE1 = 0x2000;
const HGR_PAGE2 = 0x4000;
const HGR_OS = 4;
const WAVE_W = HGR_W * HGR_OS;          // 1120 waveform samples per line
const WAVE_CHANNELS = 3;                // 0=Y, 1=I', 2=Q'
const WAVE_H = HGR_H * WAVE_CHANNELS;   // stacked 2D texture: Y plane, I' plane, Q' plane

let testPatternN = 0;
let graphLine = 96;

window.addEventListener("load", EMU_init);

function EMU_init()
{
  const vidContext = document.getElementById("applescreen");
  apple2plus = new Apple2Plus(vidContext);
  apple2plus.restart();

  const video = apple2plus.vidObj();
  video.initGPU(vidContext);

  const pageSwitch = document.getElementById("pageSwitch");
  pageSwitch.addEventListener("change", function()
  {
    video.setPage2(this.value === "2");
  });

  document.getElementById("sampleHgr").addEventListener("click", function()
  {
    loadSampleHgrData();
    video.markDirty();
    setStatus("Reloaded sample HGR data into PAGE1/PAGE2.");
  });

  document.getElementById("testPattern").addEventListener("click", function()
  {
    testPatternN = (testPatternN + 1) % 4;
    seedHgrTestPattern(apple2plus.hwObj().write, HGR_PAGE1, testPatternN);
    video.setPage2(false);
    video.markDirty();
    setStatus("Loaded PAGE1 test pattern " + testPatternN + ". Use “Sample HGR data” to return to the captured examples.");
  });

  const graphLineEl = document.getElementById("graphLine");
  const graphLineLabel = document.getElementById("graphLineLabel");
  graphLineEl.addEventListener("input", function()
  {
    graphLine = this.value | 0;
    graphLineLabel.textContent = String(graphLine);
    video.invalidateGraphCache();
    video.drawSignalGraph();
    video.drawHueCircle();
  });

  const graphCanvas = document.getElementById("signalgraph");
  graphCanvas.addEventListener("mousemove", function(ev)
  {
    const r = this.getBoundingClientRect();
    const x = (ev.clientX - r.left) * (this.width / r.width);
    const sx = Math.max(0, Math.min(WAVE_W - 1, x | 0));
    video.setHoverSample(sx);
  });
  graphCanvas.addEventListener("mouseleave", function()
  {
    video.setHoverSample(-1);
  });

  loadSampleHgrData();
  video.markDirty();
  drawLoop();

  setStatus("Step E v5 ready: sample HGR data loaded; graph and hue circle are active.");
}

var Apple2Video = function(ctx)
{
  this.dim = [ctx.width, ctx.height];
  this.gpu = null;
  this.waveKernel = null;
  this.renderKernel = null;
  this.cfg = new Uint8Array(8);
  this.hgrLinear = new Uint8Array(HGR_H * HGR_BYTES_PER_LINE);

  this.graphCanvas = document.getElementById("signalgraph");
  this.graphCtx = this.graphCanvas ? this.graphCanvas.getContext("2d") : null;
  this.hueCanvas = document.getElementById("huecircle");
  this.hueCtx = this.hueCanvas ? this.hueCanvas.getContext("2d") : null;
  this.hoverSample = -1;
  this.graphCacheLine = -1;
  this.graphCacheData = null;
  this.hueBaseCanvas = null;

  let page2_mode = false;
  let frame_redraw = true;
  let hgr_linear_dirty = true;

  this.reset = function()
  {
    page2_mode = false;
    frame_redraw = true;
    hgr_linear_dirty = true;
    this.invalidateGraphCache();
  };

  this.write = function(addr, d8)
  {
    if (addr >= 0x2000 && addr < 0x6000)
    {
      frame_redraw = true;
      hgr_linear_dirty = true;
      this.invalidateGraphCache();
    }
  };

  this.setPage2 = function(flag)
  {
    if (page2_mode !== flag)
    {
      page2_mode = flag;
      frame_redraw = true;
      hgr_linear_dirty = true;
      this.invalidateGraphCache();
    }
  };

  this.pageSoftSwitch = function() { return page2_mode ? 0x20 : 0x10; };
  this.markDirty = function() { frame_redraw = true; };
  this.redrawIfNeeded = function() { if (frame_redraw) this.redraw(); };

  this.invalidateGraphCache = function()
  {
    this.graphCacheLine = -1;
    this.graphCacheData = null;
  };

  this.setHoverSample = function(sx)
  {
    if (this.hoverSample !== sx)
    {
      this.hoverSample = sx;
      this.drawSignalGraph();
      this.drawHueCircle();
    }
  };

  this.ensureLinearHgr = function()
  {
    if (hgr_linear_dirty)
    {
      const mem = apple2plus.hwObj().safe_flashdump();
      linearizeHgrPage(mem, this.hgrLinear, this.pageSoftSwitch());
      hgr_linear_dirty = false;
      this.invalidateGraphCache();
    }
  };

  this.getGraphSignal = function(line)
  {
    if (this.graphCacheData && this.graphCacheLine === line)
      return this.graphCacheData;

    this.ensureLinearHgr();

    const y = line < 0 ? 0 : (line > 191 ? 191 : line);
    const rowBase = y * HGR_BYTES_PER_LINE;

    const bits = new Uint8Array(HGR_W);
    const bit7span = new Uint8Array(HGR_W);
    const waveY = new Float32Array(WAVE_W);
    const waveI = new Float32Array(WAVE_W);
    const waveQ = new Float32Array(WAVE_W);

    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
    {
      const b = this.hgrLinear[rowBase + xb];
      const ctrl = (b >> 7) & 1;
      const x0 = xb * 7;
      for (let bit = 0; bit < 7; bit++)
      {
        bits[x0 + bit] = (b >> bit) & 1;
        bit7span[x0 + bit] = ctrl;
      }
    }

    for (let sx = 0; sx < WAVE_W; sx++)
    {
      const xp0 = sx >> 2;
      const xByte0 = (xp0 / 7) | 0;
      const b0 = this.hgrLinear[rowBase + xByte0];
      const delay = (b0 >> 7) & 1;

      let dsx = sx - delay;
      if (dsx < 0) dsx = 0;
      if (dsx > (WAVE_W - 1)) dsx = WAVE_W - 1;

      const dxp = dsx >> 2;
      const xByte = (dxp / 7) | 0;
      const bit = dxp - xByte * 7;
      const b = this.hgrLinear[rowBase + xByte];
      const on = (b >> bit) & 1;
      const video = on ? 1.0 : 0.0;

      const phase = sx & 3;
      let c = 0.0, s = 0.0;
      if (phase === 0) { c = 1.0; s = 0.0; }
      else if (phase === 1) { c = 0.0; s = 1.0; }
      else if (phase === 2) { c = -1.0; s = 0.0; }
      else { c = 0.0; s = -1.0; }

      waveY[sx] = video;
      waveI[sx] = video * c;
      waveQ[sx] = video * s;
    }

    this.graphCacheLine = y;
    this.graphCacheData = { line:y, bits:bits, bit7span:bit7span, waveY:waveY, waveI:waveI, waveQ:waveQ };
    return this.graphCacheData;
  };

  this.drawSignalGraph = function()
  {
    if (!this.graphCtx) return;

    const ctx2 = this.graphCtx;
    const W = this.graphCanvas.width;
    const H = this.graphCanvas.height;
    const data = this.getGraphSignal(graphLine);

    ctx2.clearRect(0, 0, W, H);
    ctx2.fillStyle = "#000";
    ctx2.fillRect(0, 0, W, H);

    const bitsAreaTop = 8;
    const bitsPlotH = 18;
    const bit7AreaTop = 34;
    const analogTop = 74;
    const analogBottom = H - 6;
    const analogMid = (analogTop + analogBottom) * 0.5;
    const analogHalf = (analogBottom - analogTop) * 0.5 - 4;

    // Separators.
    ctx2.strokeStyle = "#202020";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    ctx2.moveTo(0, 28.5); ctx2.lineTo(W, 28.5);
    ctx2.moveTo(0, 58.5); ctx2.lineTo(W, 58.5);
    ctx2.moveTo(0, analogMid + 0.5); ctx2.lineTo(W, analogMid + 0.5);
    ctx2.stroke();

    // Labels.
    ctx2.font = "12px Arial";
    ctx2.fillStyle = "#ffffff";
    ctx2.fillText("visible bits", 8, 16);
    ctx2.fillText("bit7 span", 8, 42);
    ctx2.fillText("Y", 8, analogTop + 12);
    ctx2.fillStyle = "#ffae00";
    ctx2.fillText("I′", 24, analogTop + 12);
    ctx2.fillStyle = "#c080ff";
    ctx2.fillText("Q′", 44, analogTop + 12);
    ctx2.fillStyle = "#a0a0a0";
    ctx2.fillText("line " + data.line, W - 62, 16);

    // Visible 280 bits as a separate white square-wave plot.
    ctx2.strokeStyle = "#ffffff";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    let prevY = bitsAreaTop + (1 - data.bits[0]) * bitsPlotH;
    ctx2.moveTo(0, prevY);
    for (let xp = 0; xp < HGR_W; xp++)
    {
      const level = bitsAreaTop + (1 - data.bits[xp]) * bitsPlotH;
      const x0 = xp * 4;
      if (xp > 0 && level !== prevY)
      {
        ctx2.lineTo(x0, prevY);
        ctx2.lineTo(x0, level);
      }
      ctx2.lineTo(x0 + 4, level);
      prevY = level;
    }
    ctx2.stroke();

    // Bit-7 span as a separate white square-wave plot.
    ctx2.beginPath();
    prevY = bit7AreaTop + (1 - data.bit7span[0]) * bitsPlotH;
    ctx2.moveTo(0, prevY);
    for (let xp = 0; xp < HGR_W; xp++)
    {
      const level = bit7AreaTop + (1 - data.bit7span[xp]) * bitsPlotH;
      const x0 = xp * 4;
      if (xp > 0 && level !== prevY)
      {
        ctx2.lineTo(x0, prevY);
        ctx2.lineTo(x0, level);
      }
      ctx2.lineTo(x0 + 4, level);
      prevY = level;
    }
    ctx2.stroke();

    // Y curve in white, shifted below the top two plots.
    ctx2.strokeStyle = "#ffffff";
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    let py = analogBottom - data.waveY[0] * (analogBottom - analogTop);
    ctx2.moveTo(0, py);
    for (let sx = 1; sx < WAVE_W; sx++)
    {
      py = analogBottom - data.waveY[sx] * (analogBottom - analogTop);
      ctx2.lineTo(sx, py);
    }
    ctx2.stroke();

    // I′ dotted line alternating orange/blue.
    for (let sx = 0, dotN = 0; sx < WAVE_W; sx += 4, dotN++)
    {
      const v = data.waveI[sx];
      const y = analogMid - v * analogHalf;
      ctx2.fillStyle = (dotN & 1) === 0 ? "#ff9800" : "#3f8cff";
      ctx2.fillRect(sx, y, 2, 2);
    }

    // Q′ dotted line alternating purple/green.
    for (let sx = 0, dotN = 0; sx < WAVE_W; sx += 4, dotN++)
    {
      const v = data.waveQ[sx];
      const y = analogMid - v * analogHalf;
      ctx2.fillStyle = (dotN & 1) === 0 ? "#c060ff" : "#5cd35c";
      ctx2.fillRect(sx + 1, y + 1, 2, 2);
    }

    // Hover indicator.
    if (this.hoverSample >= 0)
    {
      ctx2.strokeStyle = "#ffffff";
      ctx2.lineWidth = 1;
      ctx2.beginPath();
      ctx2.moveTo(this.hoverSample + 0.5, 0);
      ctx2.lineTo(this.hoverSample + 0.5, H);
      ctx2.stroke();
    }
  };

  this.ensureHueBase = function()
  {
    if (this.hueBaseCanvas) return;
    if (!this.hueCtx) return;

    const W = this.hueCanvas.width;
    const H = this.hueCanvas.height;
    const off = document.createElement("canvas");
    off.width = W;
    off.height = H;
    const c = off.getContext("2d");

    const img = c.createImageData(W, H);
    const cx = W * 0.5;
    const cy = H * 0.5;
    const r = Math.min(W, H) * 0.5 - 8;

    for (let y = 0; y < H; y++)
    {
      for (let x = 0; x < W; x++)
      {
        const dx = (x - cx) / r;
        const dy = (cy - y) / r;   // positive V upwards
        const rr = Math.sqrt(dx * dx + dy * dy);
        const p = (y * W + x) * 4;

        if (rr <= 1.0)
        {
          const Y = 0.50;
          const U = dx * 0.45;
          const V = dy * 0.55;

          let R = Y + 1.13983 * V;
          let G = Y - 0.39465 * U - 0.58060 * V;
          let B = Y + 2.03211 * U;

          if (R < 0) R = 0; if (R > 1) R = 1;
          if (G < 0) G = 0; if (G > 1) G = 1;
          if (B < 0) B = 0; if (B > 1) B = 1;

          img.data[p    ] = (R * 255) | 0;
          img.data[p + 1] = (G * 255) | 0;
          img.data[p + 2] = (B * 255) | 0;
          img.data[p + 3] = 255;
        }
        else
        {
          img.data[p    ] = 216;
          img.data[p + 1] = 216;
          img.data[p + 2] = 216;
          img.data[p + 3] = 255;
        }
      }
    }

    c.putImageData(img, 0, 0);

    // Circle outline.
    c.strokeStyle = "rgba(0,0,0,0.5)";
    c.lineWidth = 1.5;
    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI * 2);
    c.stroke();

    // Axes at 40% opacity.
    c.strokeStyle = "rgba(0,0,0,0.4)";
    c.fillStyle = "rgba(0,0,0,0.4)";
    c.lineWidth = 2;

    function drawAxis(angleDeg)
    {
      const a = angleDeg * Math.PI / 180.0;
      const ux = Math.cos(a), uy = Math.sin(a);
      c.beginPath();
      c.moveTo(cx - ux * r, cy + uy * r);
      c.lineTo(cx + ux * r, cy - uy * r);
      c.stroke();
      return { ux:ux, uy:uy };
    }

    // Horizontal -U / U
    drawAxis(0);
    // Vertical V / -V
    drawAxis(90);
    // Q axis 33°
    drawAxis(33);
    // I axis 123° (positive I end is lower-right, i.e. the opposite direction)
    drawAxis(123);

    c.font = "12px Arial";
    c.fillText("V", cx - 3, cy - r - 4);
    c.fillText("-V", cx - 9, cy + r + 14);
    c.fillText("-U", cx - r - 18, cy + 4);
    c.fillText("U", cx + r + 6, cy + 4);

    // Q / -Q
    let a = 33 * Math.PI / 180.0;
    c.fillText("Q", cx + Math.cos(a) * (r + 6), cy - Math.sin(a) * (r + 6));
    c.fillText("-Q", cx - Math.cos(a) * (r + 20), cy + Math.sin(a) * (r + 8));

    // I / -I (positive I is opposite the 123° direction, i.e. lower-right)
    a = (-57) * Math.PI / 180.0;
    c.fillText("I", cx + Math.cos(a) * (r + 6), cy - Math.sin(a) * (r + 6));
    c.fillText("-I", cx - Math.cos(a) * (r + 18), cy + Math.sin(a) * (r + 6));

    this.hueBaseCanvas = off;
  };

  this.drawHueCircle = function()
  {
    if (!this.hueCtx) return;
    this.ensureHueBase();
    if (!this.hueBaseCanvas) return;

    const ctx2 = this.hueCtx;
    const W = this.hueCanvas.width;
    const H = this.hueCanvas.height;
    const cx = W * 0.5;
    const cy = H * 0.5;
    const r = Math.min(W, H) * 0.5 - 8;

    ctx2.clearRect(0, 0, W, H);
    ctx2.drawImage(this.hueBaseCanvas, 0, 0);

    if (this.hoverSample >= 0)
    {
      const data = this.getGraphSignal(graphLine);
      const sx = this.hoverSample;
      const i = data.waveI[sx];
      const q = data.waveQ[sx];

      // Map sampled I'/Q' into the U/V circle plane.
      // Positive Q: +33°, positive I: -57° (same line as 123°).
      const qA = 33 * Math.PI / 180.0;
      const iA = -57 * Math.PI / 180.0;

      const u = q * Math.cos(qA) + i * Math.cos(iA);
      const v = q * Math.sin(qA) + i * Math.sin(iA);

      const px = cx + u * (r * 0.92);
      const py = cy - v * (r * 0.92);

      ctx2.fillStyle = "#000000";
      ctx2.beginPath();
      ctx2.arc(px, py, 3, 0, Math.PI * 2);
      ctx2.fill();
    }
  };

  this.initGPU = function(canvas)
  {
    this.gpu = createGPUInstance({ canvas: canvas, mode: "gpu" });

    // Kernel 1: compact linear HGR -> oversampled Y/I'/Q' waveform.
    this.waveKernel = this.gpu.createKernel(function(hgr, cfg)
    {
      const sx = this.thread.x;
      const wy = this.thread.y;
      const ch = (wy / 192) | 0;
      const y = wy - ch * 192;

      const xp0 = sx >> 2;
      const xByte0 = (xp0 / 7) | 0;
      const b0 = hgr[y * 40 + xByte0];

      const delay = (b0 >> 7) & 1;
      let dsx = sx - delay;
      if (dsx < 0) dsx = 0;
      if (dsx > 1119) dsx = 1119;

      const dxp = dsx >> 2;
      const xByte = (dxp / 7) | 0;
      const bit = dxp - xByte * 7;
      const b = hgr[y * 40 + xByte];

      const on = (b >> bit) & 1;
      const video = on > 0 ? 1.0 : 0.0;

      const phase = sx & 3;
      let c = 0.0;
      let s = 0.0;
      if (phase === 0) { c = 1.0; s = 0.0; }
      else if (phase === 1) { c = 0.0; s = 1.0; }
      else if (phase === 2) { c = -1.0; s = 0.0; }
      else { c = 0.0; s = -1.0; }

      if (ch === 0) return video;
      if (ch === 1) return video * c;
      return video * s;
    }, {
      output: [WAVE_W, WAVE_H],
      pipeline: true,
      immutable: true
    });

    // Kernel 2: waveform -> RGB canvas.
    this.renderKernel = this.gpu.createKernel(function(wave, cfg)
    {
      const x = this.thread.x;
      const y = this.thread.y;

      const srcY = 191 - (y >> 1);
      const sx = x << 1;

      let pxm1 = sx - 1; if (pxm1 < 0) pxm1 = 0;
      let pxp1 = sx + 1; if (pxp1 > 1119) pxp1 = 1119;

      let yy = wave[srcY][pxm1] * 0.25 + wave[srcY][sx] * 0.50 + wave[srcY][pxp1] * 0.25;

      let ii = 0.0;
      let qq = 0.0;
      for (let k = -2; k <= 1; k++)
      {
        let px = sx + k;
        if (px < 0) px = 0;
        if (px > 1119) px = 1119;
        ii += wave[192 + srcY][px];
        qq += wave[384 + srcY][px];
      }

      ii = ii * 0.25 * 0.70;
      qq = qq * 0.25 * 0.70;

      let r = yy + 0.956 * ii + 0.621 * qq;
      let g = yy - 0.272 * ii - 0.647 * qq;
      let b = yy - 1.106 * ii + 1.703 * qq;

      if (r < 0.0) r = 0.0; if (r > 1.0) r = 1.0;
      if (g < 0.0) g = 0.0; if (g > 1.0) g = 1.0;
      if (b < 0.0) b = 0.0; if (b > 1.0) b = 1.0;

      this.color(r, g, b, 1.0);
    }, {
      output: [ctx.width, ctx.height],
      graphical: true
    });
  };

  this.redraw = function()
  {
    if (!this.waveKernel || !this.renderKernel) return;
    this.cfg[0] = this.pageSoftSwitch();

    this.ensureLinearHgr();

    const wave = this.waveKernel(this.hgrLinear, this.cfg);
    this.renderKernel(wave, this.cfg);
    this.drawSignalGraph();
    this.drawHueCircle();

    frame_redraw = false;
  };
};

function drawLoop()
{
  apple2plus.vidObj().redrawIfNeeded();
  window.requestAnimationFrame(drawLoop);
}

function setStatus(msg)
{
  const el = document.getElementById("status");
  if (el) el.textContent = msg;
}

function createGPUInstance(options)
{
  try { return new window.GPU.GPU(options || {}); }
  catch (e) { return new GPU(options || {}); }
}

function clearHgrPage(writeByte, pageBase)
{
  for (let i = 0; i < 0x2000; i++) writeByte(pageBase + i, 0x00);
}

function hgrAddress(pageBase, xByte, y)
{
  return pageBase + ((y << 10) & 0x1C00) + ((y << 4) & 0x0380) + ((y >> 3) & 0x0018) + ((y >> 1) & 0x0060) + xByte;
}

function loadSampleHgrData()
{
  clearHgrPage(apple2plus.hwObj().write, HGR_PAGE1);
  clearHgrPage(apple2plus.hwObj().write, HGR_PAGE2);

  if (typeof gfx_stream !== "undefined")
    fill_ram(gfx_stream, apple2plus.hwObj().write);

  if (typeof gfx_stream2 !== "undefined")
    fill_ram(gfx_stream2, apple2plus.hwObj().write, 0x2000);
}

function fill_ram(byte_capture, writeByte, offset)
{
  offset = offset || 0;
  if (!byte_capture) return 0;

  let writes = 0;
  const line_arr = byte_capture.split("\n");

  for (let i = 0; i < line_arr.length; i++)
  {
    const line = line_arr[i].trim();
    if (line.length === 0 || line[0] === "#") continue;

    const parts = line.split(":");
    if (parts.length < 2) continue;

    const adr = parseInt(parts[0], 16);
    if (Number.isNaN(adr)) continue;

    const hexarr = parts[1].trim().split(/\s+/);
    for (let j = 0; j < hexarr.length; j++)
    {
      const byte = parseInt(hexarr[j], 16);
      if (!Number.isNaN(byte))
      {
        writeByte((offset + adr + j) & 0xFFFF, byte & 0xFF);
        writes++;
      }
    }
  }

  return writes;
}

function linearizeHgrPage(mem, out, pageSoftSwitch)
{
  const PAGE = (pageSoftSwitch & 48) << 9;

  for (let y = 0; y < HGR_H; y++)
  {
    const adr_ofs = ((y << 4) & 0x380) | ((y >> 3) & 0x18) | ((y >> 1) & 0x60);
    const rowBase = PAGE + ((y << 10) & 0x1C00) + adr_ofs;
    const dstBase = y * HGR_BYTES_PER_LINE;

    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
      out[dstBase + xb] = mem[rowBase + xb];
  }
}

function seedHgrTestPattern(writeByte, pageBase, pattern)
{
  clearHgrPage(writeByte, pageBase);

  for (let y = 0; y < HGR_H; y++)
  {
    for (let xb = 0; xb < HGR_BYTES_PER_LINE; xb++)
    {
      let v = 0;

      if (pattern === 0)
      {
        v = ((xb + ((y / 16) | 0)) & 1) ? 0x55 : 0x2A;
        if (((y / 24) | 0) & 1) v |= 0x80;
      }
      else if (pattern === 1)
      {
        const band = ((xb / 5) | 0) & 7;
        v = (band & 1) ? 0x55 : 0x2A;
        if (band & 2) v |= 0x80;
      }
      else if (pattern === 2)
      {
        v = ((((xb >> 1) + (y >> 4)) & 1) ? 0x7F : 0x00);
        if ((xb >> 2) & 1) v |= 0x80;
      }
      else
      {
        v = (((xb + (y >> 3)) & 1) ? 0x49 : 0x24);
        if (((xb + (y >> 4)) & 2) !== 0) v |= 0x80;
      }

      writeByte(hgrAddress(pageBase, xb, y), v);
    }
  }
}

function Apple2Plus(context)
{
  const video = new Apple2Video(context);
  const ram = new Uint8Array(0x10000);
  const hw = {
    write: function(addr, d8) { ram[addr & 0xFFFF] = d8 & 0xFF; video.write(addr, d8); },
    safe_flashdump: function() { return ram; },
    restart: function() { ram.fill(0); },
    reset: function() {}
  };

  this.hwObj = function() { return hw; };
  this.vidObj = function() { return video; };
  this.restart = function() { hw.restart(); video.reset(); };
}
