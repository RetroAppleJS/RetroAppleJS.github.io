<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASM core v4 tokenizer / JSON viewer</title>

<!-- Adjust these paths if this file is not next to /res. -->
<script type="text/javascript" src="../res/COM_MAIN.js"></script>
<script type="text/javascript" src="../res/ASM_core_v4.js"></script>

<style>
    :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel2: #0b0f14;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #79b8ff;
        --ok: #8bd17c;
        --warn: #ffd166;
        --bad: #ff8a8a;
        --key: #79c0ff;
        --string: #a5d6ff;
        --number: #f2cc60;
        --bool: #ffab70;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 12px;
        padding: 18px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
    }

    h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
    }

    .subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
    }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
    }

    button, input::file-selector-button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #21262d;
        color: var(--text);
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
    }

    button:hover, input::file-selector-button:hover { border-color: var(--accent); }

    button.primary {
        background: #1d4f7a;
        border-color: #2c6ca3;
    }

    button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }

    input[type="file"] {
        max-width: 340px;
        color: var(--muted);
    }

    .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 13px;
    }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }

    main {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.1fr);
        gap: 12px;
    }

    .pane {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: var(--panel);
    }

    .pane-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        background: #111820;
    }

    .pane-title strong {
        color: var(--text);
        font-size: 14px;
    }

    textarea, .json-mount {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        outline: 0;
        padding: 14px;
        background: var(--panel2);
        color: var(--text);
        font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        overflow: auto;
        tab-size: 4;
    }

    textarea { resize: none; white-space: pre; }

    .json-view {
        margin: 0;
        white-space: pre;
        color: var(--text);
    }

    .json-boundary {
        border-radius: 3px;
        padding: 0 1px;
        transition: background 90ms ease, outline-color 90ms ease;
    }

    .json-boundary.active {
        background: rgba(255, 255, 255, 0.16);
        outline: 1px solid rgba(255, 255, 255, 0.38);
    }

    .json-key { color: var(--key); }
    .json-string { color: var(--string); }
    .json-number { color: var(--number); }
    .json-boolean, .json-null { color: var(--bool); }

    .drop-hint {
        border: 1px dashed #4b5563;
        border-radius: 10px;
        padding: 6px 10px;
        color: var(--muted);
        font-size: 12px;
    }

    body.dragover .drop-hint {
        border-color: var(--accent);
        color: var(--accent);
    }

    @media (max-width: 900px) {
        body { padding: 12px; }
        header { display: block; }
        main { grid-template-columns: 1fr; grid-template-rows: minmax(280px, 1fr) minmax(320px, 1.2fr); }
        .status { margin-left: 0; width: 100%; }
    }
</style>

<script>
// Interactive JSON pretty printer, adapted from the JSON.prettify pattern used in AsciiCAD_CMD.js.
JSON.prettify = function makeInteractiveJson(mountEl, boundaryStyles, indent) {
    if (!mountEl) throw new Error("mountEl is required");
    indent = indent || 2;
    var jsonStr = mountEl.textContent;

    var styleMap = Array.isArray(boundaryStyles)
        ? Object.fromEntries(boundaryStyles)
        : (boundaryStyles || {});

    var openToKey = {};
    var closeToKey = {};
    Object.keys(styleMap).forEach(function (pairKey) {
        if (typeof pairKey !== "string" || pairKey.length !== 2) return;
        openToKey[pairKey.charAt(0)] = pairKey;
        closeToKey[pairKey.charAt(1)] = pairKey;
    });

    var pretty;
    try {
        pretty = prettyJsonAllman(JSON.parse(jsonStr), indent);
    } catch (e) {
        var fallback = document.createElement("pre");
        fallback.className = "json-view";
        fallback.textContent = jsonStr;
        mountEl.replaceChildren(fallback);
        return fallback;
    }

    var root = document.createElement("pre");
    root.className = "json-view";
    var stacks = {};
    var nextPairId = 1;
    var frag = document.createDocumentFragment();

    function appendText(text) {
        if (text) frag.appendChild(document.createTextNode(text));
    }

    function appendBoundarySpan(ch, pairKey, pairId) {
        var sp = document.createElement("span");
        sp.className = "json-boundary";
        sp.textContent = ch;
        sp.dataset.pair = String(pairId);
        if (styleMap[pairKey]) sp.setAttribute("style", styleMap[pairKey]);
        frag.appendChild(sp);
        return sp;
    }

    var i = 0;
    while (i < pretty.length) {
        var ch = pretty.charAt(i);

        if (openToKey[ch]) {
            var openPairKey = openToKey[ch];
            var pairId = nextPairId++;
            appendBoundarySpan(ch, openPairKey, pairId);
            if (!stacks[openPairKey]) stacks[openPairKey] = [];
            stacks[openPairKey].push(pairId);
            i++;
            continue;
        }

        if (closeToKey[ch]) {
            var closePairKey = closeToKey[ch];
            var stack = stacks[closePairKey];
            if (stack && stack.length) appendBoundarySpan(ch, closePairKey, stack.pop());
            else appendText(ch);
            i++;
            continue;
        }

        // Light token coloring on top of the boundary-pair highlighting.
        var rest = pretty.substring(i);
        var m;
        if ((m = rest.match(/^\s+|^[:,]/))) {
            appendText(m[0]);
            i += m[0].length;
            continue;
        }
        if ((m = rest.match(/^"(?:\\.|[^"\\])*"(?=\s*:)/))) {
            appendClassed(m[0], "json-key");
            i += m[0].length;
            continue;
        }
        if ((m = rest.match(/^"(?:\\.|[^"\\])*"/))) {
            appendClassed(m[0], "json-string");
            i += m[0].length;
            continue;
        }
        if ((m = rest.match(/^-?\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?/))) {
            appendClassed(m[0], "json-number");
            i += m[0].length;
            continue;
        }
        if ((m = rest.match(/^(true|false)\b/))) {
            appendClassed(m[0], "json-boolean");
            i += m[0].length;
            continue;
        }
        if ((m = rest.match(/^null\b/))) {
            appendClassed(m[0], "json-null");
            i += m[0].length;
            continue;
        }

        appendText(ch);
        i++;
    }

    function appendClassed(text, className) {
        var sp = document.createElement("span");
        sp.className = className;
        sp.textContent = text;
        frag.appendChild(sp);
    }

    root.appendChild(frag);
    mountEl.replaceChildren(root);

    var activePair = null;
    function cssEscape(s) {
        if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(s));
        return String(s).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
    }
    function setActive(pairId) {
        if (activePair === pairId) return;
        clearActive();
        activePair = pairId;
        root.querySelectorAll('.json-boundary[data-pair="' + cssEscape(pairId) + '"]').forEach(function (el) {
            el.classList.add("active");
        });
    }
    function clearActive() {
        if (activePair == null) return;
        root.querySelectorAll('.json-boundary[data-pair="' + cssEscape(activePair) + '"]').forEach(function (el) {
            el.classList.remove("active");
        });
        activePair = null;
    }

    root.addEventListener("mousemove", function (e) {
        var b = e.target.closest(".json-boundary");
        if (!b || !root.contains(b)) { clearActive(); return; }
        setActive(b.dataset.pair);
    });
    root.addEventListener("mouseleave", clearActive);
    return root;
};

function prettyJsonAllman(value, indent) {
    indent = indent || 2;
    var obj = (typeof value === "string") ? JSON.parse(value) : value;
    var s = JSON.stringify(obj, null, indent);
    s = s.replace(/^(\s*)"([^"]+)"\s*:\s*([{\[])([}\]])?\s*(,?)\s*$/gm,
        function (_m, ws, key, open, maybeClose, comma) {
            if (maybeClose) {
                return ws + '"' + key + '":\n' + ws + open + '\n' + ws + ' '.repeat(indent) + '\n' + ws + maybeClose + comma;
            }
            return ws + '"' + key + '":\n' + ws + open;
        }
    );
    return s;
}
</script>
</head>
<body>
<header>
    <div>
        <h1>ASM core v4 tokenizer / JSON viewer</h1>
        <div class="subtitle">Load a 6502 <code>.S</code> source file. Source stays on the left; parsed JSON appears on the right. v4 uses table-driven parsers for pragmas, mnemonics, and metadata.</div>
    </div>
    <div class="drop-hint">Tip: drag a .S file anywhere on this page</div>
</header>

<section class="toolbar">
    <input id="fileInput" type="file" accept=".S,.s,.ASM,.asm,.INC,.inc,.txt,text/plain" />
    <button id="parseButton" class="primary">TOKENISE</button>
    <button id="copyJsonButton">Copy JSON</button>
    <button id="downloadJsonButton">Download JSON</button>
    <span id="status" class="status">Ready.</span>
</section>

<main>
    <section class="pane">
        <div class="pane-title"><strong>Source</strong><span id="sourceInfo">sample source</span></div>
        <textarea id="sourcePane" spellcheck="false">ORG $6000
INVFLG      EQU     $0032
IN          EQU     $0200
M.COUT      EQU     $FDED   ; print char

NOTCR LDA INVFLG
      PHA
      LDA    #$FF
      STA    INVFLG          ;echo user line
      LDA    IN,X            ;  non inverse
      JSR     M.COUT
      PLA
      STA     INVFLG
</textarea>
    </section>

    <section class="pane">
        <div class="pane-title"><strong>JSON output</strong><span id="jsonInfo">tokenise()</span></div>
        <div id="jsonMount" class="json-mount"></div>
    </section>
</main>

<script>
(function () {
    "use strict";

    var fileInput = document.getElementById("fileInput");
    var parseButton = document.getElementById("parseButton");
    var copyJsonButton = document.getElementById("copyJsonButton");
    var downloadJsonButton = document.getElementById("downloadJsonButton");
    var statusEl = document.getElementById("status");
    var sourcePane = document.getElementById("sourcePane");
    var jsonMount = document.getElementById("jsonMount");
    var sourceInfo = document.getElementById("sourceInfo");
    var jsonInfo = document.getElementById("jsonInfo");

    var currentFileName = "sample.S";
    var currentJsonText = "";
    window.oASM = null;
    window.asmTokeniseJSON = null;

    function setStatus(text, kind) {
        statusEl.className = "status" + (kind ? " " + kind : "");
        statusEl.textContent = text;
    }

    function tokeniseCurrentSource() {
        if (typeof window.ASM !== "function") {
            var msg = "ASM() was not found. Check the ASM_core_v4.js <script src> path.";
            setStatus(msg, "bad");
            renderRawError(msg);
            return;
        }

        try {
            window.oASM = new ASM();
            var rows = window.oASM.tokenise(sourcePane.value);
            window.asmTokeniseJSON = rows;

            console.table( consoleTable(rows) );

            currentJsonText = JSON.stringify(rows, null, 2);
            jsonMount.textContent = currentJsonText;
            JSON.prettify(jsonMount, {
                "{}": "color:#79b8ff;font-weight:800",
                "[]": "color:#d2a8ff;font-weight:800"
            }, 2);

            var count = Array.isArray(rows) ? rows.length : 0;
            jsonInfo.textContent = count + (count === 1 ? " statement" : " statements");
            setStatus("Tokenised " + count + " statements from " + currentFileName + ".", "ok");
        } catch (err) {
            console.error(err);
            renderRawError(err && err.stack ? err.stack : String(err));
            setStatus("Error: " + (err && err.message ? err.message : String(err)), "bad");
        }
    }

    function renderRawError(message) {
        currentJsonText = JSON.stringify({ error: String(message) }, null, 2);
        jsonMount.textContent = currentJsonText;
        JSON.prettify(jsonMount, { "{}": "color:#ff8a8a;font-weight:800", "[]": "color:#d2a8ff;font-weight:800" }, 2);
    }

    async function loadFile(file) {
        if (!file) return;
        currentFileName = file.name || "source.S";
        sourcePane.value = await file.text();
        sourceInfo.textContent = currentFileName + " — " + sourcePane.value.split(/\r\n|\r|\n/).length + " lines";
        tokeniseCurrentSource();
    }

    function jsonDownloadName() {
        var name = currentFileName || "source.S";
        var dot = name.lastIndexOf(".");
        if (dot > 0) name = name.substring(0, dot);
        return name + ".tokenise.json";
    }

    function consoleTable(r)
    {
        var newrows = JSON.parse( JSON.stringify(r) );
        for(var i=0;i<r.length;i++) 
        {
            //newrows[i] = r[i];
            for(var j in r[i])
            {
                if(j=="pc") newrows[i]["pc"] = oASM.pcHex(newrows[i]["pc"]);
                if(j=="opc") newrows[i]["opc"] = oASM.opcHex(newrows[i]["opc"]);
                if(j=="val") newrows[i]["val"] = oASM.valHex(newrows[i]["val"],newrows[i]["oby"]);
                if(typeof(newrows[i][j])=="object") newrows[i][j] = newrows[i][j].join("|");
            }
        }
        return newrows
    }

    fileInput.addEventListener("change", function () {
        loadFile(fileInput.files && fileInput.files[0]);
    });

    parseButton.addEventListener("click", tokeniseCurrentSource);

    copyJsonButton.addEventListener("click", async function () {
        try {
            await navigator.clipboard.writeText(currentJsonText || "");
            setStatus("JSON copied to clipboard.", "ok");
        } catch (err) {
            setStatus("Clipboard copy failed; select the JSON text manually.", "warn");
        }
    });

    downloadJsonButton.addEventListener("click", function () {
        var blob = new Blob([currentJsonText || "[]"], { type: "application/json;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = jsonDownloadName();
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    });

    ["dragenter", "dragover"].forEach(function (name) {
        document.addEventListener(name, function (ev) {
            ev.preventDefault();
            document.body.classList.add("dragover");
        });
    });
    ["dragleave", "drop"].forEach(function (name) {
        document.addEventListener(name, function (ev) {
            ev.preventDefault();
            document.body.classList.remove("dragover");
        });
    });
    document.addEventListener("drop", function (ev) {
        var file = ev.dataTransfer && ev.dataTransfer.files && ev.dataTransfer.files[0];
        loadFile(file);
    });

    sourcePane.addEventListener("keydown", function (ev) {
        if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") tokeniseCurrentSource();
    });

    tokeniseCurrentSource();
})();
</script>
</body>
</html>
